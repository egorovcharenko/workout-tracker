function scrollToSelected() {
  document.querySelectorAll('.scroll-row').forEach(row => {
    const target = row.querySelector('[data-scroll-target]');
    if (!target || row.scrollWidth <= row.clientWidth) return;
    // Use getBoundingClientRect for accurate positioning regardless of offset parents
    const rowRect = row.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const targetCenterInRow = (targetRect.left - rowRect.left) + row.scrollLeft + targetRect.width / 2;
    row.scrollLeft = Math.max(0, targetCenterInRow - rowRect.width / 2);
  });
}


// Walk all completed sets and accumulate volume per muscle. Primary muscles
// get full set volume (weight × reps); secondary muscles get half. Warmup is
// counted at half weight × full reps to reflect its lighter contribution.



function getExerciseStatsFromHistory(exName) {
  // Walk state.history (newest-first) and build a chronological per-session
  // best 1RM + best reps for this exercise. Returns null if no data.
  const history = state.history || [];
  const perSession = [];
  for (const s of history) {
    let bestOrm = 0, maxReps = 0, didLog = false;
    for (const st of (s.sets || [])) {
      if (st.exercise !== exName || st.set_type !== 'working') continue;
      const r = parseInt(st.reps) || 0;
      const w = st.weight_lb || 0;
      if (r <= 0) continue;
      didLog = true;
      if (w > 0) {
        const orm = r > 1 ? w * (1 + r / 30) : w;
        if (orm > bestOrm) bestOrm = orm;
      }
      if (r > maxReps) maxReps = r;
    }
    if (didLog) perSession.push({ date: s.date, orm: bestOrm, reps: maxReps });
  }
  perSession.reverse(); // ascending
  if (!perSession.length) return null;
  const ormVals = perSession.map(p => p.orm).filter(v => v > 0);
  const repsVals = perSession.map(p => p.reps);
  // Prefer 1RM trend; fall back to reps for bodyweight exercises.
  const series = ormVals.length >= 2 ? ormVals : repsVals;
  if (series.length < 1) return null;
  const latest = series[series.length - 1];
  const peak = Math.max(...series);
  const prev = series.length >= 2 ? series[series.length - 2] : null;
  const isPR = latest >= peak && series.length >= 2;
  const isImproved = prev != null && latest > prev;
  // 3+ consecutive ups → streak
  const isStreak = series.length >= 3
    && series[series.length - 1] > series[series.length - 2]
    && series[series.length - 2] > series[series.length - 3];
  return { series, isPR, isImproved, isStreak, sessionCount: perSession.length, latest };
}



function getExpectedSets(workoutName) {
  const w = WORKOUTS.find(w => w.name === workoutName);
  if (!w) return 999; // unknown workout, don't filter
  return w.exercises.reduce((s, e) => s + e.sets + 1, 0); // working sets + warmup per exercise
}

// =========================================================================
// Workout Summary card (home screen)
// -------------------------------------------------------------------------
// Dark cohesive recap of the most-recent completed session — the design
// handoff calls this the "post-workout summary". Replaces the old yellow
// finish-motivation banner; if a witty closer exists for the session it's
// folded into this card as an italic subtitle.
//
// Everything is computed from `state.history` (most-recent N sessions, each
// with its sets[] array), so no extra API call is needed.
//
// Sections, top→bottom:
//   • Hero        — ✓DONE badge + workout name + date, then a volume card
//                   with a 5-week mini-bar chart of same-workout history.
//   • Breakdown   — one CompactRow per working-set exercise: best set,
//                   total volume, mini-sparkline, %-delta vs prior session
//                   of the same exercise. Gold ★PR chip when applicable.
//   • Muscles     — magenta pills sized by accumulated volume share
//                   (primary muscle 1.0×, secondary 0.5×).
//
// Marked `data-noinvert` because the page-level filter:invert dark hack
// would otherwise wash the carefully tuned dark palette to gray.



function isExerciseFullyDone(exIdx) {
  if (!state.workout) return false;
  const ex = state.workout.exercises[exIdx];
  if (!ex) return false;
  const isSuperset = !!ex.supersetExercises;
  const warmupDone = !!state.completed[`${exIdx}-warmup`];
  const warmupOff = !!state.warmupOff?.[exIdx];
  const setCount = getSetCount(exIdx);
  // An exercise can finish when: it's a superset (no warmup concept), warmup
  // was logged, OR warmup is explicitly off (noWarmup or user-toggled).
  if (!(isSuperset || warmupDone || warmupOff)) return false;
  for (let i = 0; i < setCount; i++) {
    if (!state.completed[`${exIdx}-${i}`]) return false;
  }
  return true;
}

function toggleWarmup(exIdx) {
  if (!state.warmupOff) state.warmupOff = {};
  const workoutWasDoneBefore = allDone();
  const wasDoneBefore = isExerciseFullyDone(exIdx);
  state.warmupOff[exIdx] = !state.warmupOff[exIdx];
  // If turning off warmup, mark it as completed so it doesn't block progress
  if (state.warmupOff[exIdx]) {
    state.completed[`${exIdx}-warmup`] = true;
  } else {
    delete state.completed[`${exIdx}-warmup`];
  }
  // Skipping warmup can complete the exercise (working sets done first,
  // then "Skip warmup" tapped) — fire celebration on that transition.
  if (!wasDoneBefore && isExerciseFullyDone(exIdx)) {
    runCelebration(exIdx);
    requestMotivation(exIdx);
  }
  if (!workoutWasDoneBefore && allDone()) {
    requestFinishMotivation();
  }
  triggerSave();
  render();
}

function getNextSet() {
  if (!state.workout) return null;
  const w = state.workout;
  for (let exIdx = 0; exIdx < w.exercises.length; exIdx++) {
    const ex = w.exercises[exIdx];
    const warmupOff = state.warmupOff?.[exIdx];
    if (!ex.supersetExercises && !warmupOff && !state.completed[`${exIdx}-warmup`]) return { exIdx, setKey: "warmup" };
    for (let i = 0; i < getSetCount(exIdx); i++) {
      if (!state.completed[`${exIdx}-${i}`]) return { exIdx, setKey: i };
    }
  }
  return null;
}

// Rest-timer block — design-handoff style: a tinted card with a left-to-right
// drain bar BEHIND the foreground. Foreground stacks the REST/PAUSED label
// and a big monospace M:SS countdown on the left, +15s / pause / skip buttons
// on the right. Three accent states:
//   • running (work)  → blue  (#60A5FA)
//   • paused          → amber (#FBBF24) so the pause is loud
//   • low (≤10s left) → amber (visual cue you're nearly done)
// Done isn't surfaced here because tickRest fires the green flash + clears
// state.resting the moment it hits 0, which removes this block on the next
// render. Element ids let _patchRestTimer mutate text/bar without a render.

// Surgically update the rest timer's text + progress bar without a render().
// Called from tickRest so an open textarea (note editor) doesn't lose focus
// every second when the DOM is rebuilt. Mirrors the renderRestSeparator
// styling logic (accent, bar gradient, label) so a paused/low/running
// transition looks right without a full re-render.
function _patchRestTimer() {
  const text = document.getElementById('rest-timer-text');
  const bar = document.getElementById('rest-timer-bar');
  const label = document.getElementById('rest-timer-label');
  const root = document.getElementById('rest-timer');
  if (!text || !bar || !root) return false;
  const dur = state.restDur || state.workout.rest || 60;
  const left = Math.max(0, state.restLeft || 0);
  const pct = Math.max(0, Math.min(100, ((dur - left) / dur) * 100));
  const isLow = left <= 10;
  const paused = !!state.restPaused;
  const accent = paused ? "#FBBF24" : isLow ? "#FBBF24" : "#60A5FA";
  const accentBg = paused ? "rgba(251,191,36,0.10)" : isLow ? "rgba(251,191,36,0.10)" : "rgba(96,165,250,0.10)";
  const m = Math.floor(left / 60);
  const s = String(left % 60).padStart(2, '0');
  text.textContent = `${m}:${s}`;
  bar.style.width = `${pct}%`;
  bar.style.background = `linear-gradient(90deg,${accent}30,${accent}14)`;
  root.style.borderColor = `${accent}55`;
  root.style.background = accentBg;
  if (label) {
    label.textContent = paused ? 'REST · PAUSED' : 'REST';
    label.style.color = accent;
  }
  return true;
}

function getRepsOptions(targetReps) {
  const [lo, hi] = parseRepRange(targetReps);
  const pad = hi - lo <= 3 ? 3 : 2;
  // Always offer 1..target-range. Tough sets (or assisted-band failure
  // points) sometimes only get 1–2 clean reps and the picker should let
  // you log that honestly. Scroll-row already handles overflow.
  const start = 1;
  const end = hi + pad;
  const opts = [];
  for (let i = start; i <= end; i++) opts.push(i);
  return opts;
}

function repsBtnStyle(r, selected, hinted, inRange) {
  if (selected) return 'background:#22c55e;color:white;box-shadow:0 1px 3px rgba(34,197,94,0.4);outline:2px solid #86efac;';
  if (hinted) return 'background:white;color:#86efac;border:2px dashed #86efac;';
  if (inRange) return 'background:#f0fdf4;color:#16a34a;border:1.5px solid #86efac;';
  return 'background:#fafafa;color:#a3a3a3;border:1px solid #e5e7eb;';
}

function parseRepRange(repsStr) {
  // Parse "10-12" → [10,12], or "12" → [12,12]
  const parts = String(repsStr).split("-").map(s => parseInt(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
  if (parts.length === 1 && !isNaN(parts[0])) return [parts[0], parts[0]];
  return [8, 12]; // default hypertrophy range
}

// Pull a sub-exercise (or top-level exercise) name + range from an exIdx/setKey
// pair. Used by progression so supersets get suggestions per sub-exercise.
function _exerciseAt(exIdx, setKey) {
  const ex = state.workout?.exercises?.[exIdx];
  if (!ex) return null;
  const subEx = (typeof setKey === 'number') ? getSubExercise(exIdx, setKey) : null;
  const effective = subEx ? { ...ex, ...subEx } : ex;
  return { ex, subEx, effective, name: subEx ? subEx.name : ex.name };
}

// Step UP one notch in the dumbbell weight ladder for a given exercise.
function _nextWeightStep(currentLb, effectiveEx) {
  const ladder = [...new Set([...WEIGHTS_LB, ...(effectiveEx.extraWeights || [])])].sort((a,b) => a-b);
  const next = ladder.find(w => w > currentLb);
  return next ?? null;
}

// Step DOWN one notch (used to suggest LESS assist for assisted exercises).
function _prevWeightStep(currentLb, effectiveEx) {
  const ladder = [...new Set([...WEIGHTS_LB, ...(effectiveEx.extraWeights || [])])].sort((a,b) => a-b);
  let prev = null;
  for (const w of ladder) { if (w < currentLb) prev = w; else break; }
  return prev;
}

// Smallest assist-band reduction: drop the smallest band from the current set.
// Used by assist-band exercises to progress (less assist = more BW load).
function _lighterAssist(currentBands) {
  if (!currentBands || currentBands.length === 0) return null;
  const sorted = currentBands.slice().sort((a,b) => a-b);
  // Drop the smallest band — gentlest reduction.
  return sorted.slice(1);
}

// Smallest band-only progression: add the next-lightest band that isn't
// already in use. Falls back to "stack another small band" if all are picked.
function _heavierBandStack(currentBands) {
  const used = new Set(currentBands || []);
  const lightestUnused = BANDS.find(b => !used.has(b.lb));
  if (lightestUnused) return [...(currentBands || []), lightestUnused.lb];
  return null;
}

// Progression suggestion for an exercise based on prior performance.
// Anchored to the most relevant data:
//   • In-session sets already completed for this exercise → adapts mid-workout.
//     If set 1 went 12 reps clean, set 2's TRY moves up. If set 1 fell short,
//     set 2's TRY backs off.
//   • Falls back to last session's working sets if no in-session data yet.
// Returns null if there's no prior data anywhere.
//
// Output:
//   { weight: number|null,            // suggested weight chip to highlight (DB only for bandAddon)
//     bands:  number[]|null,          // suggested band combo (assist / bandAddon / band-only)
//     reps:   number,                 // suggested rep target chip to highlight
//     reason: string,                 // short explanation for the tooltip
//     mode:   'graduate'|'add-rep'|'hold'|'regress',
//     source: 'in-session'|'last-session'  // for the banner phrasing
//   }
function getProgressionSuggestion(exIdx, setKey) {
  if (!state.workout) return null;
  const refs = _exerciseAt(exIdx, setKey);
  if (!refs) return null;
  const { effective, name } = refs;
  const isBW = !!effective.bodyweight;
  const isAssist = effective.assist === true;
  const isBand = effective.equipment === 'band' && !isAssist;
  const isBandAddon = effective.bandAddon === true;

  // ── 1. Try in-session prior sets first (same exercise name handles supersets) ──
  // For each completed set BEFORE the current setKey, pull effective weight + reps
  // and bands. We compare by the underlying exercise name (so supersets walk back
  // through their own sub-rounds).
  const inSessionSets = [];
  if (typeof setKey === 'number') {
    for (let i = 0; i < setKey; i++) {
      if (!state.completed[`${exIdx}-${i}`]) continue;
      // Skip if this slot is a different sub-exercise in a superset.
      const subAt = getSubExercise(exIdx, i);
      const slotName = subAt ? subAt.name : state.workout.exercises[exIdx].name;
      if (slotName !== name) continue;
      const reps = parseInt(state.reps[`${exIdx}-${i}`]);
      if (isNaN(reps) || reps <= 0) continue;
      const w = getEffectiveWeight(exIdx, i);
      // getBandSelection mirrors what's saved: explicit pick OR auto-suggest.
      const bands = getBandSelection(exIdx, i);
      inSessionSets.push({ weight: w, reps, bands: bands.length ? bands : null });
    }
  }

  // ── 2. Pick the anchor: in-session if any, else last session ──
  let lastSets = inSessionSets;
  let source = 'in-session';
  if (lastSets.length === 0) {
    if (!state.lastSession) return null;
    for (let n = 1; n <= 6; n++) {
      const data = state.lastSession[`${name}|working|${n}`];
      if (!data) continue;
      const reps = parseInt(data.reps);
      if (isNaN(reps) || reps <= 0) continue;
      lastSets.push({
        weight: data.weight_lb ?? null,
        reps,
        bands: data.bands_json ? (() => { try { return JSON.parse(data.bands_json); } catch { return null; } })() : null,
      });
    }
    source = 'last-session';
  }
  if (lastSets.length === 0) return null;

  const [lo, hi] = parseRepRange(effective.reps);
  const lastWeight = lastSets[0].weight;
  const lastBands  = lastSets[0].bands;
  const isInSession = source === 'in-session';

  // ── PROGRESSION POLICY (max +1 rep, or +1 weight step at top of range): ──
  //   • Reps target = +1 over THIS set's last performance, capped at hi.
  //   • Weight goes up by 1 step ONLY when last session's WORST set hit hi
  //     (true double-progression — wait until ALL sets are at top before
  //     adding load). Never graduates from in-session data alone.
  //   • No regress mode (would jump 8 → 10 = +2). Just +1 from where you were.
  //   • Per-set baseline: set 2's TRY uses set 2's last reps, not set 1's.
  //     Set 2 is naturally weaker than set 1; conflating would be unrealistic.

  // THIS set's last performance (per-set, from last session).
  let thisSetLastReps = null;
  if (typeof setKey === 'number' && state.lastSession) {
    const data = state.lastSession[`${name}|working|${setKey + 1}`];
    if (data) {
      const r = parseInt(data.reps);
      if (!isNaN(r) && r > 0) thisSetLastReps = r;
    }
  }
  // LAST session's worst set (for graduate gate). Only counts the previous
  // workout's logged sets — not in-session, since in-session is incomplete.
  let lastWeekWorst = null;
  if (state.lastSession) {
    for (let n = 1; n <= 6; n++) {
      const d = state.lastSession[`${name}|working|${n}`];
      if (!d) continue;
      const r = parseInt(d.reps);
      if (isNaN(r) || r <= 0) continue;
      if (lastWeekWorst === null || r < lastWeekWorst) lastWeekWorst = r;
    }
  }

  // Per-set rep target: STRICTLY +1 over THIS set's last reps, capped at hi.
  const _repTarget = () => {
    if (thisSetLastReps != null) return Math.min(hi, thisSetLastReps + 1);
    return lo;
  };
  const _repReason = (suffix = '') => {
    if (thisSetLastReps == null) return `Aim for ${lo} clean reps${suffix}`;
    if (thisSetLastReps >= hi) return `🔥 Locked in — match your ${thisSetLastReps}${suffix}`;
    return `💪 Last time set ${setKey + 1} was ${thisSetLastReps} — push to ${thisSetLastReps + 1}${suffix}`;
  };
  const _mode = () => {
    if (thisSetLastReps != null && thisSetLastReps >= hi) return 'match';
    return 'add-rep';
  };

  // Graduate gate: +1 weight step ONLY when last session's worst set was at
  // the top of the range (and we're not in-session — need a full prior session).
  const canGraduate = !isInSession && lastWeekWorst != null && lastWeekWorst >= hi;

  // ---------- Bodyweight: only rep progression matters ----------
  if (isBW) {
    if (canGraduate) return { weight: null, bands: null, reps: hi + 1, reason: `🔥 Crushed ${hi} clean across all sets — push to ${hi + 1}`, mode: 'graduate', source };
    return { weight: null, bands: null, reps: _repTarget(), reason: _repReason(), mode: _mode(), source };
  }

  // ---------- Assist (pull-ups): graduate = LESS assist ----------
  if (isAssist) {
    if (canGraduate && lastBands && lastBands.length > 0) {
      const lighter = _lighterAssist(lastBands);
      const droppedSum = lastBands.reduce((a,b)=>a+b,0) - (lighter ? lighter.reduce((a,b)=>a+b,0) : 0);
      return { weight: null, bands: lighter || [], reps: lo, reason: `🔥 Hit ${hi} across all sets — drop ${droppedSum}lb assist`, mode: 'graduate', source };
    }
    return { weight: null, bands: lastBands, reps: _repTarget(), reason: _repReason(' at same assist'), mode: _mode(), source };
  }

  // ---------- Band-only (RDL, pushdowns): graduate = heavier band stack ----------
  if (isBand) {
    if (canGraduate) {
      const heavier = _heavierBandStack(lastBands || []);
      if (heavier) {
        const addedSum = heavier.reduce((a,b)=>a+b,0) - (lastBands || []).reduce((a,b)=>a+b,0);
        return { weight: null, bands: heavier, reps: lo, reason: `🔥 Crushed ${hi} across all sets — stack +${addedSum}lb band`, mode: 'graduate', source };
      }
    }
    return { weight: null, bands: lastBands, reps: _repTarget(), reason: _repReason(' at same bands'), mode: _mode(), source };
  }

  // ---------- bandAddon (squats): combined = DB + bands. ----------
  if (isBandAddon) {
    const bandSum = (lastBands || []).reduce((a,b)=>a+b,0);
    const lastDB = (lastWeight || 0) - bandSum;
    if (canGraduate) {
      const nextDB = _nextWeightStep(lastDB, effective);
      if (nextDB) {
        return { weight: nextDB, bands: lastBands || [], reps: lo, reason: `🔥 Crushed ${hi} at ${lastWeight}lb — bump DB to ${nextDB}`, mode: 'graduate', source };
      }
      const heavier = _heavierBandStack(lastBands || []);
      if (heavier) {
        const addedSum = heavier.reduce((a,b)=>a+b,0) - bandSum;
        return { weight: lastDB || null, bands: heavier, reps: lo, reason: `🔥 DB maxed — add +${addedSum}lb band`, mode: 'graduate', source };
      }
    }
    return { weight: lastDB || null, bands: lastBands, reps: _repTarget(), reason: _repReason(' at same load'), mode: _mode(), source };
  }

  // ---------- Plain dumbbell: graduate = heavier weight ----------
  if (lastWeight == null) return null;
  if (canGraduate) {
    const next = _nextWeightStep(lastWeight, effective);
    if (next) return { weight: next, bands: null, reps: lo, reason: `🔥 Crushed ${hi} at ${lastWeight}lb — bump to ${next}`, mode: 'graduate', source };
    return { weight: lastWeight, bands: null, reps: hi + 1, reason: `🔥 Top of ladder — push past ${hi}`, mode: 'add-rep', source };
  }
  return { weight: lastWeight, bands: null, reps: _repTarget(), reason: _repReason(` at ${lastWeight}lb`), mode: _mode(), source };
}

function getLastReps(exIdx, setKey) {
  // Check last session data for this exercise/set
  if (!state.lastSession) return null;
  const ex = state.workout.exercises[exIdx];
  // For superset sub-exercises, use the sub-exercise name
  const subEx = getSubExercise(exIdx, setKey);
  const lookupName = subEx ? subEx.name : ex.name;
  const setType = setKey === "warmup" ? "warmup" : "working";
  // DB stores set_number = interleaved index + 1 for supersets (matches
  // autoSave's loop), so the lookup uses the same formula for all exercises.
  const setNum = setKey === "warmup" ? 0 : setKey + 1;
  const primary = `${lookupName}|${setType}|${setNum}`;
  let data = state.lastSession[primary];
  if (!data && subEx && typeof setKey === "number") {
    // Fallback: find any round of this sub-exercise (same sub-index in round)
    const subs = ex.supersetExercises;
    const subIdx = setKey % subs.length;
    for (let round = 0; round < 10; round++) {
      const candNum = round * subs.length + subIdx + 1;
      const cand = state.lastSession[`${lookupName}|working|${candNum}`];
      if (cand && cand.reps) { data = cand; break; }
    }
  }
  if (data && data.reps) {
    const n = parseInt(data.reps);
    return isNaN(n) ? null : n;
  }
  return null;
}

function logReps(exIdx, setKey, reps, isWarmup, ev) {
  // setKey comes as string from onclick — parse to number for working sets
  const sk = (setKey === "warmup") ? "warmup" : parseInt(setKey);
  // Auto-commit any visible "LAST" hint as an explicit pick BEFORE the save
  // so saved data matches what was on screen. Previously the save layer
  // silently fell back to the hint, which was invisible to the user — they'd
  // see "60 LAST" but not realize 60 was about to be persisted, leading to
  // historical sets being filled with predictions instead of measurements.
  // Now whatever shows on the chip becomes state and is visibly committed.
  const k = `${exIdx}-${sk}`;
  const ex = state.workout.exercises[exIdx];
  if (ex && !ex.bodyweight && state.weights[k] == null) {
    if (ex.bandAddon) {
      const hintDB = getHintDBWeight(exIdx, sk);
      if (hintDB != null) state.weights[k] = hintDB;
    } else if (!ex.assist && !(ex.equipment === 'band')) {
      const hint = getHintWeight(exIdx, sk);
      if (hint != null) state.weights[k] = hint;
    }
    // assist & band-only exercises derive weight from band selection at save
    // time (BW − sum or sum), so no hint needs committing here.
  }
  // Capture clicked button rect BEFORE render() replaces the DOM, so the
  // set-completion animation can be anchored where the user just tapped.
  let _setRect = null;
  try {
    const tgt = ev && (ev.currentTarget || ev.target);
    if (tgt && tgt.getBoundingClientRect) _setRect = tgt.getBoundingClientRect();
  } catch (_) {}
  const workoutWasDoneBefore = allDone();
  const wasDoneBefore = isExerciseFullyDone(exIdx);
  state.reps[`${exIdx}-${sk}`] = reps;
  state.completed[`${exIdx}-${sk}`] = true;
  if (_setRect) runSetCelebration(_setRect, reps);
  // If this set is the one that just finished the exercise, fire the big
  // celebration and request motivation. Only on actual user action — never
  // on page reload, since we no longer trigger from render.
  if (!wasDoneBefore && isExerciseFullyDone(exIdx)) {
    runCelebration(exIdx);
    requestMotivation(exIdx);
  }
  // If this set just completed the WHOLE workout, fire the witty closer.
  if (!workoutWasDoneBefore && allDone()) {
    requestFinishMotivation();
  }
  if (!state.running) startTimer();
  // Rest timer:
  //  - after warmup: FULL duration (need real rest before working sets begin)
  //  - after working sets: full duration (per-exercise override or workout default)
  //  - skipped between superset sub-exercises within the same round
  //  - skipped after the last working set of an exercise IF the next exercise
  //    starts with a warmup — warmup is meant to be light, so resting right
  //    before it is wasted time. Rest comes AFTER the warmup instead.
  {
    const ex = state.workout.exercises[exIdx];
    const baseRest = ex.rest || state.workout.rest || 0;
    let restDur = 0;
    if (isWarmup) {
      // Full rest after warmup (was half — too short for the actual working set).
      restDur = baseRest;
    } else {
      let skipRestBetween = false;
      if (ex.supersetExercises && typeof sk === "number") {
        const subIdx = sk % ex.supersetExercises.length;
        // Skip rest if not the last sub-exercise in a round
        if (subIdx < ex.supersetExercises.length - 1) skipRestBetween = true;
      }
      // Skip rest before next exercise's warmup. Looks at the NEXT
      // exercise: if it has a warmup that hasn't been turned off and isn't a
      // superset (which doesn't have warmups), no rest before it.
      const setCount = getSetCount(exIdx);
      const isLastWorkingOfExercise = (typeof sk === 'number' && sk === setCount - 1);
      if (isLastWorkingOfExercise) {
        const nextEx = state.workout.exercises[exIdx + 1];
        const nextHasWarmup = nextEx
          && !nextEx.supersetExercises
          && !state.warmupOff?.[exIdx + 1]
          && !state.completed[`${exIdx + 1}-warmup`];
        if (nextHasWarmup) skipRestBetween = true;
      }
      if (!skipRestBetween) restDur = baseRest;
    }
    if (restDur > 0) startRest(restDur);
  }
  if (allDone()) { stopTimer(); skipRest(); }
  triggerSave();
  render();
}

function undoSet(exIdx, setKey) {
  delete state.reps[`${exIdx}-${setKey}`];
  state.completed[`${exIdx}-${setKey}`] = false;
  triggerSave();
  render();
}

// Walk every completed set in the current session that belongs to the
// given exercise NAME (matches top-level exercises AND superset
// sub-exercises). Yields {weight, reps} for each. Used by the PR/stat
// helpers below.












function getBandSelection(exIdx, setKey) {
  const k = `${exIdx}-${setKey}-bands`;
  if (state.bands?.[k]?.length) return state.bands[k];
  // Auto-fill from last session's bands_json
  const ex = state.workout.exercises[exIdx];
  const subEx = getSubExercise(exIdx, setKey);
  const effectiveEx = subEx ? { ...ex, ...subEx } : ex;
  // Auto-suggest applies to anything that uses bands: equipment="band" (assist
  // and band-only) or bandAddon (squats with optional resistance bands).
  if (effectiveEx.equipment !== 'band' && !effectiveEx.bandAddon) return [];
  if (!state.lastSession) return [];
  const exName = subEx ? subEx.name : ex.name;
  const setType = setKey === "warmup" ? "warmup" : "working";
  const setNum = setKey === "warmup" ? 0 : setKey + 1;
  // Try exact match, then fall back to other sets of same exercise
  const tryKeys = setKey === "warmup"
    ? [`${exName}|warmup|0`, `${exName}|working|1`]
    : [`${exName}|${setType}|${setNum}`, `${exName}|working|1`, `${exName}|working|2`, `${exName}|working|3`];
  // PURE read — never mutate state here. Suggestions return without being
  // stored in state.bands, so renderers can distinguish an explicit pick
  // (state.bands[k] set) from a displayed-only suggestion.
  for (const key of tryKeys) {
    const data = state.lastSession[key];
    if (data?.bands_json) {
      try {
        const bands = JSON.parse(data.bands_json);
        if (Array.isArray(bands) && bands.length > 0) return bands;
      } catch(e) {}
    }
  }
  return [];
}

function toggleBand(exIdx, setKey, bandLb) {
  const k = `${exIdx}-${setKey}-bands`;
  if (!state.bands) state.bands = {};
  const current = state.bands[k] || [];
  const idx = current.indexOf(bandLb);
  if (idx >= 0) {
    current.splice(idx, 1);
  } else {
    current.push(bandLb);
  }
  state.bands[k] = current;
  const ex = state.workout.exercises[exIdx];
  const sum = current.reduce((a, b) => a + b, 0);
  // Three modes:
  //   • assist (pull-ups): bands SUBTRACT from bodyweight → store BW−sum
  //   • bandAddon (squats): DB + bands are independent → leave state.weights alone
  //   • band-only (RDL, pushdowns): bands ARE the load → store sum
  if (ex?.assist) {
    state.weights[`${exIdx}-${setKey}`] = sum > 0 ? Math.max(0, (state.bodyweight || 175) - sum) : null;
  } else if (ex?.bandAddon) {
    // intentionally leave state.weights[k] (DB) untouched
  } else {
    state.weights[`${exIdx}-${setKey}`] = sum || null;
  }
  triggerSave();
  render();
}

// One-tap apply for the "use last bands" shortcut. Commits the auto-suggested
// band set as an explicit selection so it persists across reloads.
function applyBandSelection(exIdx, setKey, bandsCSV) {
  const bands = bandsCSV.split(',').map(n => parseInt(n)).filter(n => !isNaN(n));
  const k = `${exIdx}-${setKey}-bands`;
  if (!state.bands) state.bands = {};
  state.bands[k] = bands.slice();
  const ex = state.workout.exercises[exIdx];
  const sum = bands.reduce((a, b) => a + b, 0);
  if (ex?.assist) {
    state.weights[`${exIdx}-${setKey}`] = sum > 0 ? Math.max(0, (state.bodyweight || 175) - sum) : null;
  } else if (ex?.bandAddon) {
    // bandAddon: DB and bands are independent — don't touch state.weights
  } else {
    state.weights[`${exIdx}-${setKey}`] = sum || null;
  }
  triggerSave();
  render();
}


// One-tap commit for a progression suggestion: sets the DB weight and the
// band selection at once. Reps are still logged manually so you confirm the
// rep count after the set, not before.
// Toggle the weight picker between collapsed (working ± 1 step) and expanded
// (full ladder) per active set. Lives in state.expandedPicker so a render
// preserves the choice; resets naturally when the workout reloads.







// ----- Measurements screen -----
// Body measurements feature: stored cm values from a smart-tape app (FitDays
// style) or manual entry. Each row carries chest/waist/hip/arms/thighs/calves
// + neck + shoulder. Latest snapshot, per-metric trend graphs, and a history
// list, plus an inline form for adding the next reading.
const MEASUREMENT_METRICS = [
  // group: 'core' | 'limbs' | 'composite' — used to group graphs
  { id: 'chest_cm',    label: 'Chest',     group: 'core',     direction: 'up',    color: '#ef4444' },
  { id: 'shoulder_cm', label: 'Shoulder',  group: 'core',     direction: 'up',    color: '#f59e0b' },
  { id: 'waist_cm',    label: 'Waist',     group: 'core',     direction: 'down',  color: '#3b82f6' },
  { id: 'hip_cm',      label: 'Hip',       group: 'core',     direction: 'flat',  color: '#8b5cf6' },
  { id: 'neck_cm',     label: 'Neck',      group: 'core',     direction: 'up',    color: '#0891b2' },
  { id: 'l_arm_cm',    label: 'L Arm',     group: 'limbs',    direction: 'up',    color: '#dc2626' },
  { id: 'r_arm_cm',    label: 'R Arm',     group: 'limbs',    direction: 'up',    color: '#dc2626' },
  { id: 'l_thigh_cm',  label: 'L Thigh',   group: 'limbs',    direction: 'up',    color: '#7c3aed' },
  { id: 'r_thigh_cm',  label: 'R Thigh',   group: 'limbs',    direction: 'up',    color: '#7c3aed' },
  { id: 'l_calf_cm',   label: 'L Calf',    group: 'limbs',    direction: 'up',    color: '#15803d' },
  { id: 'r_calf_cm',   label: 'R Calf',    group: 'limbs',    direction: 'up',    color: '#15803d' },
  { id: 'head_cm',     label: 'Head',      group: 'misc',     direction: 'flat',  color: '#9ca3af' },
  { id: 'weight_kg',   label: 'Weight',    group: 'misc',     direction: 'flat',  color: '#1f2937', unit: 'kg' },
];

// Paired L/R sparkline — both lines on one chart, shared y-axis so the gap
// between them reads as actual asymmetry. Solid = right, dashed = left.






async function submitMeasurement() {
  const dateEl = document.getElementById('meas-date');
  const date = dateEl?.value || new Date().toISOString().slice(0, 10);
  const taken_at = `${date}T${new Date().toTimeString().slice(0, 8)}Z`;
  const payload = { taken_at, date };
  let any = false;
  for (const m of MEASUREMENT_METRICS) {
    const el = document.getElementById(`meas-${m.id}`);
    const v = parseFloat(el?.value);
    if (!isNaN(v) && v > 0) {
      payload[m.id] = v;
      any = true;
    }
  }
  if (!any) {
    alert('Enter at least one measurement.');
    return;
  }
  try {
    const res = await fetch('/api/measurements', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`status ${res.status}`);
    state.measurements = undefined; // force re-fetch
    await showMeasurements();
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

async function deleteMeasurement(id) {
  if (!confirm('Delete this measurement?')) return;
  try {
    const res = await fetch(`/api/measurements/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`status ${res.status}`);
    state.measurements = undefined;
    await showMeasurements();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

// ----- Stats screen -----

// Load home screen data
async function loadHomeData() {
  try {
    const [histRes, activeRes] = await Promise.all([
      fetch("/api/history?limit=100"),
      fetch("/api/active-sessions"),
    ]);
    state.history = await histRes.json();
    muscleStatus = computeMuscleStatus(state.history);
    state._activeSessions = await activeRes.json();
    render();
  } catch (e) { console.error("[HOME] Error:", e); }
}

// Initial render — check URL hash for deep link
const initHash = location.hash.replace('#', '');
const initWorkout = initHash ? WORKOUTS.find(w => w.id === initHash) : null;
if (initWorkout) {
  startWorkout(initWorkout);
} else if (initHash === 'stats') {
  state.screen = 'stats';
  render();
  loadHomeData();
} else {
  render();
  loadHomeData();
}
</script>
