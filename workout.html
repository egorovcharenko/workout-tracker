<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; margin: 0; }
  .weight-btn { min-width: 32px; padding: 2px 6px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .reps-btn { width: 36px; height: 36px; border-radius: 50%; font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: all 0.15s; display:inline-flex; align-items:center; justify-content:center; }
  .set-btn { width: 32px; height: 32px; border-radius: 50%; font-weight: 700; font-size: 12px; border: none; cursor: pointer; transition: all 0.2s; }
  .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; transition: all 0.3s; overflow: hidden; }
  .scroll-row { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; max-width: 100%; }
  .scroll-row::-webkit-scrollbar { display: none; }
  .card.done { background: #f0fdf4; border-color: #bbf7d0; }
  .timer-circle { transition: stroke-dashoffset 1s linear; }
  .save-pulse { animation: pulse 0.6s ease-out; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* ---------- Dark mode (always on) ---------- */
  /*
     Strategy: invert luminance globally, preserve hue, mute saturation.
     NOTE: body background is propagated to the HTML/canvas by CSS, so a
     filter on body never reaches the page bg. Instead we:
       1. Set html + body bg explicitly to the dark color we want (no filter).
       2. Apply the filter to #app (the actual content wrapper).
       3. Unshift media/emoji inside #app so they render as authored.
  */
  :root { color-scheme: dark; }
  html, body { background: #18191c; }
  #app {
    filter: invert(0.92) hue-rotate(180deg) saturate(0.78);
  }
  #app img, #app video, #app svg, #app iframe, #app embed, #app object, #app [data-noinvert] {
    filter: invert(1) hue-rotate(180deg) saturate(1.28);
  }

  /* ---------- Celebration animations ---------- */
  #celebration-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
  .ce-particle { position: absolute; will-change: transform, opacity; }

  @keyframes ce-confetti {
    0% { transform: translate(-50%,-50%) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)); opacity: 0; }
  }
  @keyframes ce-fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
  }
  @keyframes ce-shake {
    0%,100% { transform: translateX(0) rotate(0); }
    15% { transform: translateX(-12px) rotate(-1.5deg); }
    30% { transform: translateX(12px) rotate(1.5deg); }
    45% { transform: translateX(-9px) rotate(-1deg); }
    60% { transform: translateX(9px) rotate(1deg); }
    75% { transform: translateX(-4px) rotate(-0.4deg); }
    90% { transform: translateX(4px) rotate(0.4deg); }
  }
  .ce-shaking #app { animation: ce-shake 0.55s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes ce-bigtext {
    0% { transform: translate(-50%,-50%) scale(0.2) rotate(-10deg); opacity: 0; }
    25% { transform: translate(-50%,-50%) scale(1.3) rotate(2deg); opacity: 1; }
    55% { transform: translate(-50%,-50%) scale(1) rotate(-2deg); opacity: 1; }
    100% { transform: translate(-50%,-55%) scale(1.5) rotate(0); opacity: 0; }
  }
  @keyframes ce-bubble {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    35% { transform: translate(-50%,-50%) scale(1.15) rotate(-3deg); opacity: 1; }
    55% { transform: translate(-50%,-50%) scale(1) rotate(2deg); opacity: 1; }
    80% { transform: translate(-50%,-50%) scale(1) rotate(-1deg); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
  }
  @keyframes ce-firework {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.4); opacity: 0; }
  }
  @keyframes ce-bounce {
    0% { transform: translate(-50%, -120vh) rotate(0); opacity: 1; }
    55% { transform: translate(-50%, 0) rotate(380deg); opacity: 1; }
    70% { transform: translate(-50%, -40px) rotate(360deg); }
    85% { transform: translate(-50%, 0) rotate(360deg); }
    100% { transform: translate(-50%, -8px) rotate(360deg); opacity: 0; }
  }
  @keyframes ce-cannonL {
    0% { transform: translate(-120%, -50%) rotate(0); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)); opacity: 0; }
  }
  @keyframes ce-cannonR {
    0% { transform: translate(120%, -50%) rotate(0); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)); opacity: 0; }
  }
  @keyframes ce-flameUp {
    0% { transform: translate(-50%, 0) scale(0.6); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% - 60vh)) scale(1.2); opacity: 0; }
  }
  @keyframes ce-slotPop {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  }
</style>
</head>

// State
let state = {

  workout: null,
  completed: {},

let timerInterval = null;
let restInterval = null;
let muscleStatus = {}; // { muscle: { hoursAgo, load, date } }

function computeMuscleStatus(history) {
  const now = Date.now();
  const status = {};
  // Go through history (newest first) and find when each muscle was last worked
  for (const session of history) {
    const sessionDate = new Date(session.date + "T12:00:00");
    const hoursAgo = (now - sessionDate.getTime()) / (1000 * 60 * 60);
    for (const set of session.sets) {
      const mapping = EXERCISE_MUSCLES[set.exercise];
      if (!mapping) continue;
      const load = set.weight_lb || 0;
      const reps = parseInt(set.reps) || 0;
      const volume = load * reps;
      for (const m of mapping.primary) {
        if (!status[m] || hoursAgo < status[m].hoursAgo) {
          status[m] = { hoursAgo, volume, date: session.date, workout: session.workout_name };
        } else if (hoursAgo === status[m].hoursAgo) {
          status[m].volume += volume;
        }
      }
      for (const m of mapping.secondary) {
        const vol = volume * 0.5;
        if (!status[m] || hoursAgo < status[m].hoursAgo) {
          status[m] = { hoursAgo, volume: vol, date: session.date, workout: session.workout_name };
        } else if (hoursAgo === status[m].hoursAgo) {
          status[m].volume += vol;
        }
      }
    }
  }
  return status;
}

function getRecoveryColor(hoursAgo) {
  if (hoursAgo == null) return { bg: "#f3f4f6", fg: "#9ca3af", label: "No data", pct: 0 };
  if (hoursAgo < 24) return { bg: "#fecaca", fg: "#dc2626", label: "Worked today", pct: 15 };
  if (hoursAgo < 48) return { bg: "#fed7aa", fg: "#ea580c", label: "Recovering", pct: 50 };
  if (hoursAgo < 72) return { bg: "#fef08a", fg: "#ca8a04", label: "Almost ready", pct: 80 };
  return { bg: "#bbf7d0", fg: "#16a34a", label: "Ready", pct: 100 };
}

function getWorkoutRecovery(workout) {
  // Collect all muscles this workout targets
  const musclePcts = {};
  const allExercises = [];
  for (const ex of workout.exercises) {
    if (ex.supersetExercises) ex.supersetExercises.forEach(sub => allExercises.push(sub));
    else allExercises.push(ex);
  }
  for (const ex of allExercises) {
    const mapping = EXERCISE_MUSCLES[ex.name];
    if (!mapping) continue;
    for (const m of mapping.primary) {
      const s = muscleStatus[m];
      musclePcts[m] = getRecoveryColor(s?.hoursAgo).pct;
    }
    for (const m of mapping.secondary) {
      const s = muscleStatus[m];
      if (!musclePcts[m]) musclePcts[m] = getRecoveryColor(s?.hoursAgo).pct;
    }
  }
  const vals = Object.values(musclePcts);
  if (vals.length === 0) return { avg: 0, muscles: {} };
  const avg = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
  return { avg, muscles: musclePcts };
}

function recoveryBadge(pct) {
  let bg, fg, label;
  if (pct >= 80) { bg = "#dcfce7"; fg = "#16a34a"; label = "Ready"; }
  else if (pct >= 50) { bg = "#fef9c3"; fg = "#ca8a04"; label = "Recovering"; }
  else if (pct > 0) { bg = "#fee2e2"; fg = "#dc2626"; label = "Sore"; }
  else { bg = "#f3f4f6"; fg = "#9ca3af"; label = "No data"; }
  return `<span style="font-size:11px;font-weight:600;color:${fg};background:${bg};padding:3px 8px;border-radius:8px;white-space:nowrap">${label} ${pct}%</span>`;
}

async function loadMuscleStatus() {
  try {
    const res = await fetch("/api/history?limit=30");
    const history = await res.json();
    muscleStatus = computeMuscleStatus(history);
    render();
  } catch (e) { console.error("[MUSCLE] Error:", e); }
}

// Only returns explicitly set weight for this exact set
function getSetWeight(exIdx, setKey) {
  const k = `${exIdx}-${setKey}`;
  return state.weights[k] != null ? state.weights[k] : null;
}

// Returns the weight from a previous set as a suggestion (dashed hint)
// Only looks within the SAME exercise — previous sets, warmup, or last session
function getHintWeight(exIdx, setKey) {
  // For working sets: check previous working set in THIS session first
  // (but NOT warmup — warmup weight is too light to hint working sets)
  if (typeof setKey === "number" && setKey > 0) {
    const prev = getSetWeight(exIdx, setKey - 1);
    if (prev != null) return prev;
    return getHintWeight(exIdx, setKey - 1);
  }
  // For working set 0 (and all other cases): go straight to last session data
  if (state.lastSession && state.workout) {
    const ex = state.workout.exercises[exIdx];
    // For superset sub-exercises, use the sub-exercise name for DB lookup
    const subEx = getSubExercise(exIdx, setKey);
    const lookupName = subEx ? subEx.name : ex.name;
    // DB stores set_number = interleaved index + 1 (matches autoSave loop).
    const setNum = setKey === "warmup" ? 0 : setKey + 1;
    const setType = setKey === "warmup" ? "warmup" : "working";
    // For supersets, fall back across other rounds of the same sub-exercise
    // (interleaved set_numbers for Pushdowns in a 2-sub superset are 1, 3, 5).
    let tryKeys;
    if (setKey === "warmup") {
      tryKeys = [`${lookupName}|warmup|0`, `${lookupName}|working|1`];
    } else if (subEx) {
      const subs = ex.supersetExercises;
      const subIdx = setKey % subs.length;
      tryKeys = [`${lookupName}|working|${setNum}`];
      for (let round = 0; round < 10; round++) {
        const n = round * subs.length + subIdx + 1;
        if (n !== setNum) tryKeys.push(`${lookupName}|working|${n}`);
      }
    } else {
      tryKeys = [`${lookupName}|${setType}|${setNum}`, `${lookupName}|working|1`, `${lookupName}|working|2`, `${lookupName}|working|3`];
    }
    for (const k of tryKeys) {
      const data = state.lastSession[k];
      if (data?.weight_lb) return data.weight_lb;
    }
  }
  return null;
}

// For saving: use explicit weight, or fall back to hint
function getEffectiveWeight(exIdx, setKey) {
  if (state.workout.exercises[exIdx]?.bodyweight) return null;
  return getSetWeight(exIdx, setKey) || getHintWeight(exIdx, setKey);
}

function getSetCount(exIdx) {
  const ex = state.workout.exercises[exIdx];
  const base = ex.supersetExercises ? ex.sets * ex.supersetExercises.length : ex.sets;
  return base + (state.extraSets?.[exIdx] || 0);
}

// For superset exercises: get the sub-exercise for a given set index
function getSubExercise(exIdx, setKey) {
  const ex = state.workout.exercises[exIdx];
  if (!ex.supersetExercises || setKey === "warmup") return null;
  const subIdx = typeof setKey === "number" ? setKey % ex.supersetExercises.length : 0;
  return ex.supersetExercises[subIdx];
}

function getSupersetRound(exIdx, setKey) {
  const ex = state.workout.exercises[exIdx];
  if (!ex.supersetExercises || typeof setKey !== "number") return null;
  return Math.floor(setKey / ex.supersetExercises.length);
}
function totalSets() { return state.workout.exercises.reduce((s, e, i) => s + getSetCount(i) + (e.supersetExercises || state.warmupOff?.[i] ? 0 : 1), 0); }
function completedSets() { return Object.values(state.completed).filter(Boolean).length; }
function allDone() { return completedSets() === totalSets(); }

function addSet(exIdx) {
  if (!state.extraSets) state.extraSets = {};

}
function removeLastSet(exIdx) {
  const count = getSetCount(exIdx);
  if (count <= 1) return;
  const lastIdx = count - 1;
  // Remove last set — even if completed
  delete state.weights[`${exIdx}-${lastIdx}`];
  delete state.reps[`${exIdx}-${lastIdx}`];
  delete state.completed[`${exIdx}-${lastIdx}`];
  if (!state.extraSets) state.extraSets = {};
  const base = state.workout.exercises[exIdx].sets;
  const extra = state.extraSets[exIdx] || 0;
  if (extra > 0) {
    state.extraSets[exIdx] = extra - 1;
  } else {
    state.extraSets[exIdx] = (state.extraSets[exIdx] || 0) - 1;
  }
  triggerSave();
  render();
}
// Swappable exercise groups — any exercise can be swapped for others in its group
const SWAP_GROUPS = [
  [
    { name: "Dumbbell Bicep Curls", sets: 2, reps: "8-12", notes: "Finish strong", superset: false, video: "https://www.youtube.com/shorts/MKWBV29S6c0" },

  ],
];
function getSwapOptions(exerciseName) {
  for (const group of SWAP_GROUPS) {
    if (group.some(e => e.name === exerciseName)) {
      return group.filter(e => e.name !== exerciseName);
    }
  }
  return [];
}
function isSwappable(exerciseName) {
  return SWAP_GROUPS.some(g => g.some(e => e.name === exerciseName));
}
function getSwapGroup(exerciseName) {
  return SWAP_GROUPS.find(g => g.some(e => e.name === exerciseName));
}
function swapExercise(exIdx, newName) {
  const group = getSwapGroup(state.workout.exercises[exIdx].name);
  if (!group) return;
  const swap = group.find(e => e.name === newName);

  delete state.completed[`${exIdx}-warmup`];

  if (state.extraSets) state.extraSets[exIdx] = 0;

  state.swapOpen = null;

}

function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function localDate() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// API — auto-save on every set toggle
let saveTimeout = null;

async function autoSave() {
  const w = state.workout;
  const sets = [];
  w.exercises.forEach((ex, exIdx) => {
    if (state.completed[`${exIdx}-warmup`]) {
      const bands = getBandSelection(exIdx, "warmup");
      sets.push({ exercise: ex.name, set_type: "warmup", set_number: 0, reps: String(state.reps[`${exIdx}-warmup`] || ex.reps), weight_lb: getEffectiveWeight(exIdx, "warmup"), bands_json: bands.length ? JSON.stringify(bands) : null });
    }
    for (let i = 0; i < getSetCount(exIdx); i++) {
      if (state.completed[`${exIdx}-${i}`]) {
        const subEx = getSubExercise(exIdx, i);
        const exName = subEx ? subEx.name : ex.name;
        const exReps = subEx ? subEx.reps : ex.reps;
        const bands = getBandSelection(exIdx, i);
        sets.push({ exercise: exName, set_type: "working", set_number: i + 1, reps: String(state.reps[`${exIdx}-${i}`] || exReps), weight_lb: getEffectiveWeight(exIdx, i), bands_json: bands.length ? JSON.stringify(bands) : null });
      }
    }
  });
  if (sets.length === 0) return;
  const body = {
    workout: w.name,
    date: localDate(),
    duration_sec: state.elapsed,
    session_id: state.sessionId || null,
    sets
  };
  try {
    const res = await fetch("/api/save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const data = await res.json();
    if (data.ok) {
      state.sessionId = data.id;
      state.lastSaved = Date.now();
      console.log(`[AUTO-SAVE] Session #${data.id} — ${sets.length} sets`);
    }
  } catch (e) {
    console.error("[AUTO-SAVE] Error:", e);
  }
}

// Debounced save — waits 500ms after last action to avoid spamming
function triggerSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(autoSave, 500);
}

async function loadSessionData(workoutName) {
  try {
    // First check if there's a session from today to resume
    const todayRes = await fetch(`/api/today-session?workout=${encodeURIComponent(workoutName)}`);
    const todayData = await todayRes.json();

    if (todayData && todayData.id) {
      // Resume today's session
      state.sessionId = todayData.id;
      state.elapsed = todayData.duration_sec || 0;
      // Auto-detect swapped exercises: if saved exercise isn't in template but is in a swap group, replace the template entry
      const savedNames = new Set(todayData.sets.map(s => s.exercise));
      savedNames.forEach(name => {
        const inTemplate = state.workout.exercises.some(e => e.name === name);
        if (!inTemplate) {
          const group = getSwapGroup(name);
          if (group) {
            // Find which template exercise is in the same group and replace it
            const pairIdx = state.workout.exercises.findIndex(e => group.some(g => g.name === e.name));
            if (pairIdx >= 0) {
              const savedEx = group.find(g => g.name === name);
              state.workout.exercises[pairIdx] = { ...savedEx };
              console.log(`[RESUME] Auto-swapped → ${name}`);
            }
          }
        }
      });
      // Track max set_number per exercise to compute extraSets
      const maxSetNum = {};
      // Track per-sub-exercise occurrence counts for superset remapping
      const supersetCounts = {};
      todayData.sets.forEach(s => {
        let exIdx = state.workout.exercises.findIndex(e => e.name === s.exercise);
        let setNum = s.set_number;
        // Check inside superset exercises if not found at top level
        if (exIdx < 0) {
          for (let ei = 0; ei < state.workout.exercises.length; ei++) {
            const ex = state.workout.exercises[ei];
            if (ex.supersetExercises) {
              const subIdx = ex.supersetExercises.findIndex(sub => sub.name === s.exercise);
              if (subIdx >= 0) {
                exIdx = ei;
                // Track how many times we've seen this sub-exercise to determine the round
                const countKey = `${ei}-${subIdx}`;
                supersetCounts[countKey] = (supersetCounts[countKey] || 0);
                const round = supersetCounts[countKey];
                supersetCounts[countKey]++;
                setNum = round * ex.supersetExercises.length + subIdx + 1;
                break;
              }
            }
          }
        }
        if (exIdx < 0) return;
        const sk = s.set_type === "warmup" ? "warmup" : setNum - 1;
        const key = `${exIdx}-${sk}`;
        state.completed[key] = true;
        if (s.weight_lb) state.weights[key] = s.weight_lb;
        if (s.reps) state.reps[key] = parseInt(s.reps) || 0;
        if (s.bands_json) {
          try {
            const bands = JSON.parse(s.bands_json);
            if (Array.isArray(bands) && bands.length > 0) {
              if (!state.bands) state.bands = {};
              state.bands[`${key}-bands`] = bands;
            }
          } catch(e) {}
        }
        if (s.set_type === "working") {
          maxSetNum[exIdx] = Math.max(maxSetNum[exIdx] || 0, setNum);
        }
      });
      // Restore extra/fewer sets from DB
      state.extraSets = {};
      Object.entries(maxSetNum).forEach(([exIdx, maxNum]) => {
        const ex = state.workout.exercises[exIdx];
        const base = ex.supersetExercises ? ex.sets * ex.supersetExercises.length : ex.sets;
        // Only record EXTRA sets (added via + button). Never shrink the
        // template based on how many sets you've finished so far — that
        // would hide unfinished sets on resume.
        if (maxNum > base) {
          state.extraSets[exIdx] = maxNum - base;
        }
      });
      console.log(`[RESUME] Restored session #${todayData.id} with ${todayData.sets.length} sets`);
    }

    // Load hints + 1RM history — resilient: one failing endpoint must not
    // block the others or the final render() call.
    async function safeFetchJSON(url, fallback) {
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error(`${url} → ${r.status}`);
        return await r.json();
      } catch (e) {
        console.warn(`[LOAD] ${url} failed:`, e);
        return fallback;
      }
    }
    const [lastJson, hintsJson, ormData] = await Promise.all([
      safeFetchJSON(`/api/last-session?workout=${encodeURIComponent(workoutName)}`, {}),
      safeFetchJSON("/api/exercise-hints", {}),
      safeFetchJSON("/api/1rm-history", { orm: {}, reps: {}, vol: {} }),
    ]);
    state.lastSession = lastJson || {};
    state.exerciseHints = hintsJson || {};
    state.ormHistory = ormData.orm || {};
    state.repsHistory = ormData.reps || {};
    state.volHistory = ormData.vol || {};

    // Merge: same-workout session takes priority, cross-workout fills gaps
    const merged = { ...state.exerciseHints, ...state.lastSession };
    state.lastSession = merged;

    // Weight hints are handled by getHintWeight() — no pre-fill into state.weights
    // so they show as dotted suggestions, not pre-selected

    render();
  } catch (e) { console.error("[LOAD] Error:", e); }
}

// ----- AI motivation -----
// Once per (sessionId, exercise), call /api/motivate and stash the message
// in state.motivations so the exercise summary can render it.
async function requestMotivation(exIdx) {
  const ex = state.workout.exercises[exIdx];
  const sid = state.sessionId || 'tmp';
  const cacheKey = `${sid}-${exIdx}`;
  if (!state.motivations) state.motivations = {};
  if (!state.motivationsLoading) state.motivationsLoading = {};
  if (state.motivations[cacheKey] !== undefined) return;     // already done (or null = no API key)
  if (state.motivationsLoading[cacheKey]) return;            // in flight
  state.motivationsLoading[cacheKey] = true;

  // Build current-session payload for this exercise (incl. any sub-exercises)
  const subs = ex.supersetExercises || [{ name: ex.name, ...ex }];
  const subNames = subs.map(s => s.name);
  const current = [];
  if (state.completed[`${exIdx}-warmup`]) {
    current.push({
      sub: ex.name,
      type: 'warmup',
      reps: state.reps[`${exIdx}-warmup`],
      weight_lb: state.weights[`${exIdx}-warmup`],
    });
  }
  for (let i = 0; i < getSetCount(exIdx); i++) {
    if (!state.completed[`${exIdx}-${i}`]) continue;
    const subEx = getSubExercise(exIdx, i);
    current.push({
      sub: subEx ? subEx.name : ex.name,
      type: 'working',
      set_number: i + 1,
      reps: state.reps[`${exIdx}-${i}`],
      weight_lb: state.weights[`${exIdx}-${i}`],
    });
  }

  // Pull last 1-2 sessions of these sub-exercises out of state.history
  const previous = [];
  for (const sess of (state.history || []).slice(0, 4)) {
    const sets = sess.sets.filter(s => subNames.includes(s.exercise));
    if (sets.length) previous.push({
      date: sess.date,
      sets: sets.map(s => ({ sub: s.exercise, type: s.set_type, reps: s.reps, weight_lb: s.weight_lb })),
    });
    if (previous.length >= 2) break;
  }

  // Look up muscles for primary sub-exercise (first sub for supersets)
  const muscles = [];
  for (const name of subNames) {
    const m = (typeof MUSCLE_MAPPING === 'object' && MUSCLE_MAPPING[name]) || null;
    if (m) muscles.push(...(m.primary || []), ...(m.secondary || []));
  }

  try {
    const res = await fetch('/api/motivate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ exercise: ex.name, muscles: [...new Set(muscles)], current, previous }),
    });
    const data = await res.json();
    state.motivations[cacheKey] = data.message || null;
  } catch (e) {
    console.warn('[MOTIVATE]', e);
    state.motivations[cacheKey] = null;
  } finally {
    state.motivationsLoading[cacheKey] = false;
    render();
  }
}

function startWorkout(w) {
  state.screen = "workout"; state.workout = w; state.completed = {}; state.weights = {}; state.reps = {};
  state.elapsed = 0; state.running = false; state.saved = false; state.showGif = {};
  state.sessionId = null; state.lastSaved = null;
  history.replaceState(null, '', '#' + w.id);
  render();
  loadSessionData(w.name);
}

// Render
function render() {
  const app = document.getElementById("app");
  if (state.screen === "home") app.innerHTML = renderHome();
  else if (state.screen === "workout") app.innerHTML = renderWorkout();
  else if (state.screen === "stats") app.innerHTML = renderStats();
  // history merged into home
  requestAnimationFrame(scrollToSelected);
}

function showStats() {
  state.screen = "stats";
  history.replaceState(null, '', '#stats');
  render();
}

function scrollToSelected() {
  document.querySelectorAll('.scroll-row').forEach(row => {
    const target = row.querySelector('[data-scroll-target]');
    if (!target || row.scrollWidth <= row.clientWidth) return;
    // Use getBoundingClientRect for accurate positioning regardless of offset parents
    const rowRect = row.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const targetCenterInRow = (targetRect.left - rowRect.left) + row.scrollLeft + targetRect.width / 2;
    row.scrollLeft = Math.max(0, targetCenterInRow - rowRect.width / 2);
  });
}

function renderWorkoutCard(w, i) {
  const rec = getWorkoutRecovery(w);
  const exerciseNames = [];
  w.exercises.forEach(ex => {
    if (ex.supersetExercises) {
      ex.supersetExercises.forEach(sub => exerciseNames.push(sub));
    } else {
      exerciseNames.push(ex);
    }
  });
  const exerciseList = exerciseNames.map(ex => {
    const mapping = EXERCISE_MUSCLES[ex.name];
    const primaryMuscles = mapping ? mapping.primary : [];
    let worstPct = 100;
    for (const m of primaryMuscles) {
      const s = muscleStatus[m];
      const p = getRecoveryColor(s?.hoursAgo).pct;
      if (p < worstPct) worstPct = p;
    }
    let dotColor;
    if (worstPct >= 80) dotColor = "#22c55e";
    else if (worstPct >= 50) dotColor = "#eab308";
    else if (worstPct > 0) dotColor = "#ef4444";
    else dotColor = "#d1d5db";
    return '<span style="display:inline-flex;align-items:center;gap:3px;font-size:12px;color:#6b7280">' +
      '<span style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';display:inline-block;flex-shrink:0"></span>' +
      ex.name + '</span>';
  }).join('<span style="color:#e5e7eb;font-size:10px;margin:0 2px">&middot;</span>');

  return '<button onclick="startWorkout(WORKOUTS[' + i + '])" style="width:100%;text-align:left;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
      '<div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600;color:#111827">' + w.name + '</span>' + (w.main ? '<span style="font-size:10px;background:#dbeafe;color:#2563eb;padding:1px 6px;border-radius:4px;font-weight:600">MAIN</span>' : '') + '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        recoveryBadge(rec.avg) +
        '<span style="color:#d1d5db;font-size:18px">&rarr;</span>' +
      '</div>' +
    '</div>' +
    '<div style="font-size:13px;color:#9ca3af;margin-bottom:6px">' + w.exercises.length + ' exercises &middot; ' + w.duration + '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:4px;line-height:1.6">' + exerciseList + '</div>' +
  '</button>';
}

function getExpectedSets(workoutName) {
  const w = WORKOUTS.find(w => w.name === workoutName);
  if (!w) return 999; // unknown workout, don't filter
  return w.exercises.reduce((s, e) => s + e.sets + 1, 0); // working sets + warmup per exercise
}

function toggleWarmup(exIdx) {
  if (!state.warmupOff) state.warmupOff = {};
  state.warmupOff[exIdx] = !state.warmupOff[exIdx];
  // If turning off warmup, mark it as completed so it doesn't block progress
  if (state.warmupOff[exIdx]) {
    state.completed[`${exIdx}-warmup`] = true;
  } else {
    delete state.completed[`${exIdx}-warmup`];
  }
  triggerSave();
  render();
}

function getNextSet() {
  if (!state.workout) return null;
  const w = state.workout;
  for (let exIdx = 0; exIdx < w.exercises.length; exIdx++) {
    const ex = w.exercises[exIdx];
    const warmupOff = state.warmupOff?.[exIdx];
    if (!ex.supersetExercises && !warmupOff && !state.completed[`${exIdx}-warmup`]) return { exIdx, setKey: "warmup" };
    for (let i = 0; i < getSetCount(exIdx); i++) {
      if (!state.completed[`${exIdx}-${i}`]) return { exIdx, setKey: i };
    }
  }
  return null;
}

function renderRestSeparator() {
  const dur = state.workout.rest;
  const pct = ((dur - state.restLeft) / dur) * 100;
  const isLow = state.restLeft <= 10;
  const color = isLow ? "#ef4444" : "#3b82f6";
  const bg = isLow ? "#fef2f2" : "#eff6ff";
  const border = isLow ? "#fecaca" : "#bfdbfe";
  return `
    <div style="margin:8px 0;border-radius:8px;overflow:hidden;border:1px solid ${border};background:${bg}">
      <div style="position:relative;height:50px;background:#e5e7eb;border-radius:8px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${color};transition:width 1s linear;opacity:0.2;border-radius:8px"></div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px">
          <span style="font-size:20px;font-weight:700;color:${color};font-variant-numeric:tabular-nums">rest &middot; ${state.restLeft}s</span>
          <button onclick="skipRest()" style="font-size:12px;color:#6b7280;background:white;border:1px solid #e5e7eb;border-radius:6px;padding:4px 14px;cursor:pointer">skip →</button>
        </div>
      </div>
    </div>
  `;
}

function getRepsOptions(targetReps) {
  const [lo, hi] = parseRepRange(targetReps);
  const pad = hi - lo <= 3 ? 3 : 2;
  const start = Math.max(1, lo - pad);
  const end = hi + pad;
  const opts = [];
  for (let i = start; i <= end; i++) opts.push(i);
  return opts;
}

function repsBtnStyle(r, selected, hinted, inRange) {
  if (selected) return 'background:#22c55e;color:white;box-shadow:0 1px 3px rgba(34,197,94,0.4);outline:2px solid #86efac;';
  if (hinted) return 'background:white;color:#86efac;border:2px dashed #86efac;';
  if (inRange) return 'background:#f0fdf4;color:#16a34a;border:1.5px solid #86efac;';
  return 'background:#fafafa;color:#a3a3a3;border:1px solid #e5e7eb;';
}

function parseRepRange(repsStr) {
  // Parse "10-12" → [10,12], or "12" → [12,12]
  const parts = String(repsStr).split("-").map(s => parseInt(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
  if (parts.length === 1 && !isNaN(parts[0])) return [parts[0], parts[0]];
  return [8, 12]; // default hypertrophy range
}

function getLastReps(exIdx, setKey) {
  // Check last session data for this exercise/set
  if (!state.lastSession) return null;
  const ex = state.workout.exercises[exIdx];
  // For superset sub-exercises, use the sub-exercise name
  const subEx = getSubExercise(exIdx, setKey);
  const lookupName = subEx ? subEx.name : ex.name;
  const setType = setKey === "warmup" ? "warmup" : "working";
  // DB stores set_number = interleaved index + 1 for supersets (matches
  // autoSave's loop), so the lookup uses the same formula for all exercises.
  const setNum = setKey === "warmup" ? 0 : setKey + 1;
  const primary = `${lookupName}|${setType}|${setNum}`;
  let data = state.lastSession[primary];
  if (!data && subEx && typeof setKey === "number") {
    // Fallback: find any round of this sub-exercise (same sub-index in round)
    const subs = ex.supersetExercises;
    const subIdx = setKey % subs.length;
    for (let round = 0; round < 10; round++) {
      const candNum = round * subs.length + subIdx + 1;
      const cand = state.lastSession[`${lookupName}|working|${candNum}`];
      if (cand && cand.reps) { data = cand; break; }
    }
  }
  if (data && data.reps) {
    const n = parseInt(data.reps);
    return isNaN(n) ? null : n;
  }
  return null;
}

function logReps(exIdx, setKey, reps, isWarmup) {
  // setKey comes as string from onclick — parse to number for working sets
  const sk = (setKey === "warmup") ? "warmup" : parseInt(setKey);
  state.reps[`${exIdx}-${sk}`] = reps;
  state.completed[`${exIdx}-${sk}`] = true;
  if (!state.running) startTimer();
  // Rest timer after every working set
  // Skip rest only between superset partners (e.g. curls→extensions with no break)
  if (!isWarmup) {
    const ex = state.workout.exercises[exIdx];
    // For superset exercises: skip rest between sub-exercises within the same round
    let skipRest = false;
    if (ex.supersetExercises && typeof sk === "number") {
      const subIdx = sk % ex.supersetExercises.length;
      // Skip rest if not the last sub-exercise in a round
      if (subIdx < ex.supersetExercises.length - 1) skipRest = true;
    }
    if (!skipRest) {
      const restDur = ex.rest || state.workout.rest;
      startRest(restDur);
    }
  }
  if (allDone()) { stopTimer(); skipRest(); }
  triggerSave();
  render();
}

function undoSet(exIdx, setKey) {
  delete state.reps[`${exIdx}-${setKey}`];
  state.completed[`${exIdx}-${setKey}`] = false;
  triggerSave();
  render();
}

function currentSessionOrm(exerciseName) {
  // Calculate best 1RM from current session's completed working sets for this exercise
  const exIdx = state.workout ? state.workout.exercises.findIndex(e => e.name === exerciseName) : -1;
  if (exIdx < 0) return 0;
  const ex = state.workout.exercises[exIdx];
  let best = 0;
  for (let i = 0; i < getSetCount(exIdx); i++) {
    if (!state.completed[`${exIdx}-${i}`]) continue;
    const w = state.weights[`${exIdx}-${i}`];
    const r = parseInt(state.reps[`${exIdx}-${i}`]) || 0;
    if (!w || r <= 0) continue;
    const orm = r > 1 ? w * (1 + r / 30) : w;
    if (orm > best) best = orm;
  }
  return Math.round(best * 10) / 10;
}

function currentSessionBestReps(exerciseName) {
  const exIdx = state.workout ? state.workout.exercises.findIndex(e => e.name === exerciseName) : -1;
  if (exIdx < 0) return 0;
  let best = 0;
  for (let i = 0; i < getSetCount(exIdx); i++) {
    if (!state.completed[`${exIdx}-${i}`]) continue;
    const r = parseInt(state.reps[`${exIdx}-${i}`]) || 0;
    if (r > best) best = r;
  }
  return best;
}

function renderBWSparkline(exerciseName) {
  const data = mergeWithLive((state.repsHistory || {})[exerciseName] || [], currentSessionBestReps(exerciseName), "reps");
  const vals = data.map(d => d.reps);
  return miniSparkline(vals, "Reps", "", "#8b5cf6");
}

function currentSessionVolume(exerciseName) {
  if (!state.workout) return 0;
  let vol = 0;
  state.workout.exercises.forEach((ex, exIdx) => {
    if (ex.supersetExercises) {
      ex.supersetExercises.forEach((sub, s) => {
        if (sub.name !== exerciseName) return;
        for (let round = 0; round < ex.sets; round++) {
          const idx = round * ex.supersetExercises.length + s;
          if (!state.completed[`${exIdx}-${idx}`]) continue;
          const w = state.weights[`${exIdx}-${idx}`] || 0;
          const r = parseInt(state.reps[`${exIdx}-${idx}`]) || 0;
          if (w > 0 && r > 0) vol += w * r;
        }
      });
    } else if (ex.name === exerciseName) {
      for (let i = 0; i < getSetCount(exIdx); i++) {
        if (!state.completed[`${exIdx}-${i}`]) continue;
        const w = state.weights[`${exIdx}-${i}`] || 0;
        const r = parseInt(state.reps[`${exIdx}-${i}`]) || 0;
        if (w > 0 && r > 0) vol += w * r;
      }
    }
  });
  return Math.round(vol);
}

function miniSparkline(vals, label, unit, color) {
  if (vals.length < 2) return "";
  const latest = vals[vals.length - 1];
  const prev = vals[vals.length - 2];
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  const w = 48, h = 20, pad = 2;
  const points = vals.map((v, i) =>
    `${pad + (i / (vals.length - 1)) * (w - pad * 2)},${pad + (1 - (v - min) / range) * (h - pad * 2)}`
  ).join(" ");
  const trend = latest >= prev ? "#16a34a" : "#ef4444";
  const arrow = latest >= prev ? "↑" : "↓";
  const diff = Math.abs(latest - prev);
  const dispVal = latest >= 1000 ? (latest / 1000).toFixed(1) + "k" : Math.round(latest);
  const diffDisp = diff >= 1000 ? (diff / 1000).toFixed(1) + "k" : Math.round(diff);
  const diffStr = diff > 0 ? `${latest >= prev ? '+' : '−'}${diffDisp}` : '';
  return `<div style="display:flex;align-items:center;gap:2px">
    <div style="text-align:right">
      <div style="font-size:7px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.03em">${label}</div>
      <div style="font-size:9px;color:${trend};font-weight:600;line-height:1">${dispVal}${unit}</div>
    </div>
    <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      <polyline points="${points}" fill="none" stroke="${trend}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${pad + ((vals.length - 1) / (vals.length - 1)) * (w - pad * 2)}" cy="${pad + (1 - (latest - min) / range) * (h - pad * 2)}" r="2" fill="${trend}"/>
    </svg>
    ${diffStr ? `<div style="font-size:8px;color:${trend};font-weight:600;white-space:nowrap">${diffStr}</div>` : ''}
  </div>`;
}

function mergeWithLive(serverData, liveVal, key) {
  const today = localDate();
  let data = serverData.map(d => ({ ...d }));
  if (liveVal > 0) {
    const todayIdx = data.findIndex(d => d.date === today);
    if (todayIdx >= 0) {
      data[todayIdx][key] = Math.max(data[todayIdx][key], liveVal);
    } else {
      data.push({ date: today, [key]: liveVal });
    }
  }
  return data;
}

function dualSparkline(series) {
  // series: [{vals, label, color}] — two lines on one chart
  const valid = series.filter(s => s.vals.length >= 2);
  if (valid.length === 0) return "";
  const allVals = valid.flatMap(s => s.vals);
  const globalMin = Math.min(...allVals);
  const globalMax = Math.max(...allVals);
  const range = globalMax - globalMin || 1;
  const w = 64, h = 24, pad = 2;
  const maxLen = Math.max(...valid.map(s => s.vals.length));

  const lines = valid.map(s => {
    const latest = s.vals[s.vals.length - 1];
    const prev = s.vals[s.vals.length - 2];
    const trend = latest >= prev ? "#16a34a" : "#ef4444";
    const diff = Math.abs(latest - prev);
    const points = s.vals.map((v, i) =>
      `${pad + (i / (maxLen - 1)) * (w - pad * 2)},${pad + (1 - (v - globalMin) / range) * (h - pad * 2)}`
    ).join(" ");
    const cy = pad + (1 - (latest - globalMin) / range) * (h - pad * 2);
    const cx = pad + ((s.vals.length - 1) / (maxLen - 1)) * (w - pad * 2);
    return { points, cx, cy, color: s.color, trend, latest, diff, label: s.label, up: latest >= prev };
  });

  const svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    ${lines.map(l => `
      <polyline points="${l.points}" fill="none" stroke="${l.color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <circle cx="${l.cx}" cy="${l.cy}" r="2" fill="${l.color}"/>
    `).join('')}
  </svg>`;

  const labels = lines.map(l => {
    const dispVal = l.latest >= 1000 ? (l.latest / 1000).toFixed(1) + 'k' : Math.round(l.latest);
    const diffDisp = l.diff >= 1000 ? (l.diff / 1000).toFixed(1) + 'k' : Math.round(l.diff);
    const diffStr = l.diff > 0 ? `${l.up ? '+' : '−'}${diffDisp}` : '';
    return `<div style="display:flex;align-items:center;gap:2px">
      <span style="font-size:7px;color:${l.color};font-weight:600">${l.label}</span>
      <span style="font-size:8px;color:${l.trend};font-weight:600">${diffStr}</span>
    </div>`;
  }).join('');

  return `<div style="display:flex;align-items:center;gap:3px">
    ${svg}
    <div>${labels}</div>
  </div>`;
}

function renderSupersetSparkline(ex) {
  if (!ex.supersetExercises) return "";
  const subs = ex.supersetExercises;
  const colors = ["#7c3aed", "#2563eb"];

  // Volume sparkline — both sub-exercises on one chart
  const volSeries = subs.map((sub, s) => {
    const volData = mergeWithLive((state.volHistory || {})[sub.name] || [], currentSessionVolume(sub.name), "vol");
    const shortName = sub.name.split(' ').pop();
    return { vals: volData.map(d => d.vol), label: shortName, color: colors[s % colors.length] };
  });

  // Reps sparkline — total reps per session for each sub
  const repsSeries = subs.map((sub, s) => {
    const repsData = mergeWithLive((state.repsHistory || {})[sub.name] || [], currentSessionTotalReps(sub.name), "reps");
    const shortName = sub.name.split(' ').pop();
    return { vals: repsData.map(d => d.reps), label: shortName, color: colors[s % colors.length] };
  });

  const volHTML = dualSparkline(volSeries);
  const repsHTML = dualSparkline(repsSeries);
  if (!volHTML && !repsHTML) return "";
  return `<div style="display:flex;gap:8px;align-items:center">${volHTML}${repsHTML}</div>`;
}

function currentSessionTotalReps(exerciseName) {
  if (!state.workout) return 0;
  let total = 0;
  state.workout.exercises.forEach((ex, exIdx) => {
    if (ex.supersetExercises) {
      ex.supersetExercises.forEach((sub, s) => {
        if (sub.name !== exerciseName) return;
        for (let round = 0; round < ex.sets; round++) {
          const idx = round * ex.supersetExercises.length + s;
          const r = state.reps[`${exIdx}-${idx}`];
          if (r) total += r;
        }
      });
    } else if (ex.name === exerciseName) {
      for (let i = 0; i < getSetCount(exIdx); i++) {
        const r = state.reps[`${exIdx}-${i}`];
        if (r) total += r;
      }
    }
  });
  return total;
}

function renderSparkline(exerciseName) {
  const exInWorkout = state.workout?.exercises.find(e => e.name === exerciseName);
  const isBW = exInWorkout?.bodyweight;
  if (isBW) return renderBWSparkline(exerciseName);

  // 1RM sparkline
  const ormData = mergeWithLive((state.ormHistory || {})[exerciseName] || [], currentSessionOrm(exerciseName), "orm");
  const ormVals = ormData.map(d => d.orm);
  const ormHTML = miniSparkline(ormVals, "1RM", "lb", "#3b82f6");

  // Volume sparkline
  const volData = mergeWithLive((state.volHistory || {})[exerciseName] || [], currentSessionVolume(exerciseName), "vol");
  const volVals = volData.map(d => d.vol);
  const volHTML = miniSparkline(volVals, "Vol", "lb", "#8b5cf6");

  if (!ormHTML && !volHTML) return "";
  return `<div style="display:flex;gap:8px;align-items:center">${ormHTML}${volHTML}</div>`;
}

function getBandSelection(exIdx, setKey) {
  const k = `${exIdx}-${setKey}-bands`;
  if (state.bands?.[k]?.length) return state.bands[k];
  // Auto-fill from last session's bands_json
  const ex = state.workout.exercises[exIdx];
  const subEx = getSubExercise(exIdx, setKey);
  const effectiveEx = subEx ? { ...ex, ...subEx } : ex;
  if (effectiveEx.equipment !== 'band') return [];
  if (!state.lastSession) return [];
  const exName = subEx ? subEx.name : ex.name;
  const setType = setKey === "warmup" ? "warmup" : "working";
  const setNum = setKey === "warmup" ? 0 : setKey + 1;
  // Try exact match, then fall back to other sets of same exercise
  const tryKeys = setKey === "warmup"
    ? [`${exName}|warmup|0`, `${exName}|working|1`]
    : [`${exName}|${setType}|${setNum}`, `${exName}|working|1`, `${exName}|working|2`, `${exName}|working|3`];
  // PURE read — never mutate state here. Suggestions return without being
  // stored in state.bands, so renderers can distinguish an explicit pick
  // (state.bands[k] set) from a displayed-only suggestion.
  for (const key of tryKeys) {
    const data = state.lastSession[key];
    if (data?.bands_json) {
      try {
        const bands = JSON.parse(data.bands_json);
        if (Array.isArray(bands) && bands.length > 0) return bands;
      } catch(e) {}
    }
  }
  return [];
}

function toggleBand(exIdx, setKey, bandLb) {
  const k = `${exIdx}-${setKey}-bands`;
  if (!state.bands) state.bands = {};
  const current = state.bands[k] || [];
  const idx = current.indexOf(bandLb);
  if (idx >= 0) {
    current.splice(idx, 1);
  } else {
    current.push(bandLb);
  }
  state.bands[k] = current;
  state.weights[`${exIdx}-${setKey}`] = current.reduce((a, b) => a + b, 0) || null;
  triggerSave();
  render();
}

function renderSetRow(exIdx, setKey, label, isDone, targetReps, isWarmup, isNext) {
  const ex = state.workout.exercises[exIdx];
  const subEx = getSubExercise(exIdx, setKey);
  const effectiveEx = subEx ? { ...ex, ...subEx } : ex;
  const isBand = effectiveEx.equipment === "band";
  const isBW = effectiveEx.bodyweight;
  const w = getSetWeight(exIdx, setKey);
  const wHint = w == null ? getHintWeight(exIdx, setKey) : null;
  const loggedReps = state.reps[`${exIdx}-${setKey}`];
  const labelColor = isWarmup ? '#d97706' : '#6b7280';
  const doneColor = isWarmup ? '#f59e0b' : '#22c55e';
  const selectedBands = getBandSelection(exIdx, setKey);

  if (isDone && loggedReps) {
    const bandSummary = isBW ? '' : isBand && selectedBands.length > 0
      ? `<span style="font-size:12px;font-family:monospace;color:#7c3aed">@ ${selectedBands.reduce((a,b)=>a+b,0)}lb bands</span>`
      : (w ? `<span style="font-size:12px;font-family:monospace;color:#2563eb">@ ${w}lb</span>` : '');
    const subNameTag = subEx ? `<span style="font-size:10px;color:#7c3aed;font-weight:500">${subEx.name.split(' ').pop()}</span>` : '';
    return `
      <div style="border-bottom:1px solid #f9fafb;padding:10px 0;display:flex;align-items:center;gap:8px;opacity:0.85">
