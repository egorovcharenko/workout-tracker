              <div style="font-size:18px;font-weight:700;color:#15803d">${totalReps}</div>
            </div>
            ${statSparkline(repsVals, '#22c55e')}
          </div>
        </div>
        <div style="background:#fef3c7;border-radius:8px;padding:10px 12px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.03em">Sessions</div>
              <div style="font-size:18px;font-weight:700;color:#92400e">${totalSessions}</div>
            </div>
            ${statSparkline(setsVals, '#f59e0b')}
          </div>
        </div>
        <div style="background:#f5f3ff;border-radius:8px;padding:10px 12px">
          <div>
            <div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.03em">Time</div>
            <div style="font-size:18px;font-weight:700;color:#7c3aed">${timeStr}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSessionList() {
  const WORKOUT_COLORS = {
    "Arms & Shoulders": "#8b5cf6",
    "Back": "#f59e0b",
    "Full Body A": "#3b82f6",
    "Full Body": "#3b82f6",
    "Full Body B": "#10b981",
  };

  // Lookup: which exercises are assist-style (effective load = BW − bands)?
  // Lets us decorate their per-row line with the assist amount from bands_json.
  const assistExerciseNames = new Set();
  WORKOUTS.forEach(w => {
    w.exercises.forEach(ex => {
      if (ex.assist) assistExerciseNames.add(ex.name);
      if (ex.supersetExercises) ex.supersetExercises.forEach(s => { if (s.assist) assistExerciseNames.add(s.name); });
    });
  });

  // Pre-compute per-workout volume trends for sparklines
  const history = state.history || [];
  const workoutVolTrend = {};
  // Process oldest-first for sparklines
  [...history].reverse().forEach(s => {
    let vol = 0;
    s.sets.forEach(st => {
      if (st.set_type === 'working') vol += (st.weight_lb || 0) * (parseInt(st.reps) || 0);
    });
    if (!workoutVolTrend[s.workout_name]) workoutVolTrend[s.workout_name] = [];
    workoutVolTrend[s.workout_name].push(vol);
  });

  function historySparkline(workoutName, currentIdx) {
    const trend = workoutVolTrend[workoutName];
    if (!trend || trend.length < 2) return '';
    // Show up to this session's position in the trend
    const vals = trend.slice(0, currentIdx + 1);
    if (vals.length < 2) return '';
    const max = Math.max(...vals), min = Math.min(...vals), range = max - min || 1;
    const w = 50, h = 18, pad = 2;
    const points = vals.map((v, i) =>
      `${pad + (i / (vals.length - 1)) * (w - pad * 2)},${pad + (1 - (v - min) / range) * (h - pad * 2)}`
    ).join(' ');
    const latest = vals[vals.length - 1];
    const prev = vals[vals.length - 2];
    const trend2 = latest >= prev ? '#16a34a' : '#ef4444';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
      <polyline points="${points}" fill="none" stroke="${trend2}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      <circle cx="${pad + ((vals.length - 1) / (vals.length - 1)) * (w - pad * 2)}" cy="${pad + (1 - (latest - min) / range) * (h - pad * 2)}" r="2" fill="${trend2}"/>
    </svg>`;
  }

  // Track per-workout session index (oldest first)
  const workoutSessionIdx = {};

  const byDate = {};
  history.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });
  const dates = Object.keys(byDate).sort().reverse();

  const sessionList = dates.map(date => {
    const sessions = byDate[date];
    const dateLabel = new Date(date + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    const sessionCards = sessions.map(s => {
      const dur = s.duration_sec ? formatTime(s.duration_sec) : "?";
      const color = WORKOUT_COLORS[s.workout_name] || "#6b7280";
      const byEx = {};
      let totalVol = 0;
      let totalReps = 0;
      s.sets.forEach(st => {
        if (!byEx[st.exercise]) byEx[st.exercise] = [];
        byEx[st.exercise].push(st);
        if (st.set_type === "working") {
          const r = parseInt(st.reps) || 0;
          const w = st.weight_lb || 0;
          totalReps += r;
          totalVol += w * r;
        }
      });
      const workingSetCount = s.sets.filter(st => st.set_type === "working").length;

      // Get sparkline index for this workout (count from end since history is newest-first)
      if (!workoutSessionIdx[s.workout_name]) workoutSessionIdx[s.workout_name] = (workoutVolTrend[s.workout_name] || []).length;
      workoutSessionIdx[s.workout_name]--;
      const sparkIdx = workoutSessionIdx[s.workout_name];
      const volSparkHTML = historySparkline(s.workout_name, sparkIdx);

      // Build superset grouping from workout templates
      const supersetGroups = {};
      const supersetNames = {};
      WORKOUTS.forEach(w => {
        w.exercises.forEach(ex => {
          if (ex.supersetExercises) {
            ex.supersetExercises.forEach(sub => {
              supersetGroups[sub.name] = ex.name;
              if (!supersetNames[ex.name]) supersetNames[ex.name] = [];
              if (!supersetNames[ex.name].includes(sub.name)) supersetNames[ex.name].push(sub.name);
            });
          }
        });
      });

      // Group exercises, merging superset sub-exercises
      const exEntries = [];
      const seen = new Set();
      Object.entries(byEx).forEach(([ex, sets]) => {
        if (seen.has(ex)) return;
        const groupName = supersetGroups[ex];
        if (groupName && !seen.has(groupName)) {
          // Merge all sub-exercises in this superset
          seen.add(groupName);
          const subNames = supersetNames[groupName] || [];
          subNames.forEach(n => seen.add(n));
          const allSets = subNames.flatMap(n => (byEx[n] || []).filter(st => st.set_type === "working"));
          if (allSets.length > 0) {
            const subSummaries = subNames.map(n => {
              const ws = (byEx[n] || []).filter(st => st.set_type === "working");
              const reps = ws.map(st => parseInt(st.reps) || 0).filter(r => r > 0).join('·');
              const maxW = Math.max(0, ...ws.map(st => st.weight_lb || 0));
              return `<span style="font-size:10px;color:#6b7280;font-family:monospace">${n.split(' ').pop()}: ${reps}${maxW > 0 ? ` @ ${maxW}lb` : ''}</span>`;
            }).join('<br>');
            exEntries.push(`<div style="padding:3px 0">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                <span style="font-size:12px;color:#7c3aed;font-weight:500">${groupName}</span>
                <span style="font-size:9px;background:#f3e8ff;color:#7c3aed;padding:1px 5px;border-radius:9999px;font-weight:500">Superset</span>
              </div>
              <div style="padding-left:8px">${subSummaries}</div>
            </div>`);
          }
        } else if (!groupName) {
          seen.add(ex);
          const workingSets = sets.filter(st => st.set_type === "working");
          if (workingSets.length === 0) return;
          const maxWeight = Math.max(...workingSets.map(st => st.weight_lb || 0));
          const repsList = workingSets.map(st => parseInt(st.reps) || 0).filter(r => r > 0);
          const weightStr = maxWeight > 0 ? `@ ${maxWeight}lb` : "";
          const repsDisplay = repsList.join('·');
          // Assist exercises (pull-ups): surface the assist amount from
          // bands_json so "135lb" doesn't look like a standalone weight.
          let assistTag = '';
          if (assistExerciseNames.has(ex)) {
            const amts = workingSets.map(st => {
              if (!st.bands_json) return 0;
              try {
                const b = JSON.parse(st.bands_json);
                return Array.isArray(b) ? b.reduce((a, x) => a + (+x || 0), 0) : 0;
              } catch (e) { return 0; }
            }).filter(a => a > 0);
            if (amts.length) {
              const minA = Math.min(...amts), maxA = Math.max(...amts);
              const range = minA === maxA ? `${minA}` : `${minA}–${maxA}`;
              assistTag = ` <span style="color:#0891b2">· ${range}lb assist</span>`;
            }
          }
          exEntries.push(`<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0">
            <span style="font-size:12px;color:#374151">${ex}</span>
            <span style="font-size:11px;color:#6b7280;font-family:monospace">${repsDisplay} ${weightStr}${assistTag}</span>
          </div>`);
        }
      });
      const exSummary = exEntries.join("");

      // Per-session muscle volume: walks the saved sets, accumulates weight×reps
      // per muscle (full credit for primary, half for secondary). Renders as a
      // ranked pill row colored by relative load — at-a-glance view of which
      // muscles got the most work this session.
      const volByMuscle = {};
      s.sets.forEach(st => {
        if (st.set_type !== 'working') return;
        const r = parseInt(st.reps) || 0;
        const wt = st.weight_lb || 0;
        if (r <= 0 || wt <= 0) return;
        const m = EXERCISE_MUSCLES[st.exercise];
        if (!m) return;
        const setVol = wt * r;
        (m.primary || []).forEach(mu => { volByMuscle[mu] = (volByMuscle[mu] || 0) + setVol; });
        (m.secondary || []).forEach(mu => { volByMuscle[mu] = (volByMuscle[mu] || 0) + setVol * 0.5; });
      });
      const topMuscles = Object.entries(volByMuscle).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const maxMuscleVol = topMuscles.length ? topMuscles[0][1] : 0;
      const muscleHTML = topMuscles.length ? `
        <div style="margin-top:8px;padding-top:8px;border-top:1px dashed #e5e7eb">
          <div style="font-size:9px;font-weight:600;color:#9ca3af;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px">Muscle load</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            ${topMuscles.map(([m, v]) => {
              const info = MUSCLE_GROUPS[m];
              const pct = v / maxMuscleVol;
              const c = (typeof _volColor === 'function') ? _volColor(pct) : { bg: '#f3f4f6', fg: '#6b7280' };
              const volLabel = v >= 1000 ? `${(v / 1000).toFixed(1)}k` : Math.round(v);
              return `<span style="display:inline-flex;align-items:center;gap:4px;background:${c.bg};color:${c.fg};border:1px solid ${c.fg};font-size:10px;font-weight:500;padding:1px 6px;border-radius:9999px">${info?.label || m}<span style="opacity:0.6;font-family:monospace;font-size:9px">${volLabel}</span></span>`;
            }).join('')}
          </div>
        </div>` : '';

      const volStr = totalVol >= 1000 ? (totalVol / 1000).toFixed(1) + 'k' : totalVol;

      // Compare to previous session of same workout for highlights
      const prevSession = history.find((ps, pi) => pi > history.indexOf(s) && ps.workout_name === s.workout_name);
      let highlightHTML = '';
      if (prevSession) {
        function calcE1RM(w, r) { return r > 1 ? w * (1 + r / 30.0) : w; }
        function exStats(sets) {
          const m = {};
          sets.forEach(st => {
            if (st.set_type !== 'working') return;
            if (!m[st.exercise]) m[st.exercise] = { vol: 0, reps: 0, maxW: 0, best1RM: 0 };
            const r = parseInt(st.reps) || 0;
            const w = st.weight_lb || 0;
            m[st.exercise].vol += w * r;
            m[st.exercise].reps += r;
            m[st.exercise].maxW = Math.max(m[st.exercise].maxW, w);
            if (w > 0 && r > 0) m[st.exercise].best1RM = Math.max(m[st.exercise].best1RM, calcE1RM(w, r));
          });
          return m;
        }
        const prevByEx = exStats(prevSession.sets);
        const curByEx = exStats(s.sets);
        const prs = [];
        Object.entries(curByEx).forEach(([ex, cur]) => {
          const prev = prevByEx[ex];
          if (!prev) return;
          const shortName = ex.split(' ').pop();
          // Priority: 1RM PR > weight PR > volume > reps
          if (cur.best1RM > prev.best1RM && prev.best1RM > 0) {
            const diff = Math.round(cur.best1RM - prev.best1RM);
            if (diff > 0) { prs.push(`💪 ${shortName}: +${diff}lb e1RM`); return; }
          }
          if (cur.maxW > prev.maxW) {
            prs.push(`🏆 ${shortName}: +${cur.maxW - prev.maxW}lb weight`);
          } else if (cur.vol > prev.vol && prev.vol > 0) {
            const pct = Math.round((cur.vol - prev.vol) / prev.vol * 100);
            if (pct >= 5) prs.push(`📈 ${shortName}: +${pct}% vol`);
          } else if (cur.reps > prev.reps) {
            prs.push(`🔥 ${shortName}: +${cur.reps - prev.reps} reps`);
          }
        });
        if (prs.length > 0) {
          highlightHTML = `<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #d9f99d">
            <div style="display:flex;flex-wrap:wrap;gap:4px 10px">
              ${prs.map(p => `<span style="font-size:10px;color:#65a30d;font-weight:500">${p}</span>`).join('')}
            </div>
          </div>`;
        }
      }

      return `<div style="background:white;border:1px solid #e5e7eb;border-left:4px solid ${color};border-radius:8px;padding:12px 14px;margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px;font-weight:600;color:#111827">${s.workout_name}</span>
            ${volSparkHTML}
          </div>
          <span style="font-size:11px;color:#9ca3af;font-family:monospace">${dur}</span>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:8px">
          <span style="font-size:11px;color:#6b7280"><strong style="color:#374151">${workingSetCount}</strong> sets</span>
          <span style="font-size:11px;color:#6b7280"><strong style="color:#374151">${totalReps}</strong> reps</span>
          ${totalVol > 0 ? `<span style="font-size:11px;color:#6b7280"><strong style="color:#374151">${volStr}</strong>lb vol</span>` : ''}
        </div>
        ${exSummary}
        ${muscleHTML}
        ${highlightHTML}
      </div>`;
    }).join("");

    return `<div style="margin-bottom:16px">
      <p style="font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 8px">${dateLabel}</p>
      ${sessionCards}
    </div>`;
  }).join("");

  return sessionList || '<p style="color:#9ca3af;text-align:center;padding:32px 0">No sessions logged yet.</p>';
}

// ----- Measurements screen -----
// Body measurements feature: stored cm values from a smart-tape app (FitDays
// style) or manual entry. Each row carries chest/waist/hip/arms/thighs/calves
// + neck + shoulder. Latest snapshot, per-metric trend graphs, and a history
// list, plus an inline form for adding the next reading.
const MEASUREMENT_METRICS = [
  // group: 'core' | 'limbs' | 'composite' — used to group graphs
  { id: 'chest_cm',    label: 'Chest',     group: 'core',     direction: 'up',    color: '#ef4444' },
  { id: 'shoulder_cm', label: 'Shoulder',  group: 'core',     direction: 'up',    color: '#f59e0b' },
  { id: 'waist_cm',    label: 'Waist',     group: 'core',     direction: 'down',  color: '#3b82f6' },
  { id: 'hip_cm',      label: 'Hip',       group: 'core',     direction: 'flat',  color: '#8b5cf6' },
  { id: 'neck_cm',     label: 'Neck',      group: 'core',     direction: 'up',    color: '#0891b2' },
  { id: 'l_arm_cm',    label: 'L Arm',     group: 'limbs',    direction: 'up',    color: '#dc2626' },
  { id: 'r_arm_cm',    label: 'R Arm',     group: 'limbs',    direction: 'up',    color: '#dc2626' },
  { id: 'l_thigh_cm',  label: 'L Thigh',   group: 'limbs',    direction: 'up',    color: '#7c3aed' },
  { id: 'r_thigh_cm',  label: 'R Thigh',   group: 'limbs',    direction: 'up',    color: '#7c3aed' },
  { id: 'l_calf_cm',   label: 'L Calf',    group: 'limbs',    direction: 'up',    color: '#15803d' },
  { id: 'r_calf_cm',   label: 'R Calf',    group: 'limbs',    direction: 'up',    color: '#15803d' },
  { id: 'head_cm',     label: 'Head',      group: 'misc',     direction: 'flat',  color: '#9ca3af' },
  { id: 'weight_kg',   label: 'Weight',    group: 'misc',     direction: 'flat',  color: '#1f2937', unit: 'kg' },
];

// Paired L/R sparkline — both lines on one chart, shared y-axis so the gap
// between them reads as actual asymmetry. Solid = right, dashed = left.
function _measurementPairedSparkline(leftVals, rightVals, color, direction) {
  const all = [...leftVals, ...rightVals].filter(v => v != null);
  if (all.length === 0) return '';
  const w = 130, h = 38, pad = 3;
  const max = Math.max(...all), min = Math.min(...all), range = max - min || 1;
  function poly(vals) {
    if (!vals.length) return '';
    return vals.map((v, i) =>
      `${pad + (i / Math.max(1, vals.length - 1)) * (w - pad * 2)},${pad + (1 - (v - min) / range) * (h - pad * 2)}`
    ).join(' ');
  }
  const lPts = poly(leftVals);
  const rPts = poly(rightVals);
  // Last-point markers so you can see today's L vs R divergence at a glance.
  const lastIdx = (vals) => vals.length - 1;
  const cx = (vals) => pad + (lastIdx(vals) / Math.max(1, vals.length - 1)) * (w - pad * 2);
  const cy = (v) => pad + (1 - (v - min) / range) * (h - pad * 2);
  const lLast = leftVals.length ? leftVals[leftVals.length - 1] : null;
  const rLast = rightVals.length ? rightVals[rightVals.length - 1] : null;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
    ${lPts ? `<polyline points="${lPts}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,2" opacity="0.55"/>` : ''}
    ${rPts ? `<polyline points="${rPts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>` : ''}
    ${lLast != null ? `<circle cx="${cx(leftVals)}" cy="${cy(lLast)}" r="2.2" fill="white" stroke="${color}" stroke-width="1.4" stroke-dasharray="2,1" opacity="0.85"/>` : ''}
    ${rLast != null ? `<circle cx="${cx(rightVals)}" cy="${cy(rLast)}" r="2.5" fill="${color}"/>` : ''}
  </svg>`;
}

function _measurementSparkline(values, color, direction) {
  // Polyline sparkline. Trend color: green if direction matches goal, red
  // if opposite, gray if flat or insufficient data.
  if (!values.length) return '';
  if (values.length < 2) {
    return `<div style="display:flex;align-items:center;justify-content:center;height:32px;font-size:10px;color:#9ca3af">single reading</div>`;
  }
  const w = 110, h = 36, pad = 3;
  const max = Math.max(...values), min = Math.min(...values), range = max - min || 1;
  const pts = values.map((v, i) =>
    `${pad + (i / (values.length - 1)) * (w - pad * 2)},${pad + (1 - (v - min) / range) * (h - pad * 2)}`
  ).join(' ');
  // Trend = compare oldest vs latest. Direction "up" means we WANT it to grow.
  const first = values[0], last = values[values.length - 1];
  let trendColor = color;
  if (direction === 'up' && last < first) trendColor = '#dc2626';
  else if (direction === 'down' && last > first) trendColor = '#dc2626';
  else if (direction === 'flat') trendColor = '#6b7280';
  else if ((direction === 'up' && last > first) || (direction === 'down' && last < first)) trendColor = '#16a34a';
  const lastX = pad + ((values.length - 1) / (values.length - 1)) * (w - pad * 2);
  const lastY = pad + (1 - (last - min) / range) * (h - pad * 2);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
    <polyline points="${pts}" fill="none" stroke="${trendColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="${lastX}" cy="${lastY}" r="2.5" fill="${trendColor}"/>
  </svg>`;
}

function _formatMeasurementDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso.slice(0, 10);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function _measurementDelta(latest, prev, direction) {
  if (latest == null || prev == null) return null;
  const d = +(latest - prev).toFixed(1);
  if (Math.abs(d) < 0.05) return { d: 0, color: '#9ca3af', sign: '·' };
  let color = '#9ca3af';
  if (direction === 'up')   color = d > 0 ? '#16a34a' : '#dc2626';
  if (direction === 'down') color = d > 0 ? '#dc2626' : '#16a34a';
  if (direction === 'flat') color = '#6b7280';
  return { d, color, sign: d > 0 ? '+' : '' };
}

function renderMeasurements() {
  const list = state.measurements; // undefined while loading
  const loading = list === undefined;
  const entries = list || [];
  const sortedAsc = [...entries].sort((a, b) => (a.taken_at || '').localeCompare(b.taken_at || ''));
  const latest = entries[0]; // newest first per backend ORDER BY
  const prev = entries[1];

  const back = `
    <div style="position:sticky;top:0;background:white;border-bottom:1px solid #f3f4f6;padding:12px 16px;z-index:10;display:flex;align-items:center;gap:12px">
      <button onclick="state.screen='home';history.replaceState(null,'','#');render()" style="color:#2563eb;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer">← Back</button>
      <h2 style="font-size:18px;font-weight:700;margin:0">Measurements</h2>
    </div>`;

  if (loading) return `${back}<div style="padding:32px;text-align:center;color:#9ca3af">Loading…</div>`;
  if (entries.length === 0) {
    return `${back}<div style="padding:24px 16px">
      <p style="color:#6b7280;text-align:center;margin:24px 0">No measurements logged yet.</p>
      ${_renderMeasurementForm()}
    </div>`;
  }

  // Latest snapshot card — show every metric with delta vs previous reading.
  const snapshotRows = MEASUREMENT_METRICS.map(m => {
    const v = latest?.[m.id];
    const pv = prev?.[m.id];
    if (v == null) return '';
    const delta = _measurementDelta(v, pv, m.direction);
    const unit = m.unit || 'cm';
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f3f4f6">
      <span style="font-size:13px;color:#374151">${m.label}</span>
      <div style="display:flex;align-items:baseline;gap:8px">
        <span style="font-size:14px;font-family:monospace;font-weight:600;color:#111827">${v.toFixed(1)}<span style="font-size:10px;color:#9ca3af;margin-left:2px">${unit}</span></span>
        ${delta ? `<span style="font-size:11px;font-family:monospace;color:${delta.color};min-width:40px;text-align:right">${delta.sign}${Math.abs(delta.d).toFixed(1)}</span>` : '<span style="min-width:40px"></span>'}
      </div>
    </div>`;
  }).join('');

  const snapshotCard = `
    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <h3 style="font-size:13px;font-weight:600;color:#111827;margin:0">Latest snapshot</h3>
        <span style="font-size:11px;color:#9ca3af;font-family:monospace">${_formatMeasurementDate(latest.taken_at)}</span>
      </div>
      ${snapshotRows}
    </div>`;

  // Per-metric graphs grouped by region. Sparkline reads oldest → newest.
  function metricBlock(m) {
    const vals = sortedAsc.map(e => e[m.id]).filter(v => v != null);
    if (!vals.length) return '';
    const v = latest?.[m.id], pv = prev?.[m.id];
    const delta = _measurementDelta(v, pv, m.direction);
    const range = vals.length > 1 ? `${Math.min(...vals).toFixed(1)} → ${Math.max(...vals).toFixed(1)}` : `${vals[0].toFixed(1)}`;
    const unit = m.unit || 'cm';
    return `<div style="background:white;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#374151;font-weight:600">${m.label}</span>
        ${delta ? `<span style="font-size:10px;font-family:monospace;color:${delta.color}">${delta.sign}${Math.abs(delta.d).toFixed(1)}</span>` : ''}
      </div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px">
        ${_measurementSparkline(vals, m.color, m.direction)}
        <div style="text-align:right">
          <div style="font-size:14px;font-family:monospace;font-weight:700;color:${m.color}">${(v != null ? v.toFixed(1) : '—')}<span style="font-size:9px;color:#9ca3af;margin-left:1px">${unit}</span></div>
          <div style="font-size:9px;color:#9ca3af;font-family:monospace">${range}</div>
        </div>
      </div>
    </div>`;
  }

  const groupBlock = (title, group) => {
    const blocks = MEASUREMENT_METRICS.filter(m => m.group === group).map(metricBlock).filter(Boolean).join('');
    if (!blocks) return '';
    return `<div style="margin-bottom:14px">
      <h4 style="font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 8px">${title}</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${blocks}</div>
    </div>`;
  };

  // Paired L/R cards — render both sides on a single graph so asymmetry is
  // visible at a glance. Replaces the separate L/R cards in the Limbs group.
  const LIMB_PAIRS = [
    { label: 'Arm',   leftId: 'l_arm_cm',   rightId: 'r_arm_cm',   color: '#dc2626', direction: 'up' },
    { label: 'Thigh', leftId: 'l_thigh_cm', rightId: 'r_thigh_cm', color: '#7c3aed', direction: 'up' },
    { label: 'Calf',  leftId: 'l_calf_cm',  rightId: 'r_calf_cm',  color: '#15803d', direction: 'up' },
  ];
  function pairBlock(p) {
    const lVals = sortedAsc.map(e => e[p.leftId]).filter(v => v != null);
    const rVals = sortedAsc.map(e => e[p.rightId]).filter(v => v != null);
    if (!lVals.length && !rVals.length) return '';
    const lLatest = latest?.[p.leftId];
    const rLatest = latest?.[p.rightId];
    const gap = (lLatest != null && rLatest != null) ? (lLatest - rLatest) : null;
    // Asymmetry color: noticeable gap (≥1cm) gets a red-ish tint; otherwise gray.
    const gapColor = gap == null ? '#9ca3af'
      : Math.abs(gap) >= 1.0 ? '#dc2626'
      : Math.abs(gap) >= 0.5 ? '#f59e0b'
      : '#16a34a';
    const allVals = [...lVals, ...rVals];
    const range = allVals.length > 1 ? `${Math.min(...allVals).toFixed(1)} → ${Math.max(...allVals).toFixed(1)}` : (allVals[0]?.toFixed(1) || '');
    return `<div style="background:white;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#374151;font-weight:600">${p.label}</span>
        <span style="font-size:9px;color:#9ca3af;display:inline-flex;align-items:center;gap:6px">
          <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;border-top:1.4px dashed ${p.color};opacity:0.7"></span>L</span>
          <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;border-top:1.6px solid ${p.color}"></span>R</span>
        </span>
      </div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px">
        ${_measurementPairedSparkline(lVals, rVals, p.color, p.direction)}
        <div style="text-align:right;font-family:monospace;line-height:1.25">
          <div style="font-size:11px;color:${p.color};opacity:0.7">L ${lLatest != null ? lLatest.toFixed(1) : '—'}</div>
          <div style="font-size:13px;font-weight:700;color:${p.color}">R ${rLatest != null ? rLatest.toFixed(1) : '—'}</div>
          <div style="font-size:9px;color:${gapColor};font-weight:600">${gap != null ? `Δ ${gap >= 0 ? '+' : ''}${gap.toFixed(1)}` : ''}</div>
        </div>
      </div>
      <div style="font-size:9px;color:#9ca3af;font-family:monospace;margin-top:4px">range ${range}</div>
    </div>`;
  }

  const limbsPairedHTML = LIMB_PAIRS.map(pairBlock).filter(Boolean).join('');
  const limbsGroupHTML = limbsPairedHTML ? `<div style="margin-bottom:14px">
    <h4 style="font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin:0 0 8px">Limbs <span style="opacity:0.6;font-weight:400;text-transform:none;letter-spacing:0">· left vs right</span></h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${limbsPairedHTML}</div>
  </div>` : '';

  const graphsHTML = `
    ${groupBlock('Core', 'core')}
    ${limbsGroupHTML}
    ${groupBlock('Other', 'misc')}
  `;

  // History list — compact rows with date and key metrics
  const historyRows = entries.map(e => `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-bottom:1px solid #f3f4f6">
      <span style="font-size:11px;color:#6b7280;font-family:monospace;min-width:60px">${_formatMeasurementDate(e.taken_at)}</span>
      <span style="font-size:11px;font-family:monospace;color:#374151;flex:1;text-align:center">
        ${e.chest_cm != null ? `<span style="color:#ef4444">${e.chest_cm.toFixed(1)}c</span>` : '—'} ·
        ${e.waist_cm != null ? `<span style="color:#3b82f6">${e.waist_cm.toFixed(1)}w</span>` : '—'} ·
        ${e.l_arm_cm != null ? `<span style="color:#dc2626">${e.l_arm_cm.toFixed(1)}a</span>` : '—'}
      </span>
      <button onclick="deleteMeasurement(${e.id})" style="font-size:9px;color:#9ca3af;background:none;border:1px solid #e5e7eb;border-radius:4px;padding:2px 6px;cursor:pointer">×</button>
    </div>`).join('');

  const historyCard = `
    <div class="card" style="padding:12px 14px;margin-bottom:12px">
      <h3 style="font-size:13px;font-weight:600;color:#111827;margin:0 0 8px">History · ${entries.length} entries</h3>
      ${historyRows}
    </div>`;

  return `
    ${back}
    <div style="padding:16px">
      ${snapshotCard}
      ${graphsHTML}
      ${historyCard}
      ${_renderMeasurementForm()}
    </div>`;
}

function _renderMeasurementForm() {
  // Inline form to add a new reading. Each metric is optional; empty fields
  // are stored as NULL so partial entries work.
  const inputs = MEASUREMENT_METRICS.map(m => `
    <label style="display:flex;flex-direction:column;gap:2px">
      <span style="font-size:10px;color:#6b7280;font-weight:600">${m.label} (${m.unit || 'cm'})</span>
      <input type="number" step="0.1" id="meas-${m.id}" placeholder="—" style="font-size:13px;padding:6px 8px;border:1px solid #e5e7eb;border-radius:6px;font-family:monospace;width:100%">
    </label>`).join('');
  const today = new Date().toISOString().slice(0, 10);
  return `
    <div class="card" style="padding:14px 16px">
      <h3 style="font-size:13px;font-weight:600;color:#111827;margin:0 0 8px">Add measurement</h3>
      <label style="display:flex;flex-direction:column;gap:2px;margin-bottom:8px">
        <span style="font-size:10px;color:#6b7280;font-weight:600">Date</span>
        <input type="date" id="meas-date" value="${today}" style="font-size:13px;padding:6px 8px;border:1px solid #e5e7eb;border-radius:6px;font-family:monospace">
      </label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">${inputs}</div>
      <button onclick="submitMeasurement()" style="width:100%;background:#2563eb;color:white;border:none;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Save measurement</button>
    </div>`;
}

async function submitMeasurement() {
  const dateEl = document.getElementById('meas-date');
  const date = dateEl?.value || new Date().toISOString().slice(0, 10);
  const taken_at = `${date}T${new Date().toTimeString().slice(0, 8)}Z`;
  const payload = { taken_at, date };
  let any = false;
  for (const m of MEASUREMENT_METRICS) {
    const el = document.getElementById(`meas-${m.id}`);
    const v = parseFloat(el?.value);
    if (!isNaN(v) && v > 0) {
      payload[m.id] = v;
      any = true;
    }
  }
  if (!any) {
    alert('Enter at least one measurement.');
    return;
  }
  try {
    const res = await fetch('/api/measurements', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`status ${res.status}`);
    state.measurements = undefined; // force re-fetch
    await showMeasurements();
  } catch (e) {
    alert('Save failed: ' + e.message);
  }
}

async function deleteMeasurement(id) {
  if (!confirm('Delete this measurement?')) return;
  try {
    const res = await fetch(`/api/measurements/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`status ${res.status}`);
    state.measurements = undefined;
    await showMeasurements();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

// ----- Stats screen -----
function renderStats() {
  const history = state.history || [];
  if (!history.length) {
    return `
      <div style="padding:32px 16px 16px">
        <button onclick="state.screen='home';history.replaceState(null,'','#');render()" style="color:#2563eb;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;padding:0;margin-bottom:12px">← Back</button>
        <h1 style="font-size:24px;font-weight:700;color:#111827">Progress</h1>
        <p style="color:#9ca3af;text-align:center;padding:32px 0">No sessions logged yet.</p>
      </div>`;
  }

  // Aggregate sets per exercise across all sessions
  // Result: { exerciseName: { perSession: [{date, vol, reps, maxWt, bestOrm, topSet:{w,r}}], totalSets, lastDate, equipment } }
  const byEx = {};
  // Sessions arrive newest-first. Walk oldest→newest so perSession is chronological.
  const sessionsAsc = [...history].reverse();
  for (const sess of sessionsAsc) {
    // Group this session's sets by exercise
    const exSetsInSess = {};
    for (const st of (sess.sets || [])) {
      if (st.set_type !== 'working') continue;
      const reps = parseInt(st.reps) || 0;
      const w = st.weight_lb || 0;
      if (reps === 0 && w === 0) continue;
      (exSetsInSess[st.exercise] ||= []).push({ w, r: reps });
    }
    for (const [name, sets] of Object.entries(exSetsInSess)) {
      const vol = sets.reduce((a, s) => a + s.w * s.r, 0);
      const reps = sets.reduce((a, s) => a + s.r, 0);
      const maxWt = sets.reduce((a, s) => Math.max(a, s.w), 0);
      // Epley est. 1RM: w * (1 + r/30)
      const bestOrm = sets.reduce((a, s) => Math.max(a, s.w * (1 + s.r / 30)), 0);
      // Top set: heaviest weight; tiebreak more reps
      const topSet = sets.reduce((a, s) => (!a || s.w > a.w || (s.w === a.w && s.r > a.r)) ? s : a, null);
      (byEx[name] ||= { perSession: [], totalSets: 0, lastDate: null, name }).perSession.push(
        { date: sess.date, vol, reps, maxWt, bestOrm, topSet, sets: sets.length }
      );
      byEx[name].totalSets += sets.length;
      byEx[name].lastDate = sess.date; // last in chronological walk = most recent
    }
  }

  const exList = Object.values(byEx).sort((a, b) => b.lastDate.localeCompare(a.lastDate));

  function spark(vals, color) {
    if (vals.length < 2) return '';
    const max = Math.max(...vals), min = Math.min(...vals), range = max - min || 1;
    const w = 70, h = 22, pad = 2;
    const points = vals.map((v, i) =>
      `${pad + (i / (vals.length - 1)) * (w - pad * 2)},${pad + (1 - (v - min) / range) * (h - pad * 2)}`
    ).join(' ');
    const latest = vals[vals.length - 1];
    const prev = vals[vals.length - 2];
    const trend = latest >= prev ? color : '#ef4444';
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;flex-shrink:0">
      <polyline points="${points}" fill="none" stroke="${trend}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <circle cx="${pad + (w - pad * 2)}" cy="${pad + (1 - (latest - min) / range) * (h - pad * 2)}" r="2" fill="${trend}"/>
    </svg>`;
  }

  function pctChange(first, last) {
    if (!first) return null;
    return Math.round(((last - first) / first) * 100);
  }

  const rows = exList.map(ex => {
    const ps = ex.perSession;
    const last = ps[ps.length - 1];
    const first = ps[0];
    const ormVals = ps.map(p => p.bestOrm).filter(v => v > 0);
    const volVals = ps.map(p => p.vol).filter(v => v > 0);
    const latestOrm = ormVals.length ? ormVals[ormVals.length - 1] : 0;
    const peakOrm = ormVals.length ? Math.max(...ormVals) : 0;
    const isPR = latestOrm > 0 && Math.abs(latestOrm - peakOrm) < 0.01 && ps.length >= 2;
    // Choose what to show based on data availability
    const hasWeight = last.topSet && last.topSet.w > 0;
    const topSetStr = hasWeight
      ? `${last.topSet.w}lb × ${last.topSet.r}`
      : `${last.reps} reps`;
    const sparkVals = ormVals.length >= 2 ? ormVals : volVals;
    const sparkColor = ormVals.length >= 2 ? '#3b82f6' : '#22c55e';
    const dV = pctChange(first.vol, last.vol);
    const dStr = dV === null || ps.length < 2 ? ''
      : dV > 0 ? `<span style="color:#15803d;font-weight:600">+${dV}%</span>`
      : dV < 0 ? `<span style="color:#dc2626;font-weight:600">${dV}%</span>`
      : `<span style="color:#6b7280">±0%</span>`;
    const ormStr = latestOrm > 0 ? `1RM ${Math.round(latestOrm)}` : '';
    const prBadge = isPR ? `<span style="display:inline-block;background:#fef3c7;color:#92400e;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:0.04em;margin-left:6px;vertical-align:middle">PR</span>` : '';
    const daysAgo = (() => {
      const d = new Date(last.date + 'T00:00:00');
      const now = new Date();
      const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
      if (diff <= 0) return 'today';
      if (diff === 1) return '1d';
      if (diff < 7) return `${diff}d`;
      if (diff < 30) return `${Math.floor(diff / 7)}w`;
      return `${Math.floor(diff / 30)}mo`;
    })();

    return `
      <div style="background:white;border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px;margin-bottom:6px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="font-size:13px;font-weight:600;color:#111827;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ex.name}${prBadge}</div>
          ${spark(sparkVals, sparkColor)}
        </div>
        <div style="font-size:11px;color:#6b7280;margin-top:3px;display:flex;flex-wrap:wrap;gap:8px">
          <span style="color:#111827;font-weight:500">${topSetStr}</span>
          ${ormStr ? `<span>${ormStr}</span>` : ''}
          <span>${ps.length} session${ps.length === 1 ? '' : 's'}</span>
          ${dStr ? `<span>${dStr} vol</span>` : ''}
          <span style="margin-left:auto;color:#9ca3af">${daysAgo}</span>
        </div>
      </div>`;
  }).join('');

  // Top-line totals (re-uses logic similar to renderHistoryStats but condensed)
  const totalSessions = history.length;
  const totalVol = sessionsAsc.reduce((a, s) => {
    return a + (s.sets || []).reduce((b, st) => st.set_type === 'working' ? b + (st.weight_lb || 0) * (parseInt(st.reps) || 0) : b, 0);
  }, 0);
  const volStr = totalVol >= 1000 ? (totalVol / 1000).toFixed(1) + 'k' : totalVol;
  const uniqueExercises = exList.length;

  return `
    <div style="padding:24px 16px 16px">
      <button onclick="state.screen='home';history.replaceState(null,'','#');render()" style="color:#2563eb;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;padding:0;margin-bottom:8px">← Back</button>
      <h1 style="font-size:24px;font-weight:700;color:#111827;margin:0">Progress</h1>
      <p style="font-size:13px;color:#6b7280;margin:4px 0 0">${uniqueExercises} exercises · ${totalSessions} sessions · ${volStr}lb total volume</p>
    </div>
    <div style="padding:0 16px 16px">
      <details style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:8px 12px;margin-bottom:8px">
        <summary style="font-size:12px;font-weight:600;color:#92400e;cursor:pointer;list-style:none">🎊 Preview exercise-finish animations <span style="font-weight:400;color:#a16207">(big · tap to expand)</span></summary>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
          ${CELEBRATION_VARIANTS.map((label, i) => {
            const w = CELEBRATION_WEIGHTS[i];
            const tier = w >= 13 ? '#a16207' : w >= 8 ? '#7c2d12' : '#a21caf';
            const tierBg = w >= 13 ? '#fef3c7' : w >= 8 ? '#fed7aa' : '#fae8ff';
            return `<button onclick="playCelebration(${i})" style="background:white;border:1px solid #fde68a;color:#92400e;font-size:11px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px">${i + 1}. ${label}<span style="background:${tierBg};color:${tier};font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px">${w}%</span></button>`;
          }).join('')}
          <button onclick="playCelebration()" style="background:#f97316;border:1px solid #ea580c;color:white;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer">🎲 Weighted random</button>
        </div>
      </details>
      <details style="background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:8px 12px;margin-bottom:12px">
        <summary style="font-size:12px;font-weight:600;color:#166534;cursor:pointer;list-style:none">✨ Preview per-set animations <span style="font-weight:400;color:#15803d">(subtle · tap to expand)</span></summary>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
          ${SET_VARIANTS.map((label, i) => {
            const w = SET_WEIGHTS[i];
            const tier = w >= 13 ? '#15803d' : w >= 7 ? '#854d0e' : '#a21caf';
            const tierBg = w >= 13 ? '#dcfce7' : w >= 7 ? '#fef9c3' : '#fae8ff';
            return `<button onclick="playSetCelebration(${i})" style="background:white;border:1px solid #86efac;color:#166534;font-size:11px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px">${i + 1}. ${label}<span style="background:${tierBg};color:${tier};font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px">${w}%</span></button>`;
          }).join('')}
          <button onclick="playSetCelebration()" style="background:#22c55e;border:1px solid #16a34a;color:white;font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer">🎲 Weighted random</button>
        </div>
      </details>
    </div>
    <div style="padding:0 16px 32px">
      ${rows || '<p style="color:#9ca3af;text-align:center;padding:32px 0">No working sets logged yet.</p>'}
    </div>`;
}

// Load home screen data
async function loadHomeData() {
  try {
    const [histRes, activeRes] = await Promise.all([
      fetch("/api/history?limit=100"),
      fetch("/api/active-sessions"),
    ]);
    state.history = await histRes.json();
    muscleStatus = computeMuscleStatus(state.history);
    state._activeSessions = await activeRes.json();
    render();
  } catch (e) { console.error("[HOME] Error:", e); }
}

// Initial render — check URL hash for deep link
const initHash = location.hash.replace('#', '');
const initWorkout = initHash ? WORKOUTS.find(w => w.id === initHash) : null;
if (initWorkout) {
  startWorkout(initWorkout);
} else if (initHash === 'stats') {
  state.screen = 'stats';
  render();
  loadHomeData();
} else {
  render();
  loadHomeData();
}
</script>
</body>
</html>
