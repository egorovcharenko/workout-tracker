      todayVol += w * r;
    }
  });
  const chartTodayDateStr = new Date(todayMs).toISOString().slice(0, 10);
  // Only merge today's in-progress values when we're showing THIS lift's
  // own data. If we're borrowing a sibling's history (e.g. Bench Dips
  // pulling Band Tricep Pushdowns), today's Bench Dips reps shouldn't
  // pollute the Pushdowns timeline.
  const ormHist = (!sibling && todayOrm > 0)
    ? [...ormHistRaw.filter(d => d.date !== chartTodayDateStr), { date: chartTodayDateStr, orm: todayOrm }]
    : ormHistRaw;
  const volHist = (!sibling && todayVol > 0)
    ? [...volHistRaw.filter(d => d.date !== chartTodayDateStr), { date: chartTodayDateStr, vol: todayVol }]
    : volHistRaw;
  const bestOrm = ormHist.length ? Math.max(...ormHist.map(d => +d.orm || 0)) : 0;
  const bestWt = wtHist.length ? Math.max(...wtHist.map(d => +d.wt || 0)) : 0;
  const bestReps = repsHist.length ? Math.max(...repsHist.map(d => +d.reps || 0)) : 0;
  const bestVol = volHist.length ? Math.max(...volHist.map(d => +d.vol || 0)) : 0;

  // Per-day stacked volume chart: 7 vertical columns (one per day in the
  // rolling window), each stacking one slice per working set logged that day.
  // Slice color encodes the contributing EXERCISE (legend below the chart);
  // slice brightness encodes the set's HARDNESS — weight × reps relative to
  // the heaviest such product in the window for that exercise. Today's column
  // adds a small glow. Hovering a slice shows exercise / weight × reps / date.
  const VolumeBar = ({ muscle, events }) => {
    const TARGET_MIN = 10, TARGET_MAX = 20;
    const sets = events.length;
    const DAY_MS = 86400000;
    // Build 7 day-buckets, oldest → newest left → right.
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const ms = todayMs - i * DAY_MS;
      const d = new Date(ms);
      const dateStr = d.toISOString().slice(0, 10);
      days.push({ date: dateStr, label: String(d.getUTCDate()), events: [], isToday: i === 0 });
    }
    events.forEach(ev => {
      const day = days.find(d => d.date === ev.date);
      if (day) day.events.push(ev);
    });

    // Per-exercise palette: first contributing exercise → first palette hue,
    // second → second, etc. Stable for the chart's lifetime so the legend
    // colors match the slices.
    const exerciseOrder = [];
    events.forEach(ev => { if (!exerciseOrder.includes(ev.exercise)) exerciseOrder.push(ev.exercise); });
    const exerciseHue = {};
    exerciseOrder.forEach((name, i) => { exerciseHue[name] = PALETTE[i % PALETTE.length].hue; });
    // Top weight × reps per exercise — used to scale "hardness" intensity
    // so the heaviest sets in the window look most saturated, lighter sets
    // pale toward the background.
    const topScorePerEx = {};
    events.forEach(ev => {
      const sc = ev.weight * ev.reps;
      if (sc > (topScorePerEx[ev.exercise] || 0)) topScorePerEx[ev.exercise] = sc;
    });

    const maxPerDay = Math.max(4, ...days.map(d => d.events.length));
    const CHART_H = 64;
    const GAP = 1.5;
    const SLICE_H = Math.max(3, Math.floor((CHART_H - (maxPerDay - 1) * GAP) / maxPerDay));
    const countColor = sets === 0 ? T.faint
                      : sets < TARGET_MIN ? T.red
                      : sets <= TARGET_MAX ? T.green
                      : T.amber;

    // Compute slice color: per-exercise hue, saturation scales with hardness,
    // lightness slightly higher on bright (today) slices.
    const sliceStyle = (ev, isToday) => {
      const hue = exerciseHue[ev.exercise] ?? 152;
      const top = topScorePerEx[ev.exercise] || 1;
      const score = (ev.weight * ev.reps) / top;
      // 0..1 hardness, with a floor so the easiest sets stay visible.
      const hardness = Math.max(0.35, Math.min(1, score || 0.35));
      const sat = Math.round(55 + hardness * 35);   // 55–90%
      const light = Math.round(isToday ? (44 + hardness * 12) : (38 + hardness * 14));
      const alpha = isToday ? 1 : 0.85;
      return {
        background: `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`,
        boxShadow: isToday ? `0 0 6px hsla(${hue}, ${sat}%, 60%, 0.5)` : "none",
      };
    };

    return (
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
          <span style={{ color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.4, textTransform: "uppercase" }}>
            {muscle.replace("_", " ")}
          </span>
          <span style={{ fontFamily: T.mono, fontSize: 11, fontWeight: 800 }}>
            <span style={{ color: countColor }}>{sets}</span>
            <span style={{ color: T.disabled, fontWeight: 500 }}> / 10-20</span>
          </span>
        </div>
        {/* columns */}
        <div style={{ display: "flex", alignItems: "flex-end", height: CHART_H, gap: 3 }}>
          {days.map((d, i) => (
            <div key={i} style={{
              flex: 1, minWidth: 0,
              display: "flex", flexDirection: "column-reverse",
              gap: `${GAP}px`, height: "100%", justifyContent: "flex-start",
            }}>
              {d.events.length === 0 ? (
                <div style={{ height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 1 }} />
              ) : (
                d.events.map((ev, j) => (
                  <div key={j} title={`${ev.exercise} · ${ev.weight}lb × ${ev.reps} · ${ev.date}`} style={{
                    height: SLICE_H,
                    borderRadius: 2,
                    cursor: "default",
                    ...sliceStyle(ev, d.isToday),
                  }} />
                ))
              )}
            </div>
          ))}
        </div>
        {/* date labels */}
        <div style={{ display: "flex", gap: 3, marginTop: 5 }}>
          {days.map((d, i) => (
            <span key={i} style={{
              flex: 1, textAlign: "center",
              color: d.isToday ? T.accentLight : (d.events.length ? T.muted : T.disabled),
              fontFamily: T.mono, fontSize: 9,
              fontWeight: d.isToday ? 800 : (d.events.length ? 600 : 500),
            }}>{d.label}</span>
          ))}
        </div>
        {/* legend */}
        {exerciseOrder.length > 0 && (
          <div style={{ display: "flex", gap: 10, marginTop: 7, flexWrap: "wrap" }}>
            {exerciseOrder.map((name, i) => (
              <div key={name} style={{ display: "flex", alignItems: "center", gap: 5, minWidth: 0 }}>
                <div style={{
                  width: 9, height: 9, borderRadius: 2,
                  background: `hsl(${exerciseHue[name]}, 75%, 50%)`,
                  flexShrink: 0,
                }} />
                <span style={{
                  color: T.muted, fontFamily: T.mono, fontSize: 9.5, fontWeight: 600,
                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                }}>{name}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  // Day-positioned sparkline — aligned to the same 7-day window as the
  // HARD SETS chart above (oldest left → today right). Rest days appear as
  // gaps in the line; data points sit at their actual day x-position. Day
  // labels below match the per-day chart's labels so the eye can connect
  // a tall stacked bar with its corresponding 1RM/volume dot.
  const Sparkline = ({ data, valueKey, color, label, fmt }) => {
    const DAY_MS = 86400000;
    // Build the same 7-day skeleton the VolumeBar uses
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const ms = todayMs - i * DAY_MS;
      const d = new Date(ms);
      days.push({
        date: d.toISOString().slice(0, 10),
        label: String(d.getUTCDate()),
        isToday: i === 0,
        value: null,
      });
    }
    (data || []).forEach(d => {
      const day = days.find(x => x.date === d.date);
      if (day) day.value = +d[valueKey] || 0;
    });
    const presentVals = days.filter(d => d.value != null && d.value > 0).map(d => d.value);
    if (presentVals.length === 0) {
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
            <span style={{ color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.3 }}>{label}</span>
            <span style={{ color: T.disabled, fontFamily: T.mono, fontSize: 10 }}>—</span>
          </div>
          <div style={{ height: 38, display: "flex", alignItems: "center", justifyContent: "center", color: T.disabled, fontFamily: T.mono, fontSize: 10, border: `1px dashed ${T.cardBorder}`, borderRadius: 4 }}>no data this week</div>
          <div style={{ display: "flex", gap: 3, marginTop: 5 }}>
            {days.map((d, i) => (
              <span key={i} style={{ flex: 1, textAlign: "center", color: d.isToday ? T.accentLight : T.disabled, fontFamily: T.mono, fontSize: 9, fontWeight: d.isToday ? 800 : 500 }}>{d.label}</span>
            ))}
          </div>
        </div>
      );
    }
    const min = Math.min(...presentVals);
    const max = Math.max(...presentVals);
    const range = max - min || max || 1;
    const w = 280, h = 38, padX = 8, padY = 4;
    const dayX = (i) => padX + (i * (w - 2 * padX)) / 6;
    const yFor = (v) => h - padY - ((v - min) / range) * (h - 2 * padY);
    const pts = days.map((d, i) => d.value != null && d.value > 0 ? {
      x: dayX(i), y: yFor(d.value), value: d.value, isToday: d.isToday,
    } : null);
    const presentPts = pts.filter(Boolean);
    const linePath = presentPts.length > 1
      ? presentPts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ")
      : "";
    const areaPath = presentPts.length > 1
      ? `${linePath} L ${presentPts[presentPts.length-1].x.toFixed(1)} ${h} L ${presentPts[0].x.toFixed(1)} ${h} Z`
      : "";
    const first = presentVals[0], last = presentVals[presentVals.length - 1];
    const delta = first ? Math.round(((last - first) / first) * 100) : 0;
    const deltaColor = delta > 0 ? T.green : delta < 0 ? T.red : T.faint;
    const gradId = `spark-${label}-${color.replace(/[^a-z0-9]/gi, "")}`;
    return (
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 5 }}>
          <span style={{ color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.3 }}>{label}</span>
          <span style={{ fontFamily: T.mono, fontSize: 11, fontWeight: 800, color: T.strong }}>
            {fmt(last)}
            {presentVals.length > 1 && (
              <span style={{ color: deltaColor, fontWeight: 700, marginLeft: 6, fontSize: 10 }}>
                {delta > 0 ? "↑" : delta < 0 ? "↓" : "→"} {Math.abs(delta)}%
              </span>
            )}
          </span>
        </div>
        <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display: "block", height: h }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {areaPath && <path d={areaPath} fill={`url(#${gradId})`} />}
          {linePath && <path d={linePath} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />}
          {/* Faint vertical guide lines per day (visual day markers under the curve) */}
          {days.map((d, i) => (
            <line key={`g${i}`} x1={dayX(i)} y1={padY} x2={dayX(i)} y2={h - padY}
              stroke={d.isToday ? "rgba(96,165,250,0.18)" : "rgba(255,255,255,0.04)"}
              strokeWidth={d.isToday ? 1 : 0.5}
              strokeDasharray={d.isToday ? "" : "2 3"} />
          ))}
          {/* Dots per actual data point */}
          {presentPts.map((p, i) => (
            <circle key={`p${i}`} cx={p.x} cy={p.y} r={p.isToday ? 3.2 : 2.4} fill={color}
              stroke={p.isToday ? "rgba(11,15,20,0.9)" : "none"} strokeWidth={p.isToday ? 1 : 0} />
          ))}
        </svg>
        <div style={{ display: "flex", gap: 3, marginTop: 5 }}>
          {days.map((d, i) => (
            <span key={i} style={{
              flex: 1, textAlign: "center",
              color: d.isToday ? T.accentLight : (d.value != null && d.value > 0 ? T.muted : T.disabled),
              fontFamily: T.mono, fontSize: 9,
              fontWeight: d.isToday ? 800 : (d.value != null && d.value > 0 ? 600 : 500),
            }}>{d.label}</span>
          ))}
        </div>
      </div>
    );
  };

  const Section = ({ label, children }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ color: T.muted, fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 0.9, marginBottom: 8 }}>
        {label}
      </div>
      {children}
    </div>
  );

  const KV = ({ k, v }) => (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", fontSize: 11, borderBottom: `1px solid ${T.cardBorder}` }}>
      <span style={{ color: T.faint, fontFamily: T.mono }}>{k}</span>
      <span style={{ color: T.strong, fontFamily: T.mono, fontWeight: 700 }}>{v}</span>
    </div>
  );

  const hasPRs = bestOrm > 0 || bestWt > 0 || bestVol > 0;
  const primaryList = (muscleInfo.primary || []);

  return (
    <div style={{
      padding: 14, borderRadius: 14,
      background: T.cardBg, border: `1px solid ${T.cardBorder}`,
      color: T.text,
    }}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ color: T.faint, fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 1.0, marginBottom: 4 }}>STATS</div>
        <div style={{ color: T.strong, fontSize: 16, fontWeight: 800, letterSpacing: -0.3, lineHeight: 1.2 }}>{exercise.name}</div>
        {primaryList.length > 0 && (
          <div style={{ marginTop: 5, display: "flex", flexWrap: "wrap", gap: 4 }}>
            {primaryList.map(m => (
              <span key={m} style={{
                color: T.bandsText, background: "rgba(192,132,252,0.12)",
                border: "1px solid rgba(192,132,252,0.25)",
                fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 0.4,
                padding: "2px 6px", borderRadius: 4, textTransform: "uppercase",
              }}>{m.replace("_", " ")}</span>
            ))}
          </div>
        )}
      </div>

      {primaryList.length > 0 && (
        <Section label="HARD SETS · LAST 7 DAYS">
          {primaryList.map(m => (
            <VolumeBar key={m} muscle={m} events={muscleSets7d[m] || []} />
          ))}
        </Section>
      )}

      <Section label={sibling ? `PROGRESS · LAST 7 DAYS · ${sibling.toUpperCase()}` : "PROGRESS · LAST 7 DAYS"}>
        {sibling && (
          <div style={{ color: T.faint, fontFamily: T.mono, fontSize: 9.5, marginBottom: 6, lineHeight: 1.4 }}>
            {exercise.name} is new — showing your <span style={{ color: T.muted, fontWeight: 700 }}>{sibling}</span> history (same swap group).
          </div>
        )}
        <Sparkline data={ormHist} valueKey="orm" color="#60A5FA" label="1RM EST" fmt={v => `${Math.round(v)} lb`} />
        <Sparkline data={volHist} valueKey="vol" color="#34D399" label="VOLUME" fmt={v => `${Math.round(v).toLocaleString()} lb`} />
      </Section>

      {hasPRs && (
        <Section label="PRS">
          {bestOrm > 0 && <KV k="1RM est" v={`${Math.round(bestOrm)} lb`} />}
          {bestWt > 0 && <KV k="Top weight" v={`${bestWt} lb`} />}
          {bestReps > 0 && <KV k="Top reps" v={String(bestReps)} />}
          {bestVol > 0 && <KV k="Top volume" v={`${bestVol.toLocaleString()} lb`} />}
        </Section>
      )}

      {!hasPRs && ormHist.length === 0 && (() => {
        // Disambiguate: empty statHistory entirely vs only this lift missing.
        // If the fetch failed (likely Vercel cold-start), every lift would look
        // empty — but the user knows they've done this. A retry CTA is more
        // useful than the misleading "log a set to start tracking" line.
        const fetchFailed = Object.keys(stat.orm || {}).length === 0;
        return (
          <div style={{ color: T.faint, fontFamily: T.mono, fontSize: 11, padding: "8px 0", textAlign: "center", lineHeight: 1.5 }}>
            {fetchFailed ? (
              <>
                stats didn't load —
                {" "}
                <button onClick={() => window.location.reload()} style={{
                  background: "transparent", border: 0, padding: 0,
                  color: T.accentLight, fontFamily: T.mono, fontSize: 11,
                  fontWeight: 700, cursor: "pointer", textDecoration: "underline",
                }}>refresh</button>
              </>
            ) : (
              <>no prior data for this lift yet</>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// App — top-level state machine. One source of truth for the entire screen.
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  // Workout selection. URL ?w=<id> is the source of truth — header picker
  // updates it via history.replaceState so the URL is shareable and the
  // browser back button works.
  const [workoutId, setWorkoutId] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    const fromUrl = params.get("w");
    if (fromUrl && WORKOUTS.some(w => w.id === fromUrl)) return fromUrl;
    return (WORKOUTS.find(w => w.main) || WORKOUTS[0]).id;
  });
  const workout = useMemo(() => WORKOUTS.find(w => w.id === workoutId) || WORKOUTS[0], [workoutId]);

  const onPickWorkout = (id) => {
    if (id === workoutId) return;
    const url = new URL(window.location.href);
    url.searchParams.set("w", id);
    window.history.replaceState({}, "", url);
    setWorkoutId(id);
  };

  const [exercises, setExercises] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [sessionId, setSessionId] = useState(null);
  const [startedAt, setStartedAt] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [rest, setRest] = useState(null);  // { total, left, eIdx, sIdx, kind, paused }
  const [motivations, setMotivations] = useState({});  // exercise.id → message | "__loading__"
  // Used by requestMotivation to build the rich payload Claude needs to
  // recognize PRs, trends, layoffs. Fetched once on mount; refreshed on
  // workout switch so stats stay consistent with the visible workout.
  const [history, setHistory] = useState([]);          // [{date, sets:[...]}]
  const [statHistory, setStatHistory] = useState({});  // {orm,reps,vol,wt}: {[exName]: [{date, value}]}
  const [swaps, setSwaps] = useState({});              // { templateExIdx: chosenExerciseName }
  const [pmStarted, setPmStarted] = useState(false);   // two-a-day: hide PM block behind a Continue button until user taps it
  // last-session + cross-workout hints maps, cached so a mid-session exercise
  // swap can re-flatten the swapped slot without another network round-trip.
  const dataRef = useRef({ last: {}, hints: {} });
  // Track last user interaction. The elapsed timer auto-pauses if there's
  // been no interaction for IDLE_THRESHOLD_MS, so a two-a-day workout
  // (AM session, long gap, PM session same day) doesn't count the hours
  // between halves as training time. Survives reload by restoring elapsed
  // from the saved duration_sec rather than wall-clock since started_at.
  const lastInteractionRef = useRef(Date.now());
  const IDLE_THRESHOLD_MS = 5 * 60 * 1000;

  // Mount / workout switch: reset session state then build exercises from
  // template + last + today. The full state reset on workout change matters —
  // otherwise an in-progress rest timer or stale sessionId from the previous
  // workout would carry over and poison the new workout's autosave and
  // produce cross-workout session collisions.
  useEffect(() => {
    let cancelled = false;
    setLoaded(false);
    setExercises([]);
    setSessionId(null);
    setStartedAt(null);
    setElapsed(0);
    setRunning(false);
    setRest(null);
    setMotivations({});
    setHistory([]);
    setStatHistory({});
    setSwaps({});
    setPmStarted(false);
    (async () => {
      // allSettled so a single slow / failing endpoint doesn't blank the
      // page. Each result either {status:"fulfilled",value:…} or
      // {status:"rejected",reason:…}; we coalesce to {} for missing data
      // so the screen always renders the template even offline.
      try {
        const results = await Promise.allSettled([
          api.lastSession(workout.name),
          api.todaySession(workout.name),
          api.hints(),
          api.history(20),
          api.history1RM(),
        ]);
        if (cancelled) return;
        const [lastR, todayR, hintsR, histR, stat1rmR] = results;
        const last = lastR.status === "fulfilled" ? lastR.value : {};
        const today = todayR.status === "fulfilled" ? todayR.value : null;
        const hints = hintsR.status === "fulfilled" ? hintsR.value : {};
        const hist = histR.status === "fulfilled" ? histR.value : [];
        const stat1rm = stat1rmR.status === "fulfilled" ? stat1rmR.value : {};
        if (lastR.status === "rejected") console.warn("[V2] last-session failed:", lastR.reason);
        if (todayR.status === "rejected") console.warn("[V2] today-session failed:", todayR.reason);
        if (hintsR.status === "rejected") console.warn("[V2] hints failed:", hintsR.reason);
        if (histR.status === "rejected") console.warn("[V2] history failed:", histR.reason);
        if (stat1rmR.status === "rejected") console.warn("[V2] 1rm-history failed:", stat1rmR.reason);
        setHistory(hist || []);
        setStatHistory(stat1rm || {});
        // Cache the lookup maps so a mid-session swap can re-flatten locally.
        dataRef.current = { last: last || {}, hints: hints || {} };
        // Apply any persisted exercise swaps before flattening so the swapped
        // slot builds with the chosen exercise's template + its own history.
        const swapMap = loadSwaps(workout.name, localDate());
        setSwaps(swapMap);
        let exs = flattenTemplate(applySwaps(workout, swapMap), last || {}, hints || {});
        if (today && today.id) {
          exs = hydrateToday(exs, today.sets || []);
          setSessionId(today.id);
          // Restore startedAt for record-keeping (it's saved back to the DB
          // unchanged). Elapsed is restored from the saved duration_sec
          // instead of wall-clock since started_at — otherwise a multi-hour
          // gap between AM and PM halves would read as e.g. "10h" elapsed.
          // Timer stays paused until the next interaction.
          if (today.started_at) {
            const startedMs = Date.parse(today.started_at);
            if (!isNaN(startedMs)) setStartedAt(startedMs);
          }
          setElapsed(today.duration_sec || 0);
          // Hydrate motivations for already-completed exercises.
          try {
            const mots = await api.motivations(today.id);
            if (cancelled) return;
            const m = {};
            Object.entries(mots || {}).forEach(([exName, msg]) => {
              const ex = exs.find(e => e.name === exName);
              if (ex) m[ex.id] = msg;
            });
            setMotivations(m);
          } catch (_) { /* non-blocking */ }
        } else {
          // Fresh workout: activate the first set.
          if (exs.length && exs[0].sets.length) exs[0].sets[0].active = true;
        }
        // Apply persisted skip flags (localStorage). Done AFTER hydrate so we
        // can rerun the activate-next pass — if the currently-active set sits
        // on a newly-skipped exercise, focus jumps forward to the next valid
        // candidate. Survives page reload across the same (workout, date).
        const skippedNames = loadSkippedExercises(workout.name, localDate());
        if (skippedNames.size) {
          exs = exs.map(e => skippedNames.has(e.name) ? { ...e, skipped: true } : e);
          activateNextSet(exs);
        }
        // PM-started flag: prefer the persisted localStorage value; if absent
        // but any PM set is already completed (e.g. you continued PM on a
        // different device, or the LS got cleared), auto-recover the started
        // state so the gate doesn't reappear blocking already-active work.
        const hasSplit = exs.some(e => e.session);
        if (hasSplit) {
          const persisted = loadPmStarted(workout.name, localDate());
          const pmHasProgress = exs.some(e => e.session === "PM" && e.sets.some(s => s.completed));
          setPmStarted(persisted || pmHasProgress);
        }
        setExercises(exs);
        setLoaded(true);
      } catch (e) {
        console.error("[V2] mount failed:", e);
        setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, [workout]);

  // Elapsed timer. Monotonic — increments by 1s each tick, never derived
  // from wall-clock. Auto-pauses if no interaction in IDLE_THRESHOLD_MS so
  // idle time between two-a-day halves doesn't accumulate. Resumes the
  // moment the user logs / picks / toggles anything (startTimer is called
  // from every state-changing handler via markInteraction).
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      const idleFor = Date.now() - lastInteractionRef.current;
      if (idleFor > IDLE_THRESHOLD_MS) {
        setRunning(false);
        return;
      }
      setElapsed(e => e + 1);
    }, 1000);
    return () => clearInterval(id);
  }, [running]);

  // Rest timer ticks every 1s while not paused.
  useEffect(() => {
    if (!rest || rest.paused) return;
    const id = setInterval(() => {
      setRest(r => {
        if (!r) return r;
        if (r.left <= 1) return { ...r, left: 0 };
        return { ...r, left: r.left - 1 };
      });
    }, 1000);
    return () => clearInterval(id);
  }, [rest && rest.paused, rest === null]);

  // Migrate the rest timer to wherever the active set currently lives. When
  // you log a set, the 350ms-later advancement moves the active set into
  // the next exercise — the rest timer should follow so it appears right
  // above the next set's controls (matches the design handoff: "rest timer
  // appears between strip and active set block" of the active card). If
  // there's no active set anywhere (you just logged the final set of the
  // workout), the timer stays put in the exercise card where it was
  // started so you still see it counting down.
  useEffect(() => {
    if (!rest) return;
    const activeExIdx = exercises.findIndex(e => e.sets.some(s => s.active));
    if (activeExIdx === -1) return;
    if (activeExIdx === rest.eIdx) return;
    setRest(r => r ? { ...r, eIdx: activeExIdx } : r);
  }, [exercises, rest && rest.eIdx]);

  // Called from every state-changing handler. Stamps the interaction so the
  // idle-threshold tick keeps going, and resumes the timer if it was paused
  // (either auto-paused from idle, or never started yet on a fresh session).
  const startTimer = () => {
    lastInteractionRef.current = Date.now();
    if (!running) setRunning(true);
    if (!startedAt) setStartedAt(Date.now());
  };

  // Save: serialize current exercises[] and POST. Debounced 400ms after the
  // last state edit. Single-in-flight + queue guard to prevent duplicate
  // session inserts.
  const saveDebounceRef = useRef(null);
  const queueSave = (currentExercises, currentSessionId, currentStartedAt, currentElapsed) => {
    clearTimeout(saveDebounceRef.current);
    saveDebounceRef.current = setTimeout(() => {
      const payload = serializeForSave(currentExercises, workout.name, currentSessionId, currentStartedAt, currentElapsed);
      if (payload.sets.length === 0) return;
      autoSavePayload(payload, (newId) => {
        if (!currentSessionId && newId) setSessionId(newId);
      });
    }, 400);
  };

  // Helper: produce a new exercises[] with one set patched, return [next, didChange]
  const patchSet = (eIdx, sIdx, patch) => {
    const next = exercises.map((e, i) => i !== eIdx ? e : ({
      ...e,
      sets: e.sets.map((s, j) => j !== sIdx ? s : ({ ...s, ...patch })),
    }));
    return next;
  };

  const updateAndSave = (next) => {
    setExercises(next);
    queueSave(next, sessionId, startedAt, elapsed);
  };

  // Field handlers — narrow patches so React renders only the active branch.
  const onPickWeight = (eIdx, sIdx, w) => { startTimer(); updateAndSave(patchSet(eIdx, sIdx, { weight: w })); };
  const onPickBodyweight = (eIdx, sIdx, w) => { startTimer(); updateAndSave(patchSet(eIdx, sIdx, { bodyweight: w })); };
  const onPickGrip = (eIdx, sIdx, g) => { startTimer(); updateAndSave(patchSet(eIdx, sIdx, { grip: g })); };

  const onToggleBand = (eIdx, sIdx, b) => {
    startTimer();
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      return {
        ...e,
        sets: e.sets.map((s, j) => {
          if (j !== sIdx) return s;
          const cur = s.bands || [];
          let bands;
          if (b === "__use_last__") {
            bands = (s.lastBands || []).slice();
          } else {
            bands = cur.includes(b) ? cur.filter(x => x !== b) : [...cur, b].sort((a, c) => a - c);
          }
          return { ...s, bands };
        }),
      };
    });
    updateAndSave(next);
  };

  const onClearBands = (eIdx, sIdx) => {
    startTimer();
    updateAndSave(patchSet(eIdx, sIdx, { bands: [] }));
  };

  // Log reps: marks set complete, starts rest (unless superset partner has more),
  // advances active to next set, fires motivation if exercise just finished.
  const onLogReps = (eIdx, sIdx, r) => {
    startTimer();
    // Mark current set completed.
    let next = patchSet(eIdx, sIdx, { reps: r, completed: true });

    // Determine rest behavior: skip if a superset partner still has uncompleted sets.
    const ex = next[eIdx];
    const kind = ex.sets[sIdx].kind;
    const inSuperset = !!ex.superset;
    const partnerHasMore = inSuperset && next.some((e2, j) =>
      j !== eIdx && e2.superset === ex.superset && e2.sets.some(s => !s.completed)
    );
    if (!partnerHasMore) {
      const total = kind === "warmup" ? 30 : (ex.rest || 90);
      setRest({ total, left: total, eIdx, sIdx, kind, paused: false });
    } else {
      setRest(null);
    }

    // Advance active. In a superset, jump to the partner's next uncompleted set
    // before falling back to the current exercise's next.
    setTimeout(() => {
      setExercises(prev => {
        const cur = prev[eIdx];
        // Within superset: hop to partner's first uncompleted set.
        if (cur.superset) {
          const partnerIdx = prev.findIndex((e2, j) => j !== eIdx && e2.superset === cur.superset);
          if (partnerIdx !== -1) {
            const partner = prev[partnerIdx];
            const partnerNext = partner.sets.findIndex(s => !s.completed);
            if (partnerNext !== -1) {
              return prev.map((e, i) => {
                if (i === eIdx) return { ...e, sets: e.sets.map((s, j) => j === sIdx ? { ...s, active: false } : s) };
                if (i === partnerIdx) return { ...e, sets: e.sets.map((s, j) => j === partnerNext ? { ...s, active: true } : s) };
                return e;
              });
            }
          }
        }
        // Otherwise: next uncompleted within this exercise, or first uncompleted
        // in the next exercise. Clears active on the current set in either case.
        const sameExNext = cur.sets.findIndex((s, k) => k > sIdx && !s.completed);
        if (sameExNext !== -1) {
          return prev.map((e, i) => i !== eIdx ? e : ({
            ...e,
            sets: e.sets.map((s, j) => {
              if (j === sIdx) return { ...s, active: false };
              if (j === sameExNext) return { ...s, active: true };
              return s;
            }),
          }));
        }
        const nextExIdx = prev.findIndex((e, k) => k > eIdx && e.sets.some(s => !s.completed));
        return prev.map((e, i) => {
          if (i === eIdx) return { ...e, sets: e.sets.map((s, j) => j === sIdx ? { ...s, active: false } : s) };
          if (i === nextExIdx) {
            const firstUndone = e.sets.findIndex(s => !s.completed);
            if (firstUndone === -1) return e;
            return { ...e, sets: e.sets.map((s, j) => j === firstUndone ? { ...s, active: true } : s) };
          }
          return e;
        });
      });
    }, 350);

    // Save the just-logged set immediately (don't wait for debounce).
    setExercises(next);
    queueSave(next, sessionId, startedAt, elapsed);

    // Fire motivation if the exercise just transitioned to fully complete.
    const justFinishedAll = next[eIdx].sets.every(s => s.completed);
    if (justFinishedAll && kind !== "warmup") {
      requestMotivation(next[eIdx], sessionId);
    }
  };

  // Build the rich /api/motivate payload so Claude has muscles + previous
  // sessions + PR signals + 12-session timeseries to reason against. Without
  // these, the model sees only this session's reps and (correctly) reports
  // "no history".
  const buildMotivatePayload = (exercise, sid) => {
    // Sub-exercise expansion: for a flattened superset member (one row here
    // is one design exercise = one sub from the template), exercise.name
    // is already the sub-name. For non-supersets, it's the exercise name.
    const subNames = [exercise.name];
    const today = localDate();
    const todayMs = Date.parse(today + 'T00:00:00Z');

    // Current session's completed sets for this exercise.
    const current = [];
    exercise.sets.forEach(s => {
      if (!s.completed) return;
      const bandSum = (s.bands || []).reduce((a, b) => a + b, 0);
      let weight_lb;
      if (exercise.assist) {
        weight_lb = Math.max(0, (s.bodyweight || 0) - bandSum);
      } else if (exercise.isBandsOnly) {
        weight_lb = bandSum;
      } else if (exercise.bandAddon) {
        weight_lb = (s.weight || 0) + bandSum;
      } else {
        weight_lb = s.weight || 0;
      }
      current.push({
        sub: exercise.name,
        type: s.kind === "warmup" ? "warmup" : "working",
        set_number: s.setNumber,
        reps: parseInt(s.reps) || 0,
        weight_lb,
      });
    });

    // Previous 1-2 sessions' sets for this exercise.
    const previous = [];
    for (const sess of (history || []).slice(0, 4)) {
      const sessSets = (sess.sets || []).filter(st => subNames.includes(st.exercise));
      if (sessSets.length) previous.push({
        date: sess.date,
        sets: sessSets.map(st => ({ sub: st.exercise, type: st.set_type, reps: st.reps, weight_lb: st.weight_lb })),
      });
      if (previous.length >= 2) break;
    }

    // Muscles hit (primary + secondary).
    const muscles = [];
    subNames.forEach(name => {
      const m = EXERCISE_MUSCLES[name];
      if (m) muscles.push(...(m.primary || []), ...(m.secondary || []));
    });

    // PR + trend signals, per sub-exercise.
    //
    // BULLETPROOF DESIGN — never produce numbers that contradict `previous`:
    // the historical aggregates here are computed PRIMARILY from `history`
    // (the same set-level data `previous` is built from), and only AUGMENTED
    // by statHistory if that loaded. Previously we leaned on statHistory
    // alone — when its fetch timed out on a Vercel cold start, every lift
    // got `sessions_in_history: 0` while `previous` clearly listed recent
    // sessions, and Claude would write "history says zero sessions but I
    // see you rowing 50s on May 18 and 20" — confused, contradictory.
    //
    // Now: history is the floor. If history shows any session for this lift,
    // sessions_in_history >= 1, full stop. statHistory only ever raises the
    // floor (it may contain sessions older than the history(20) window).
    // The two sources can't disagree because they share a parent fact.
    const statsLoaded = Object.keys(statHistory.orm || {}).length > 0;
    const ormOf = (w, r) => r > 1 ? w * (1 + r / 30) : w;

    const prs = subNames.map(subName => {
      // Step 1 — derive everything we can from `history` (set-level truth).
      const histSessions = (history || []).filter(s =>
        (s.sets || []).some(st => st.exercise === subName && st.set_type === 'working')
      );
      let histMaxWt = 0, histMaxReps = 0, histMaxOrm = 0;
      // Per-session aggregates rebuilt from set rows so we can seed the
      // timeseries even when statHistory is empty.
      const histByDate = {};
      histSessions.forEach(sess => {
        let mw = 0, mr = 0, mo = 0, sv = 0;
        sess.sets.forEach(st => {
          if (st.exercise !== subName || st.set_type !== 'working') return;
          const w = +st.weight_lb || 0;
          const r = parseInt(st.reps) || 0;
          if (w > mw) mw = w; if (mw > histMaxWt) histMaxWt = mw;
          if (r > mr) mr = r; if (mr > histMaxReps) histMaxReps = mr;
          if (w > 0 && r > 0) {
            const o = ormOf(w, r);
            if (o > mo) mo = o;
            if (mo > histMaxOrm) histMaxOrm = mo;
            sv += w * r;
          }
        });
        histByDate[sess.date] = { date: sess.date, orm: mo, wt: mw, reps: mr, vol: sv };
      });

      // Step 2 — augment with statHistory if it loaded. Same-date wins go
      // to statHistory (more authoritative for orm calc); new dates from
      // statHistory expand the window past history(20).
      const ormHist  = ((statHistory.orm  || {})[subName] || []);
      const wtHist   = ((statHistory.wt   || {})[subName] || []);
      const repsHist = ((statHistory.reps || {})[subName] || []);
      const volHist  = ((statHistory.vol  || {})[subName] || []);
      const statMaxOrm  = ormHist.length  ? Math.max(...ormHist.map(d => +d.orm  || 0)) : 0;
      const statMaxWt   = wtHist.length   ? Math.max(...wtHist.map(d => +d.wt    || 0)) : 0;
      const statMaxReps = repsHist.length ? Math.max(...repsHist.map(d => +d.reps|| 0)) : 0;
      const byDate = { ...histByDate };
      ormHist.forEach (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).orm  = +d.orm  || 0; });
      wtHist.forEach  (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).wt   = +d.wt   || 0; });
      repsHist.forEach(d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).reps = +d.reps || 0; });
      volHist.forEach (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).vol  = +d.vol  || 0; });

      const prevMaxOrm  = Math.max(histMaxOrm,  statMaxOrm);
      const prevMaxWt   = Math.max(histMaxWt,   statMaxWt);
      const prevMaxReps = Math.max(histMaxReps, statMaxReps);
      const allHist = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));

      // Step 3 — drop the entry only if we genuinely have zero data from
      // BOTH sources. Otherwise sessions_in_history reflects union truth.
      if (allHist.length === 0) return null;

      // Current session aggregates from the exercise we just finished.
      const workingSets = exercise.sets.filter(s => s.kind === "work" && s.completed);
      const curWt   = workingSets.reduce((m, s) => Math.max(m, (() => {
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        return exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
             : exercise.isBandsOnly ? bs
             : exercise.bandAddon ? (s.weight || 0) + bs
             : (s.weight || 0);
      })()), 0);
      const curReps = workingSets.reduce((m, s) => Math.max(m, parseInt(s.reps) || 0), 0);
      const curOrm  = workingSets.reduce((m, s) => {
        const reps = parseInt(s.reps) || 0;
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        const w = exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
                : exercise.isBandsOnly ? bs
                : exercise.bandAddon ? (s.weight || 0) + bs
                : (s.weight || 0);
        return reps > 0 && w > 0 ? Math.max(m, ormOf(w, reps)) : m;
      }, 0);
      const curVol = workingSets.reduce((sum, s) => {
        const reps = parseInt(s.reps) || 0;
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        const w = exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
                : exercise.isBandsOnly ? bs
                : exercise.bandAddon ? (s.weight || 0) + bs
                : (s.weight || 0);
        return sum + (reps > 0 && w > 0 ? w * reps : 0);
      }, 0);

      const trimmed = allHist.slice(-12);

      // Trends / consistency.
      const lastDate = allHist[allHist.length - 1].date;
      const daysSinceLast = Math.round((todayMs - Date.parse(lastDate + 'T00:00:00Z')) / 86400000);
      const recent = allHist.filter(h => todayMs - Date.parse(h.date + 'T00:00:00Z') <= 28 * 86400000);
      const prior  = allHist.filter(h => {
        const ago = todayMs - Date.parse(h.date + 'T00:00:00Z');
        return ago > 28 * 86400000 && ago <= 56 * 86400000;
      });
      const avg = arr => arr.length ? arr.reduce((s, x) => s + (+x.vol || 0), 0) / arr.length : 0;
      const recentAvg = avg(recent), priorAvg = avg(prior);
      const volTrendPct = priorAvg > 0 ? Math.round((recentAvg - priorAvg) / priorAvg * 100) : null;

      const sameWtReps = curWt > 0 ? allHist.filter(h => h.wt === curWt).map(h => h.reps).filter(r => r > 0) : [];
      const repsAtCurWtImproved = sameWtReps.length >= 2 && curReps > Math.max(...sameWtReps);

      return {
        sub: subName,
        current_orm: curOrm,           previous_best_orm: prevMaxOrm,    is_orm_pr:    !!(curOrm && curOrm > prevMaxOrm),
        current_max_weight: curWt,     previous_best_weight: prevMaxWt,  is_weight_pr: !!(curWt && curWt > prevMaxWt),
        current_max_reps: curReps,     previous_best_reps: prevMaxReps,  is_reps_pr:   !!(curReps && curReps > prevMaxReps),
        current_volume: curVol,
        sessions_in_history: allHist.length,
        days_since_last_session: daysSinceLast,
        returning_after_layoff: daysSinceLast >= 14,
        vol_trend_pct_4wk_vs_prior: volTrendPct,
        reps_at_current_weight_improved: repsAtCurWtImproved,
        tied_previous_best_orm: !!(curOrm && prevMaxOrm && curOrm === prevMaxOrm),
        history_timeseries: trimmed,
        // Tell the server whether this entry's long-arc fields (volTrendPct,
        // history_timeseries beyond ~20 sessions) are limited to the
        // recent-history window vs. backed by the full aggregated stats.
        stats_source: statsLoaded ? "full" : "recent_history_only",
      };
    }).filter(Boolean);

    // statsFailed is now an informational flag — the prs entries themselves
    // are no longer compromised when stats fail, because they fall back to
    // history. Kept on the payload so the server can pass it through to
    // the model as additional context.
    const statsFailed = !statsLoaded;

    return {
      session_id: sid,
      exercise: exercise.name,
      muscles: [...new Set(muscles)],
      stats_loaded: !statsFailed,
      current,
      previous,
      prs,
    };
  };

  const requestMotivation = async (exercise, sid) => {
    setMotivations(m => ({ ...m, [exercise.id]: "__loading__" }));
    try {
      const payload = buildMotivatePayload(exercise, sid);
      const res = await api.motivate(payload);
      if (res && res.message) {
        setMotivations(m => ({ ...m, [exercise.id]: res.message }));
      } else {
        setMotivations(m => { const c = { ...m }; delete c[exercise.id]; return c; });
      }
    } catch (e) {
      console.warn("[V2-MOTIVATE]", e);
      setMotivations(m => { const c = { ...m }; delete c[exercise.id]; return c; });
    }
  };

  // Reopen: clear completed on the tapped set, deactivate whatever was active,
  // mark this one active. Reps/weight/bands are kept so the user only adjusts.
  const onReopenSet = (eIdx, sIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      return {
        ...e,
        sets: e.sets.map((s, j) => {
          if (j === sIdx) return { ...s, active: true, completed: false };
          if (s.active) return { ...s, active: false };
          return s;
        }),
      };
    });
    // Also deactivate active sets in OTHER exercises (supersets can leave an
    // active in the partner; reopening should pull focus back).
    const cleaned = next.map((e, i) => i === eIdx ? e : ({
      ...e,
      sets: e.sets.map(s => s.active ? { ...s, active: false } : s),
    }));
    updateAndSave(cleaned);
  };

  const onSkipWarmup = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const sets = e.sets.map(s => s.kind === "warmup" ? { ...s, active: false, completed: false } : s);
      const firstWork = sets.findIndex(s => s.kind === "work" && !s.completed);
      if (firstWork !== -1) sets[firstWork] = { ...sets[firstWork], active: true };
      return { ...e, sets };
    });
    updateAndSave(next);
  };

  // Toggle "skip exercise" for the whole exercise. The card collapses to a
  // compact SKIPPED chip with a restore action; skipped exercises don't
  // receive automatic focus and their sets count as done in the header
  // x/total. Persisted in localStorage (keyed by workout+date) so a refresh
  // mid-workout keeps the skip. Sets are NOT saved to the DB (we never mark
  // them completed), so the skip is purely a UI/flow signal.
  const onSkipExercise = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const skipped = !e.skipped;
      // Clear any in-progress reps/bands selection on this exercise's sets
      // so a later un-skip starts from prefilled (last-session) values
      // instead of a half-edited state.
      const sets = e.sets.map(s => ({ ...s, active: false }));
      return { ...e, skipped, sets };
    });
    activateNextSet(next);
    const skippedNames = new Set(next.filter(e => e.skipped).map(e => e.name));
    saveSkippedExercises(workout.name, localDate(), skippedNames);
    // No /api/save round-trip needed — skipped sets are still completed:false
    // so serializeForSave would emit the same payload as before. We just need
    // local state to reflect the new focus.
    setExercises(next);
  };

  // Swap an exercise for an alternative in its SWAP_GROUP. Re-flattens the
  // whole workout against the new template (using the cached last/hints maps
  // so there's no network round-trip), then re-hydrates from the sets already
  // logged this session so progress on every OTHER exercise is preserved. The
  // swapped slot itself starts fresh — its sets carry the new exercise's own
  // history (LAST pills, reps preview). Persisted in localStorage so a reload
  // mid-workout keeps the swap.
  const onSwapExercise = (eIdx, newName) => {
    const ex = exercises[eIdx];
    const tIdx = ex.templateExIdx;
    // Superset members are nested inside workout.exercises[tIdx].supersetExercises[subIdx]
    // — they need a compound swap key so applySwaps can replace just one half
    // of the superset (e.g. Pushdowns → Bench Dips) without touching the
    // partner exercise. Top-level exercises keep the simple "<tIdx>" key.
    const isSub = ex.subIdx != null;
    const swapKey = isSub ? `${tIdx}-${ex.subIdx}` : `${tIdx}`;
    const wrapper = workout.exercises[tIdx];
    const originalName = isSub
      ? (wrapper?.supersetExercises?.[ex.subIdx]?.name || ex.name)
      : (wrapper?.name || ex.name);
    const nextSwaps = { ...swaps };
    if (newName === originalName) delete nextSwaps[swapKey];
    else nextSwaps[swapKey] = newName;
    saveSwaps(workout.name, localDate(), nextSwaps);
    setSwaps(nextSwaps);
    // Rebuild against the swapped template.
    const { last, hints } = dataRef.current;
    let exs = flattenTemplate(applySwaps(workout, nextSwaps), last, hints);
    // Re-hydrate from this session's logged sets so the swap doesn't wipe
    // progress on other exercises. The swapped exercise's old sets won't match
    // (different name) — it correctly comes back blank.
    const todaySets = serializeForSave(exercises, workout.name, sessionId, startedAt, elapsed).sets;
    exs = hydrateToday(exs, todaySets);
    // Re-apply skip flags, then recompute focus.
    const skippedNames = loadSkippedExercises(workout.name, localDate());
    if (skippedNames.size) exs = exs.map(e => skippedNames.has(e.name) ? { ...e, skipped: true } : e);
    activateNextSet(exs);
    updateAndSave(exs);
  };

  const onAddSet = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const lastWork = [...e.sets].reverse().find(s => s.kind === "work");
      const newIdx = (typeof lastWork?.idx === "number" ? lastWork.idx : 0) + 1;
      const newSetNumber = (lastWork?.setNumber || 0) + 1;
      const newSet = {
        kind: "work", idx: newIdx,
        setNumber: newSetNumber,
        saveExerciseName: lastWork?.saveExerciseName || e.name,
        completed: false, active: false, reps: null,
        weight: lastWork?.weight || 0,
        bodyweight: lastWork?.bodyweight,
        bands: lastWork?.bands ? lastWork.bands.slice() : [],
        grip: lastWork?.grip,
        lastWeight: null, lastBands: [], lastReps: null,
      };
      return { ...e, sets: [...e.sets, newSet] };
    });
    updateAndSave(next);
  };

  const onRemoveSet = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const workCount = e.sets.filter(s => s.kind === "work").length;
      if (workCount <= 1) return e;
      // Remove the trailing work set if it's neither active nor completed.
      const lastIdx = [...e.sets].map((s, k) => ({ s, k })).reverse().find(x => x.s.kind === "work" && !x.s.active && !x.s.completed)?.k;
      if (lastIdx == null) return e;
      return { ...e, sets: e.sets.filter((_, j) => j !== lastIdx) };
    });
    updateAndSave(next);
  };

  const onRemoveWarmup = (eIdx) => {
    const next = exercises.map((e, i) => i !== eIdx ? e : ({ ...e, sets: e.sets.filter(s => s.kind !== "warmup") }));
    updateAndSave(next);
  };

  const restAdd = (sec) => setRest(r => r ? { ...r, left: Math.max(0, r.left + sec), total: Math.max(r.total, r.left + sec) } : r);
  const restSkip = () => setRest(null);
  const restToggle = () => setRest(r => r ? { ...r, paused: !r.paused } : r);

  // Two-a-day: reveal the PM block and persist so a reload keeps it open.
  const onContinuePm = () => {
    setPmStarted(true);
    savePmStarted(workout.name, localDate(), true);
  };

  // Set counts for header. A skipped exercise counts its sets as "done" so the
  // x/total reflects "I've made a decision about this exercise" and the meter
  // can hit 100% without the skipped sets ever being logged.
  const totalSets = exercises.reduce((n, e) => n + e.sets.length, 0);
  const doneSets = exercises.reduce((n, e) =>
    e.skipped ? n + e.sets.length : n + e.sets.filter(s => s.completed).length, 0);

  if (!loaded) {
    // Render the header + workout name immediately so the user sees the
    // app responded even while the API round-trips. Avoids the "blank
    // screen with header only" impression on a slow cold start.
    return (
      <div style={{ height: "100%", overflowY: "auto" }}>
        <div style={{ maxWidth: 448, margin: "0 auto", minHeight: "100%", background: T.page }}>
          <Header workout={workout} workouts={WORKOUTS} onPickWorkout={onPickWorkout} done={0} total={0} elapsedSec={0} />
          <div style={{ margin: "40px 16px", padding: "20px", textAlign: "center", color: T.muted, fontFamily: T.mono, fontSize: 13, border: `1px dashed ${T.cardBorder}`, borderRadius: 12 }}>
            loading workout…
          </div>
        </div>
      </div>
    );
  }

  // The "current exercise" the stats sidebar describes — what you're
  // working on right now. Resolution order:
  //   1. Exercise with an active set (the strongest signal).
  //   2. First non-skipped exercise that still has an uncompleted set —
  //      handles the case where the active flag didn't propagate forward
  //      (e.g., you completed a set externally, reopened-then-redid one,
  //      or the auto-advance lost the active marker for any reason).
  //   3. Last exercise — workout is fully done, show the lift you just
  //      finished so the PR snapshot is still useful.
  const currentExercise = (() => {
    const active = exercises.find(e => !e.skipped && e.sets.some(s => s.active));
    if (active) return active;
    const nextIncomplete = exercises.find(e => !e.skipped && e.sets.some(s => !s.completed));
    if (nextIncomplete) return nextIncomplete;
    return exercises.length ? exercises[exercises.length - 1] : null;
  })();

  return (
    // Two-column on desktop (.session-shell media query), mobile-first single
    // column below the breakpoint. Outer div takes the scroll; the stats pane
    // sticks within that scroll context.
    <div style={{ height: "100%", overflowY: "auto", background: T.page }}>
      <div className="session-shell">
      <div className="session-main">
      <Header
        workout={workout}
        workouts={WORKOUTS}
        onPickWorkout={onPickWorkout}
        done={doneSets}
        total={totalSets}
        elapsedSec={elapsed}
      />
      {/* Workout-level warm-up callout removed — per-exercise warmups
          (set strip W1 / W2) carry that intent more directly. */}
      {exercises.map((ex, i) => {
        const prev = i > 0 ? exercises[i - 1] : null;
        const isFirstInSuperset = ex.superset && (!prev || prev.superset !== ex.superset);
        const supersetTag = ex.superset ? `${ex.superset}${ex.supersetPos || ''}` : null;
        // Session-block dividers. Render an AM banner above the very first
        // exercise in a split workout, and a PM banner at the AM→PM transition.
        const hasSplit = exercises.some(e => e.session);
        const isFirstAM = hasSplit && ex.session === "AM" && (!prev || prev.session !== "AM");
        const isFirstPM = hasSplit && ex.session === "PM" && (!prev || prev.session !== "PM");

        // PM-gated: when the workout has the split and the user hasn't tapped
        // Continue yet, replace the entire PM block with a single "Ready for
        // the evening session?" card. The first PM exercise renders the card;
        // later PM exercises render nothing.
        if (hasSplit && ex.session === "PM" && !pmStarted) {
          if (!isFirstPM) return null;
          const pmExs = exercises.filter(e => e.session === "PM");
          const previewNames = pmExs
            .filter(e => !e.skipped)
            .map(e => e.superset ? null : e.name)
            .filter(Boolean);
          // Roll up superset members into a single label.
          const pmSupersetTags = Array.from(new Set(pmExs.filter(e => e.superset && !e.skipped).map(e => `Superset ${e.superset}`)));
          const previewLabels = [...previewNames, ...pmSupersetTags].join(" · ") || "(all PM exercises currently skipped)";
          return (
            <div key="pm-gate" style={{
              margin: "16px 16px 4px",
              padding: "22px 18px 18px",
              borderRadius: 16,
              background: "linear-gradient(180deg, rgba(96,165,250,0.12), rgba(96,165,250,0.03))",
              border: "1px solid rgba(96,165,250,0.28)",
              boxShadow: "0 12px 30px -16px rgba(59,130,246,0.35)",
              textAlign: "center",
            }}>
              <div style={{ fontSize: 26, marginBottom: 4 }} aria-hidden>🌙</div>
              <div style={{
                color: T.accentLight, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.4,
                marginBottom: 8,
              }}>EVENING SESSION</div>
              <div style={{ color: T.strong, fontSize: 16, fontWeight: 700, lineHeight: 1.35, marginBottom: 4 }}>
                Ready for the second half?
              </div>
              {previewLabels && (
                <div style={{ color: T.muted, fontSize: 11.5, lineHeight: 1.45, marginBottom: 16, padding: "0 4px" }}>
                  {previewLabels}
                </div>
              )}
              <button onClick={onContinuePm} style={{
                background: "linear-gradient(180deg, #60A5FA, #3B82F6)",
                border: 0, color: "#0B0F14",
                padding: "14px 32px", borderRadius: 12,
                fontFamily: "inherit", fontSize: 15, fontWeight: 800, letterSpacing: 0.3,
                cursor: "pointer",
                boxShadow: "0 8px 22px -6px rgba(59,130,246,0.55)",
                minWidth: 180,
              }}>Continue →</button>
            </div>
          );
        }

        const sessionDivider = (label, emoji, color, bg, border) => (
          <div style={{ margin: "10px 16px 8px", display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ flex: 1, height: 1, background: border }} />
            <span style={{
              color, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.4,
              padding: "3px 9px", borderRadius: 6,
              background: bg, border: `1px solid ${border}`,
              display: "inline-flex", alignItems: "center", gap: 5,
            }}>
              <span aria-hidden style={{ fontSize: 11 }}>{emoji}</span>
              {label}
            </span>
            <div style={{ flex: 1, height: 1, background: border }} />
          </div>
        );
        return (
          <React.Fragment key={ex.id}>
            {isFirstAM && sessionDivider("MORNING SESSION", "☀️", T.amber, "rgba(251,191,36,0.08)", "rgba(251,191,36,0.28)")}
            {isFirstPM && sessionDivider("EVENING SESSION", "🌙", T.accentLight, "rgba(96,165,250,0.08)", "rgba(96,165,250,0.28)")}
            {isFirstInSuperset && (
              <div style={{ margin: "4px 16px 6px", display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, height: 1, background: "rgba(192,132,252,0.18)" }} />
                <span style={{ color: T.bands, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.2 }}>
                  SUPERSET {ex.superset} · NO REST
                </span>
                <div style={{ flex: 1, height: 1, background: "rgba(192,132,252,0.18)" }} />
              </div>
            )}
            <ExerciseCard
              exercise={ex}
              supersetTag={supersetTag}
              rest={rest && rest.eIdx === i ? rest : null}
              onRestAdd={restAdd}
              onRestSkip={restSkip}
              onRestToggle={restToggle}
              onPickWeight={(sIdx, w) => onPickWeight(i, sIdx, w)}
              onPickBodyweight={(sIdx, w) => onPickBodyweight(i, sIdx, w)}
              onPickGrip={(sIdx, g) => onPickGrip(i, sIdx, g)}
              onToggleBand={(sIdx, b) => onToggleBand(i, sIdx, b)}
              onClearBands={(sIdx) => onClearBands(i, sIdx)}
              onLogReps={(sIdx, r) => onLogReps(i, sIdx, r)}
              onSkipWarmup={() => onSkipWarmup(i)}
              onSkipExercise={() => onSkipExercise(i)}
              onSwapExercise={(newName) => onSwapExercise(i, newName)}
              onReopenSet={(sIdx) => onReopenSet(i, sIdx)}
              onAddSet={() => onAddSet(i)}
              onRemoveSet={() => onRemoveSet(i)}
              onRemoveWarmup={() => onRemoveWarmup(i)}
              motivation={motivations[ex.id]}
            />
          </React.Fragment>
        );
      })}
      </div>
      <aside className="stats-pane-wrap">
        <StatsPane
          exercise={currentExercise}
          history={history}
          statHistory={statHistory}
          exercises={exercises}
        />
      </aside>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
