<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workout Session</title>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  workout-session.html — the LIVE WORKOUT SESSION screen (set logging).
  Served at /workout?w=<id>.

  This is ONE of the app's two pages. The other is workout.html (the SHELL:
  home, history, stats, calendar, measurements). They are NOT two versions of
  the app — they are two distinct pages. The shell's startWorkout() redirects
  here when a session begins; this page's "← Back" returns to the shell.
  ═══════════════════════════════════════════════════════════════════════════

  React + Babel via CDN so the whole thing stays a single file with no build
  step (easy to deploy on Vercel through workout_server.py).

  Shares the backend with the shell. Saves go through /api/save with a payload
  shape including the interleaved set_number convention for supersets.
-->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>
<style>
  /* Reset + dark theme — these tokens come from the design handoff README. */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root {
    margin: 0; padding: 0;
    height: 100%;
    background: #0B0F14;
    color: #E5E7EB;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    overscroll-behavior-y: none;
  }
  body { color-scheme: dark; }
  button { font-family: inherit; }
  /* Hide native scrollbars on horizontal scrollers */
  .scroll-row::-webkit-scrollbar { display: none; }
  .scroll-row { scrollbar-width: none; }
  /* Edge-fade nudge animations (rep strip) */
  @keyframes repNudgeR { 0%, 80%, 100% { transform: translateY(-50%); } 88% { transform: translate(3px, -50%); } 94% { transform: translate(-1px, -50%); } }
  @keyframes repNudgeL { 0%, 80%, 100% { transform: translateY(-50%); } 88% { transform: translate(-3px, -50%); } 94% { transform: translate(1px, -50%); } }
  /* Rest-done halo (matches the shell's flashRestDone) */
  @keyframes rest-done-flash {
    0% { opacity: 0; }
    8% { opacity: 1; }
    25% { opacity: 0.55; }
    40% { opacity: 1; }
    60% { opacity: 0.55; }
    75% { opacity: 1; }
    92% { opacity: 0.45; }
    100% { opacity: 0; }
  }
  /* Logged-rep micro-pulse */
  @keyframes set-pulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  /* Two-column layout when the viewport is wide enough for a stats sidebar.
     Below the breakpoint the layout falls back to a single mobile column —
     the sidebar is hidden via display:none so its computations are skipped
     too (StatsPane is still rendered but its container collapses). */
  .session-shell {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }
  .session-main { width: 100%; max-width: 448px; padding-bottom: 60px; }
  .stats-pane-wrap { display: none; }
  @media (min-width: 960px) {
    .session-shell {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      padding: 0 24px;
    }
    .session-main { flex-shrink: 0; }
    .stats-pane-wrap {
      display: block;
      width: 320px;
      flex-shrink: 0;
      position: sticky;
      top: 16px;
      margin-top: 64px; /* align with the first exercise card, past the header row */
    }
  }
</style>
</head>

const BANDS = [
  { name: "Yellow", lb: 5 },
  { name: "Green",  lb: 15 },

  { name: "Blue",   lb: 30 },
  { name: "Black",  lb: 35 },
];
const BAND_VALUES = BANDS.map(b => b.lb);

const GRIP_LABELS = {
  neutral:   { label: "Neutral",   hint: "parallel" },
  chinup:    { label: "Chin-up",   hint: "underhand" },
  pullup:    { label: "Pull-up",   hint: "overhand" },
  hammer:    { label: "Hammer",    hint: "neutral" },
  supinated: { label: "Supinated", hint: "underhand" },
  reverse:   { label: "Reverse",   hint: "overhand" },
};

// Design tokens — single source so a future tweak flows through the tree.
const T = {
  page:       "#0B0F14",
  cardBg:     "rgba(17,24,39,0.45)",
  cardBorder: "rgba(255,255,255,0.04)",
  text:       "#E5E7EB",
  strong:     "#F3F4F6",
  muted:      "#9CA3AF",
  faint:      "#6B7280",
  disabled:   "#4B5563",
  accent:     "#3B82F6",
  accentLight:"#60A5FA",
  amber:      "#FBBF24",
  amberMid:   "#D97706",
  amberMuted: "#D6B68A",
  bands:      "#C084FC",
  bandsText:  "#E9D5FF",
  green:      "#34D399",
  red:        "#F87171",
  inv:        "#0B0F14",
  mono:       "ui-monospace, Menlo, monospace",
};

// ─────────────────────────────────────────────────────────────────────────────
// Backend client. All endpoints already exist in workout_server.py.
// ─────────────────────────────────────────────────────────────────────────────
const localDate = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// Bounded fetch — Vercel functions can cold-start at 1-3s, and a hung
// endpoint shouldn't block the entire screen. After `ms` the fetch
// rejects with a timeout so the boot's allSettled coalesces to empty
// data rather than spinning forever. Also parses defensively — if the
// server returns an error page (HTML) instead of JSON, we surface a
// rejection rather than letting a SyntaxError propagate from .json().
const fetchT = (url, ms = 6000) => Promise.race([
  fetch(url),
  new Promise((_, rej) => setTimeout(() => rej(new Error(`timeout ${url}`)), ms)),
]).then(async (r) => {
  if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
  const txt = await r.text();
  try { return JSON.parse(txt); }
  catch (e) { throw new Error(`${url} → non-JSON response: ${txt.slice(0, 80)}`); }
});

const api = {
  todaySession: (workout) => fetchT(`/api/today-session?workout=${encodeURIComponent(workout)}`),
  lastSession:  (workout) => fetchT(`/api/last-session?workout=${encodeURIComponent(workout)}`),
  // exercise-hints returns the most-recent {weight, reps, bands, grip} for
  // EVERY (exercise, set_type, set_number) across ALL workouts. Falls back
  // for exercises that share a name with one in a different workout (e.g.
  // "Dumbbell Flat Bench Press" appears in both Full Body and Full Body B —
  // hints surfaces the most recent regardless of which workout it was in).
  // 8s budget — it can be slow to compute on a cold start because the
  // query scans all sets.
  hints: () => fetchT("/api/exercise-hints", 8000),
  // history + 1rm-history power the motivate payload — they're what makes
  // Claude actually have something to "dig into" (previous-session sets,
  // PR comparisons, multi-session trends). Both can be slow on cold start;
  // 10s budget.
  // history + 1rm-history retry once: Vercel Python cold-starts can eat the
  // full 10s function budget on the first hit, and a single timeout would
  // leave the stats pane with empty data ("no prior data" everywhere even
  // though the user has done the lift many times). Second try lands on a
  // warm function and almost always returns in <1s.
  history: (limit = 20) =>
    fetchT(`/api/history?limit=${limit}`, 10000)
      .catch(e => { console.warn("[V2] history retry:", e); return fetchT(`/api/history?limit=${limit}`, 10000); }),
  history1RM: () =>
    fetchT("/api/1rm-history", 10000)
      .catch(e => { console.warn("[V2] 1rm-history retry:", e); return fetchT("/api/1rm-history", 10000); }),
  save: (body) => fetch("/api/save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then(r => r.json()),
  motivate: (body) => fetch("/api/motivate", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then(r => r.json()),
  motivations: (sid) => fetchT(`/api/motivations?session_id=${sid}`),
};

// Per-exercise muscle map for the motivate payload. The shell (workout.html)
// has the same data under its own EXERCISE_MUSCLES — kept in sync here so
// Claude knows what muscles a lift hits without an extra lookup table on
// the server. Primary muscles drive the headline; secondary fills context.
const EXERCISE_MUSCLES = {
  "Overhead Dumbbell Press": { primary: ["shoulders"], secondary: ["triceps"] },
  "Dumbbell Bicep Curls": { primary: ["biceps"], secondary: ["forearms"] },
  "Overhead Tricep Extension": { primary: ["triceps"], secondary: [] },
  "Dumbbell Bent-Over Rows": { primary: ["lats"], secondary: ["biceps", "rear_delts"] },
  "Single-Arm Dumbbell Rows": { primary: ["lats"], secondary: ["biceps", "rear_delts"] },
  "Assisted Pull-Ups": { primary: ["lats"], secondary: ["biceps", "upper_back", "rear_delts"] },
  "Reverse Flyes": { primary: ["rear_delts"], secondary: ["upper_back"] },
  "Goblet Squat": { primary: ["quads", "glutes"], secondary: ["core"] },
  "Bulgarian Split Squat": { primary: ["quads", "glutes"], secondary: ["hamstrings", "core"] },
  "Dumbbell Flat Bench Press": { primary: ["chest"], secondary: ["triceps", "shoulders"] },
  "Band Romanian Deadlift": { primary: ["hamstrings", "glutes"], secondary: ["lower_back"] },
  "Dumbbell Romanian Deadlift": { primary: ["hamstrings", "glutes"], secondary: ["lower_back"] },
  "Single-Leg DB RDL": { primary: ["hamstrings", "glutes"], secondary: ["lower_back", "core"] },
  "Pallof Press": { primary: ["core"], secondary: [] },
  "Seated Overhead Press": { primary: ["shoulders"], secondary: ["triceps"] },
  "Band Squat": { primary: ["quads", "glutes"], secondary: ["core"] },
  "Band Row": { primary: ["lats", "upper_back"], secondary: ["biceps"] },
  "Band Tricep Pushdowns": { primary: ["triceps"], secondary: [] },
  "Bench Dips": { primary: ["triceps"], secondary: ["chest", "shoulders"] },
  "Dumbbell Hammer Curls": { primary: ["biceps"], secondary: ["forearms"] },
};

// ─────────────────────────────────────────────────────────────────────────────
// Swappable exercise groups — any exercise in a group can be swapped for any
// other in the same group from the exercise card footer. Each entry is a full
// template exercise (same shape WORKOUTS uses), so a swap drops straight into
// flattenTemplate. Ported from the shell's SWAP_GROUPS.
// ─────────────────────────────────────────────────────────────────────────────
const SWAP_GROUPS = [
  [
    { name: "Band Romanian Deadlift", sets: 3, reps: "8-12", notes: "Stand on band, hinge at hips, handles at sides", video: "https://www.youtube.com/shorts/Op7zRCBjGvs", equipment: "band", rest: 120, noWarmup: true },
    { name: "Dumbbell Romanian Deadlift", sets: 3, reps: "8-12", notes: "Hinge at hips, slight knee bend", video: "https://www.youtube.com/shorts/cGMaBqaExBo", rest: 120, noWarmup: true },
    { name: "Single-Leg DB RDL", sets: 3, reps: "8", notes: "One DB in each hand, rear leg lifts as you hinge — slow tempo, 8 per leg. Warmup 1 set @ ~20lb, work @ ~30lb.", rest: 120 },
  ],
  // Tricep variants — usable as standalone OR as a superset member. The
  // `sets`/`rest` fields are ignored when the swap is applied inside a
  // superset wrapper (the wrapper controls rounds + inter-round rest); the
  // sub-only fields (name, reps, equipment, notes, video, bodyweight) are
  // what flattenTemplate's superset branch reads.
  [
    { name: "Band Tricep Pushdowns", sets: 3, reps: "12-15", notes: "Elbows glued to ribs, squeeze at bottom", equipment: "band", video: "https://www.youtube.com/shorts/eGjSphOefTI", rest: 60 },
    { name: "Bench Dips", sets: 3, reps: "10-15", notes: "Assisted tricep dip — hands on bench behind you, feet on floor, lower until elbows ~90°. Drape a band across your lap / over your knees for added resistance; leave bands empty for pure bodyweight.", equipment: "band", video: "https://www.youtube.com/shorts/0326dy_-CzM", rest: 60 },
  ],
];
function getSwapGroup(exerciseName) {
  return SWAP_GROUPS.find(g => g.some(e => e.name === exerciseName)) || null;
}
function getSwapOptions(exerciseName) {
  const g = getSwapGroup(exerciseName);
  return g ? g.filter(e => e.name !== exerciseName) : [];
}

// ─────────────────────────────────────────────────────────────────────────────
// Data adapters — convert WORKOUTS template + last-session + today-session
// into the design's `exercises[]` shape. Done once on mount; subsequent state
// edits mutate this in-memory tree.
// ─────────────────────────────────────────────────────────────────────────────

// Superset save format: each sub-exercise's set_number is an interleaved
// position. Round 0 sub 0 → 1, round 0 sub 1 → 2, round 1 sub 0 → 3, etc.
// Shared with the shell so /api/save data round-trips across both pages.
const interleavedSetNumber = (round, subIdx, subCount) => round * subCount + subIdx + 1;

// Each design Exercise is one row in the UI. A superset exercise from the
// template becomes N flattened design Exercises sharing a `superset` letter.
function flattenTemplate(workout, lastSessionMap, hintsMap) {
  hintsMap = hintsMap || {};
  // Two-tier lookup: prefer the workout's own most-recent session (so the
  // LAST pill literally means "last time you did this workout"), fall back
  // to global hints (so a workout you haven't done in a while still shows
  // useful values from whenever you last did that exercise in any workout).
  const lookupLast = (key) => lastSessionMap[key] || hintsMap[key] || null;
  // Grip cascades across sets of the same exercise — historically the user
  // only set grip on set 1 so sets 2/3 have grip=null in last data. Without
  // this fallback those sets would prefill to the template's first grip
  // option (typically "neutral") instead of inheriting set 1's choice.
  // Picks the first non-null grip found across last+hints data for the
  // exercise's name. Working sets win over warmup (warmups often use a
  // different grip or none at all).
  const exerciseGripCache = {};
  const lookupExerciseGrip = (exName) => {
    if (exerciseGripCache[exName] !== undefined) return exerciseGripCache[exName];
    let found = null;
    const scan = (src, kindFilter) => {
      Object.keys(src || {}).forEach(k => {
        if (found) return;
        const [n, kind] = k.split("|");
        if (n === exName && (!kindFilter || kind === kindFilter) && src[k].grip) found = src[k].grip;
      });
    };
    scan(lastSessionMap, "working");
    scan(hintsMap, "working");
    scan(lastSessionMap, "warmup");
    scan(hintsMap, "warmup");
    exerciseGripCache[exName] = found;
    return found;
  };
  const out = [];
  let supersetLetter = 'A';
  workout.exercises.forEach((ex, exIdx) => {
    if (ex.supersetExercises) {
      const subs = ex.supersetExercises;
      const letter = supersetLetter;
      supersetLetter = String.fromCharCode(supersetLetter.charCodeAt(0) + 1);
      const rounds = ex.sets || 3;
      subs.forEach((sub, subIdx) => {
        const sets = [];
        // Same per-exercise working-set fallback as the standalone branch:
        // SET 3 borrows from SET 1/2 if the specific set_number is empty.
        const subWorkingBySetNum = {};
        [hintsMap, lastSessionMap].forEach(src => {
          Object.keys(src || {}).forEach(k => {
            const [exName, kind, setNumStr] = k.split("|");
            if (exName === sub.name && kind === "working") {
              subWorkingBySetNum[parseInt(setNumStr)] = src[k];
            }
          });
        });
        const subFallback = (want) => {
          if (subWorkingBySetNum[want] != null) return subWorkingBySetNum[want];
          const nums = Object.keys(subWorkingBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
          return nums.length ? subWorkingBySetNum[nums[0]] : null;
        };
        const subExerciseGrip = lookupExerciseGrip(sub.name);
        // Mirror the standalone branch: explicit mode flags drive buildSet's
        // weight_lb interpretation + initial-value population. Without these
        // a bandsOnly sub (Band Tricep Pushdowns) falls through to the plain
        // loaded branch, which assigns set.bands = [] even when last data
        // has bands — so the bands grid renders empty on mount.
        const subIsAssist = !!sub.assist;
        const subIsBandOnly = sub.equipment === "band" && !sub.bandAddon && !subIsAssist;
        for (let r = 0; r < rounds; r++) {
          const setNumber = interleavedSetNumber(r, subIdx, subs.length);
          const last = subFallback(setNumber) || lookupLast(`${sub.name}|working|${setNumber}`);
          sets.push(buildSet({
            kind: "work", idx: r + 1,
            template: sub,
            last,
            setNumber,
            saveExerciseName: sub.name,
            isAssist: subIsAssist,
            isBandOnly: subIsBandOnly,
            fallbackGrip: subExerciseGrip,
          }));
        }
        out.push({
          id: `${exIdx}-${subIdx}`,
          templateExIdx: exIdx,
          subIdx,
          name: sub.name,
          mode: undefined,
          superset: letter,
          supersetPos: subIdx + 1,
          repRange: sub.reps,
          note: sub.notes || ex.notes || "",
          rest: ex.rest || 60,
          grips: sub.grips ? sub.grips.map(g => ({ id: g, ...GRIP_LABELS[g] })) : null,
          isBandsOnly: sub.equipment === "band" && !sub.bandAddon,
          bandAddon: !!sub.bandAddon,
          assist: !!sub.assist,
          session: ex.session || null,
          sets,
        });
      });
    } else {
      const sets = [];
      const isAssist = !!ex.assist;
      const isBandOnly = ex.equipment === "band" && !ex.bandAddon && !isAssist;
      // Warmup sets. Default = 1; pass `warmups: 2` (or more) on the template
      // to ramp up before the work sets. Each warmup gets its own set_number
      // (0, 1, …) so /api/last-session round-trips per-warmup last values.
      //
      // Fallback: when a warmup setNumber has no last-session record (common
      // when you add a new warmup slot to an exercise that historically had
      // fewer), borrow data from any other warmup of the same exercise. This
      // keeps the LAST pill / stepper prefill useful instead of showing 0lb
      // with no context. Picking by smallest |Δsetnumber| favors adjacent
      // warmups (W1 inherits from W2 before W3, etc.).
      if (!ex.noWarmup) {
        const warmupCount = Math.max(1, ex.warmups || 1);
        // Build a per-exercise warmup index from BOTH the workout's last
        // session and the cross-workout hints, so adding a 2nd warmup slot
        // to an exercise that historically had 1 still surfaces data.
        const warmupLastBySetNum = {};
        [hintsMap, lastSessionMap].forEach(src => {
          Object.keys(src || {}).forEach(k => {
            const [exName, kind, setNumStr] = k.split("|");
            if (exName === ex.name && kind === "warmup") {
              warmupLastBySetNum[parseInt(setNumStr)] = src[k];
            }
          });
        });
        const fallbackForWarmup = (want) => {
          if (warmupLastBySetNum[want] != null) return warmupLastBySetNum[want];
          const nums = Object.keys(warmupLastBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
          return nums.length ? warmupLastBySetNum[nums[0]] : null;
        };
        const exGripFallback = lookupExerciseGrip(ex.name);
        for (let wi = 0; wi < warmupCount; wi++) {
          const setNumber = wi;
          const last = fallbackForWarmup(setNumber);
          sets.push(buildSet({
            kind: "warmup",
            // idx drives the active-block header. For multi-warmup we show
            // "Warm-up 1" / "Warm-up 2"; single keeps the cleaner "Warm-up".
            idx: warmupCount > 1 ? `W${wi + 1}` : "W",
            template: ex,
            last,
            setNumber,
            saveExerciseName: ex.name,
            isAssist, isBandOnly,
            fallbackGrip: exGripFallback,
          }));
        }
      }
      // Build a per-exercise working-set index across both data sources too,
      // so SET 3 prefill can still fall back to SET 1 if the user has only
      // ever done one working set so far.
      const workingLastBySetNum = {};
      [hintsMap, lastSessionMap].forEach(src => {
        Object.keys(src || {}).forEach(k => {
          const [exName, kind, setNumStr] = k.split("|");
          if (exName === ex.name && kind === "working") {
            workingLastBySetNum[parseInt(setNumStr)] = src[k];
          }
        });
      });
      const fallbackForWorking = (want) => {
        if (workingLastBySetNum[want] != null) return workingLastBySetNum[want];
        const nums = Object.keys(workingLastBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
        return nums.length ? workingLastBySetNum[nums[0]] : null;
      };
      const workGripFallback = lookupExerciseGrip(ex.name);
      for (let i = 0; i < (ex.sets || 3); i++) {
        const setNumber = i + 1;
        const last = fallbackForWorking(setNumber);
        sets.push(buildSet({
          kind: "work", idx: i + 1,
          template: ex,
          last,
          setNumber,
          saveExerciseName: ex.name,
          fallbackGrip: workGripFallback,
          isAssist, isBandOnly,
        }));
      }
      out.push({
        id: String(exIdx),
        templateExIdx: exIdx,
        subIdx: null,
        name: ex.name,
        mode: isAssist ? "bodyweight" : undefined,
        superset: ex.superset || null,
        supersetPos: null,
        repRange: ex.reps,
        note: ex.notes || "",
        rest: ex.rest || 60,
        grips: ex.grips ? ex.grips.map(g => ({ id: g, ...GRIP_LABELS[g] })) : null,
        isBandsOnly: isBandOnly,
        bandAddon: !!ex.bandAddon,
        assist: isAssist,
        session: ex.session || null,
        sets,
      });
    }
  });
  return out;
}

// Single set initializer. `last` is the dict from /api/last-session for this
// exercise|set_type|set_number, or undefined.
//
// Mode-specific weight_lb interpretation (the save format stores the
// combined value; this page must invert it back to its parts):
//   • plain "loaded"  → weight_lb = DB weight, lastWeight = weight_lb
//   • bandAddon       → weight_lb = DB + Σbands (combined). lastWeight is the
//                       DB-only portion so the stepper shows DB and the bands
//                       grid adds on top (otherwise the stepper would read
//                       e.g. 75 when DB was actually 60 + 15-band).
//   • assist          → weight_lb = bodyweight − Σbands (net). lastBodyweight
//                       recovers the BW number by adding Σbands back.
//   • bandsOnly       → weight_lb = Σbands. Stepper hidden, no lastWeight.
function buildSet({ kind, idx, template, last, setNumber, saveExerciseName, isAssist, isBandOnly, fallbackGrip }) {
  const set = {
    kind, idx,
    setNumber,
    saveExerciseName,
    completed: false,
    active: false,
    reps: null,
  };
  if (last) {
    set.lastReps = parseInt(last.reps) || null;
    set.lastBands = last.bands_json ? safeJSON(last.bands_json) : [];
    // Per-set grip cascades to the exercise-wide grip when the specific set's
    // last record has none (common: user only set grip on set 1, sets 2-3
    // were saved with grip=null). Without this, sets 2-3 would prefill to
    // the template's default grip and the LAST marker dot wouldn't show.
    set.lastGrip = last.grip || fallbackGrip || null;
    const lastBandSum = (set.lastBands || []).reduce((a, b) => a + b, 0);
    const savedLb = last.weight_lb || 0;
    if (template.assist) {
      set.lastBodyweight = savedLb + lastBandSum;
    } else if (template.bandAddon) {
      set.lastWeight = Math.max(0, savedLb - lastBandSum);
    } else if (isBandOnly) {
      // No DB ever shown; bands carry the load. Leave lastWeight unset.
    } else {
      set.lastWeight = savedLb;
    }
  } else {
    set.lastBands = [];
    // Even with no per-set last record, surface the exercise-wide grip if
    // one exists in any other set's history. Keeps the LAST marker
    // showing on the grip pill for an exercise the user has done before.
    if (fallbackGrip) set.lastGrip = fallbackGrip;
  }
  // Initial value: prefill from last so the user usually only adjusts reps.
  if (template.assist) {
    set.bodyweight = set.lastBodyweight || 175;
    set.bands = (set.lastBands || []).slice();
    set.grip = set.lastGrip || (template.grips ? template.grips[0] : null);
  } else if (isBandOnly) {
    set.weight = 0;
    set.bands = (set.lastBands || []).slice();
    set.bandsOnly = true;
  } else {
    set.weight = set.lastWeight || 0;
    set.bands = template.bandAddon ? (set.lastBands || []).slice() : [];
    if (template.grips) set.grip = set.lastGrip || template.grips[0];
  }
  return set;
}

const safeJSON = (s) => { try { return JSON.parse(s); } catch (_) { return []; } };

// Apply today-session sets onto the freshly-built exercises[] (mark completed,
// restore actual reps/weight/bands the user already logged this session).
function hydrateToday(exercises, todaySets) {
  if (!todaySets || !todaySets.length) return exercises;
  // Index design exercises by name+setNumber for O(N) hydration.
  const map = new Map();
  exercises.forEach((ex, eIdx) => {
    ex.sets.forEach((s, sIdx) => {
      const key = `${s.saveExerciseName}|${s.kind === "warmup" ? "warmup" : "working"}|${s.setNumber}`;
      map.set(key, { eIdx, sIdx });
    });
  });
  const next = exercises.map(ex => ({ ...ex, sets: ex.sets.map(s => ({ ...s })) }));
  todaySets.forEach(row => {
    const key = `${row.exercise}|${row.set_type}|${row.set_number}`;
    const ref = map.get(key);
    if (!ref) return;
    const ex = next[ref.eIdx];
    const set = ex.sets[ref.sIdx];
    set.reps = parseInt(row.reps) || null;
    set.completed = true;
    const bands = row.bands_json ? safeJSON(row.bands_json) : [];
    set.bands = bands;
    const bandSum = bands.reduce((a, b) => a + b, 0);
    const savedLb = row.weight_lb || 0;
    // Same mode-specific inversion as buildSet — see comment there.
    if (ex.assist) {
      set.bodyweight = savedLb + bandSum;
    } else if (ex.bandAddon) {
      set.weight = Math.max(0, savedLb - bandSum);
    } else if (ex.isBandsOnly) {
      set.weight = 0;
    } else {
      set.weight = savedLb;
    }
    if (row.grip) set.grip = row.grip;
  });
  return activateNextSet(next);
}

// Pick the next uncompleted set across all exercises and mark it active.
// Mutates and returns the input array. Honors `exercise.skipped` (the whole
// exercise is opted out, so its sets are never the active focus). Within
// each non-skipped exercise we activate the next uncompleted set AFTER the
// highest-index completed set — never backward.
// Skipped/unused intermediate slots stay tappable in the strip but don't
// receive automatic focus. If every set is past the highest completion mark
// with nothing left (or the only candidates live in skipped exercises), no
// set is active and the workout reads as done.
function activateNextSet(exercises) {
  // Clear any pre-existing active flags so we have a single source of truth.
  for (const ex of exercises) {
    for (const s of ex.sets) if (s.active) s.active = false;
  }
  let activated = false;
  for (const ex of exercises) {
    if (activated) break;
    if (ex.skipped) continue;
    let highestCompleted = -1;
    for (let i = 0; i < ex.sets.length; i++) {
      if (ex.sets[i].completed) highestCompleted = i;
    }
    for (let i = highestCompleted + 1; i < ex.sets.length; i++) {
      if (!ex.sets[i].completed) {
        ex.sets[i].active = true;
        activated = true;
        break;
      }
    }
  }
  return exercises;
}

// ─────────────────────────────────────────────────────────────────────────────
// Skipped-exercise persistence — survives page reload, scoped to a
// (workout, date) tuple so a fresh day starts with a clean slate without
// caring whether the session got a server-side `id` yet.
//
// NOTE: the "v2-" localStorage key prefix is a legacy name kept stable so
// existing in-flight data is not orphaned. It does NOT mean an app version —
// it is just an opaque key string, also read by the shell (workout.html).
// ─────────────────────────────────────────────────────────────────────────────
const SKIPPED_LS_KEY = (workoutName, date) => `v2-skipped:${workoutName}:${date}`;
function loadSkippedExercises(workoutName, date) {
  try {
    const raw = localStorage.getItem(SKIPPED_LS_KEY(workoutName, date));
    return new Set(raw ? JSON.parse(raw) : []);
  } catch { return new Set(); }
}
function saveSkippedExercises(workoutName, date, namesSet) {
  try {
    localStorage.setItem(SKIPPED_LS_KEY(workoutName, date), JSON.stringify([...namesSet]));
  } catch (e) {
    console.warn("[V2-SKIPPED] localStorage save failed:", e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Swapped-exercise persistence — a map { templateExIdx: chosenName } scoped to
// a (workout, date) tuple, same convention as the skip store. Survives reload.
// ─────────────────────────────────────────────────────────────────────────────
const SWAP_LS_KEY = (workoutName, date) => `v2-swaps:${workoutName}:${date}`;
function loadSwaps(workoutName, date) {
  try {
    const raw = localStorage.getItem(SWAP_LS_KEY(workoutName, date));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}
function saveSwaps(workoutName, date, swapMap) {
  try {
    if (swapMap && Object.keys(swapMap).length) {
      localStorage.setItem(SWAP_LS_KEY(workoutName, date), JSON.stringify(swapMap));
    } else {
      localStorage.removeItem(SWAP_LS_KEY(workoutName, date));
    }
  } catch (e) {
    console.warn("[V2-SWAP] localStorage save failed:", e);
  }
}
// ─────────────────────────────────────────────────────────────────────────────
// PM-started gate — when a workout uses the two-a-day split, the PM block is
// hidden behind a "Continue" button until the user explicitly opens it, so
// the screen during AM only shows AM exercises. Scoped to (workout, date)
// like skip/swap; auto-detected from any completed PM set if localStorage is
// stale or cleared on a different device.
// ─────────────────────────────────────────────────────────────────────────────
const PM_STARTED_LS_KEY = (workoutName, date) => `v2-pm-started:${workoutName}:${date}`;
function loadPmStarted(workoutName, date) {
  try { return localStorage.getItem(PM_STARTED_LS_KEY(workoutName, date)) === "1"; }
  catch { return false; }
}
function savePmStarted(workoutName, date, started) {
  try {
    if (started) localStorage.setItem(PM_STARTED_LS_KEY(workoutName, date), "1");
    else localStorage.removeItem(PM_STARTED_LS_KEY(workoutName, date));
  } catch (e) {
    console.warn("[V2-PM] localStorage save failed:", e);
  }
}

// Produce a workout template with swaps applied — each swapped slot's exercise
// is replaced by the chosen group member. Returned shape matches WORKOUTS so it
// flows straight into flattenTemplate.
//
// Swap key formats:
//   "<idx>"           — top-level exercise at workout.exercises[idx]
//   "<idx>-<subIdx>"  — superset member at workout.exercises[idx].supersetExercises[subIdx]
//
// This lets the user swap one half of a superset (e.g. Band Tricep Pushdowns
// → Bench Dips) without rewriting the wrapper or losing the partner exercise.
function applySwaps(workout, swapMap) {
  if (!swapMap || !Object.keys(swapMap).length) return workout;
  return {
    ...workout,
    exercises: workout.exercises.map((ex, idx) => {
      // Top-level replacement.
      const topWant = swapMap[`${idx}`];
      if (topWant && topWant !== ex.name) {
        const grp = getSwapGroup(ex.name);
        const repl = grp && grp.find(e => e.name === topWant);
        if (repl) return { ...repl };
      }
      // Per-sub replacement within a superset wrapper.
      if (ex.supersetExercises) {
        let changed = false;
        const newSubs = ex.supersetExercises.map((sub, subIdx) => {
          const subWant = swapMap[`${idx}-${subIdx}`];
          if (!subWant || subWant === sub.name) return sub;
          const grp = getSwapGroup(sub.name);
          const repl = grp && grp.find(e => e.name === subWant);
          if (!repl) return sub;
          changed = true;
          // Strip wrapper-owned fields so the replacement reads cleanly as a sub.
          const { sets: _s, rest: _r, warmups: _w, ...subFields } = repl;
          return subFields;
        });
        if (changed) return { ...ex, supersetExercises: newSubs };
      }
      return ex;
    }),
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// Save: serialize state into the shared /api/save shape and POST. Single-
// in-flight + queue pattern guards against an autoSave race.
// ─────────────────────────────────────────────────────────────────────────────
function serializeForSave(exercises, workoutName, sessionId, startedAt, elapsed) {
  const sets = [];
  exercises.forEach(ex => {
    ex.sets.forEach(s => {
      if (!s.completed) return;
      const isAssist = ex.assist;
      const bands = s.bands || [];
      const bandSum = bands.reduce((a, b) => a + b, 0);
      // weight_lb is the COMBINED load lifted (the shared save format,
      // so /api/last-session round-trips across both pages, and history /
      // 1RM stats accumulate the actual weight moved):
      //   • assist        → BW − Σbands  (net after assistance)
      //   • bandsOnly     → Σbands
      //   • bandAddon     → DB + Σbands  (e.g. 60lb DB + 15lb band = 75)
      //   • plain loaded  → DB
      let weight_lb;
      if (isAssist) {
        weight_lb = Math.max(0, (s.bodyweight || 0) - bandSum);
      } else if (ex.isBandsOnly) {
        weight_lb = bandSum;
      } else if (ex.bandAddon) {
        weight_lb = (s.weight || 0) + bandSum;
      } else {
        weight_lb = s.weight || 0;
      }
      sets.push({
        exercise: s.saveExerciseName,
        set_type: s.kind === "warmup" ? "warmup" : "working",
        set_number: s.setNumber,
        reps: String(s.reps || ""),
        weight_lb,
        bands_json: bands.length ? JSON.stringify(bands) : null,
        grip: s.grip || null,
      });
    });
  });
  return {
    workout: workoutName,
    date: localDate(),
    duration_sec: elapsed,
    session_id: sessionId || null,
    started_at: startedAt ? new Date(startedAt).toISOString() : null,
    sets,
  };
}

let _saveInFlight = false;
let _savePending = null;
async function autoSavePayload(payload, onResolved) {
  if (_saveInFlight) {
    _savePending = { payload, onResolved };
    return;
  }
  _saveInFlight = true;
  try {
    const res = await api.save(payload);
    if (res.ok) onResolved(res.id);
  } catch (e) {
    console.error("[V2-SAVE] error:", e);
  } finally {
    _saveInFlight = false;
    if (_savePending) {
      const next = _savePending; _savePending = null;
      autoSavePayload(next.payload, next.onResolved);
    }
  }
}

// Header — ← back to / (the shell's home), workout picker, set count, elapsed timer,
// animated progress bar. The workout name is also the dropdown trigger to
// flip between Full Body / Back / etc. without leaving the screen.
function Header({ workout, workouts, onPickWorkout, done, total, elapsedSec }) {
  const pct = total ? (done / total) * 100 : 0;
  const m = Math.floor(elapsedSec / 60);
  const s = String(elapsedSec % 60).padStart(2, "0");
  const [open, setOpen] = useState(false);
  // Click-outside dismissal — checking the click target keeps the menu open
  // when you click ON the trigger button itself (which would otherwise see
  // the document-level click and immediately re-close).
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (!e.target.closest || !e.target.closest("[data-workout-menu]")) setOpen(false);
    };
    document.addEventListener("click", onDoc);
    return () => document.removeEventListener("click", onDoc);
  }, [open]);
  return (
    <div style={{ background: T.page, padding: "14px 18px 14px", position: "sticky", top: 0, zIndex: 5 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
          <a href="/" style={{ color: T.accent, fontSize: 16, fontWeight: 600, textDecoration: "none", flexShrink: 0 }} title="Home">← Back</a>
          <div data-workout-menu style={{ position: "relative", minWidth: 0 }}>
            <button onClick={() => setOpen(o => !o)} style={{
              background: "transparent", border: 0, color: T.strong,
              fontSize: 17, fontWeight: 700, letterSpacing: -0.3,
              padding: 0, cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
              maxWidth: "100%",
            }}>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{workout.name}</span>
              <span style={{ color: T.faint, fontSize: 12, transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 160ms ease" }}>▾</span>
            </button>
            {open && (
              <div style={{
                position: "absolute", top: "100%", left: 0, marginTop: 6,
                background: "#0f1722", border: `1px solid ${T.cardBorder}`,
                borderRadius: 10, padding: 4, minWidth: 200, zIndex: 10,
                boxShadow: "0 10px 30px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04)",
              }}>
                {workouts.map(w => {
                  const sel = w.id === workout.id;
                  return (
                    <button key={w.id} onClick={() => { setOpen(false); onPickWorkout(w.id); }} style={{
                      display: "block", width: "100%", textAlign: "left",
                      background: sel ? "rgba(59,130,246,0.12)" : "transparent",
                      border: 0,
                      color: sel ? T.accentLight : T.text,
                      fontSize: 14, fontWeight: sel ? 700 : 500,
                      padding: "9px 12px", borderRadius: 7, cursor: "pointer",
                    }}>
                      {w.name}
                      <span style={{ marginLeft: 8, color: T.faint, fontSize: 11, fontWeight: 500 }}>{w.duration}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
          <span style={{ color: T.faint, fontFamily: T.mono, fontSize: 12, fontWeight: 600 }}>{done}/{total}</span>
          <span style={{ color: elapsedSec > 0 ? T.green : T.faint, fontFamily: T.mono, fontWeight: 700, fontSize: 15 }}>{m}:{s}</span>
        </div>
      </div>
      <div style={{ height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: T.accent, borderRadius: 99, transition: "width 240ms ease" }} />
      </div>
    </div>
  );
}

// 52×52 / 40×40 stepper button. transform:scale on press for tactile feedback.
function StepperBtn({ children, onClick, big, dim }) {
  const press = (e, val) => { e.currentTarget.style.transform = val; };
  return (
    <button
      onClick={onClick}
      onMouseDown={e => press(e, "scale(0.92)")}
      onMouseUp={e => press(e, "scale(1)")}
      onMouseLeave={e => press(e, "scale(1)")}
      onTouchStart={e => press(e, "scale(0.92)")}
      onTouchEnd={e => press(e, "scale(1)")}
      style={{
        width: big ? 52 : 40, height: big ? 52 : 40, borderRadius: 12,
        background: "rgba(255,255,255,0.04)",
        border: "1px solid rgba(255,255,255,0.08)",
        color: dim ? T.faint : "#D1D5DB",
        fontFamily: T.mono, fontWeight: 600, fontSize: big ? 22 : 14,
        cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, lineHeight: 1,
        transition: "transform 80ms ease, background 120ms ease",
      }}
    >{children}</button>
  );
}

function WeightStepper({ value, last, pr, onPick, label }) {
  const v = value ?? last ?? 0;
  const step = (delta) => onPick(Math.max(0, Math.round((v + delta) * 10) / 10));
  const atLast = last != null && v === last;
  const diff = last != null ? v - last : 0;
  return (
    <div style={{ marginTop: 14 }}>
      {label && (
        <div style={{ marginBottom: 6, color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.6 }}>
          {label}
        </div>
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <StepperBtn onClick={() => step(-5)} big>−</StepperBtn>
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
            <span style={{ color: T.strong, fontFamily: T.mono, fontSize: 36, fontWeight: 800, letterSpacing: -1, lineHeight: 1 }}>{v}</span>
            <span style={{ color: T.faint, fontFamily: T.mono, fontSize: 14, fontWeight: 600 }}>lb</span>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center", fontFamily: T.mono, fontSize: 11, color: T.faint }}>
            {last != null && (
              <button onClick={() => onPick(last)} style={{
                background: atLast ? "rgba(96,165,250,0.10)" : "transparent",
                border: atLast ? `1px solid rgba(96,165,250,0.3)` : "1px dashed rgba(255,255,255,0.1)",
                color: atLast ? T.accentLight : T.faint,
                fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                padding: "3px 7px", borderRadius: 5, cursor: "pointer",
              }}>LAST {last}</button>
            )}
            {!atLast && diff !== 0 && (
              <span style={{ color: diff > 0 ? T.green : T.red, fontWeight: 700 }}>
                {diff > 0 ? "+" : ""}{diff}
              </span>
            )}
            {pr != null && <span>· PR {pr}</span>}
          </div>
        </div>
        <StepperBtn onClick={() => step(5)} big>+</StepperBtn>
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 8 }}>
        <StepperBtn onClick={() => step(-2.5)} dim>−2.5</StepperBtn>
        <StepperBtn onClick={() => step(2.5)} dim>+2.5</StepperBtn>
      </div>
    </div>
  );
}

function GripSelector({ grips, selected, last, onPick }) {
  if (!grips || grips.length === 0) return null;
  return (
    <div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.6 }}>GRIP</span>
        {last && last !== selected && (
          <button onClick={() => onPick(last)} style={{ background: "transparent", border: 0, color: T.accentLight, fontFamily: T.mono, fontSize: 11, fontWeight: 700, padding: 0, cursor: "pointer" }}>
            use last: {last}
          </button>
        )}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${grips.length}, 1fr)`, gap: 6 }}>
        {grips.map(g => {
          const sel = g.id === selected;
          const wasLast = g.id === last;
          return (
            <button key={g.id} onClick={() => onPick(g.id)} style={{
              position: "relative",
              background: sel ? "rgba(96,165,250,0.18)" : "rgba(255,255,255,0.03)",
              border: sel ? `1px solid ${T.accentLight}` : "1px solid rgba(255,255,255,0.08)",
              color: sel ? "#DBEAFE" : T.muted,
              padding: "9px 4px 8px", borderRadius: 8, cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
              transition: "all 120ms ease",
            }}>
              {wasLast && (
                <span style={{ position: "absolute", top: 4, left: 5, width: 5, height: 5, borderRadius: "50%", background: T.accentLight }} />
              )}
              <span style={{ fontSize: 13, fontWeight: 700 }}>{g.label}</span>
              <span style={{ fontSize: 9, color: sel ? T.muted : T.faint, fontFamily: T.mono, letterSpacing: 0.4, textTransform: "uppercase" }}>{g.hint}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// Bands grid — 5 chips, multi-select. Header shows label + use-last + clear.
function BandsGrid({ bands, lastBands, onToggle, onClear, isAssist }) {
  const total = bands.reduce((a, b) => a + b, 0);
  const lastTotal = lastBands.reduce((a, b) => a + b, 0);
  const showUseLast = lastBands.length > 0 && !(lastBands.length === bands.length && lastBands.every(b => bands.includes(b)));
  return (
    <div style={{ marginTop: 14 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ color: T.muted, fontFamily: T.mono, fontSize: 10, fontWeight: 700, letterSpacing: 0.6 }}>
          {isAssist ? "ASSISTANCE" : "BANDS"} <span style={{ color: T.faint, fontWeight: 500 }}>· tap to add</span>
        </span>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          {showUseLast && (
            <button onClick={() => onToggle("__use_last__")} style={{ background: "transparent", border: 0, color: T.bands, fontFamily: T.mono, fontSize: 11, fontWeight: 700, padding: 0, cursor: "pointer" }}>
              use last: {lastBands.join("+")}
            </button>
          )}
          {bands.length > 0 && (
            <button onClick={onClear} style={{ background: "transparent", border: 0, color: T.faint, fontSize: 11, padding: 0, cursor: "pointer" }}>clear</button>
          )}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6 }}>
        {BAND_VALUES.map(v => {
          const sel = bands.includes(v);
          const wasLast = lastBands.includes(v);
          return (
            <button key={v} onClick={() => onToggle(v)} style={{
              position: "relative",
              background: sel ? "rgba(192,132,252,0.18)" : "rgba(255,255,255,0.03)",
              border: sel ? `1px solid ${T.bands}` : "1px solid rgba(255,255,255,0.08)",
              color: sel ? T.bandsText : T.muted,
              fontFamily: T.mono, fontWeight: 700, fontSize: 13,
              padding: "9px 0", borderRadius: 8, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 120ms ease",
            }}>
              {wasLast && (
                <span style={{ position: "absolute", top: 4, left: 5, width: 5, height: 5, borderRadius: "50%", background: T.bands }} />
              )}
              {v}
            </button>
          );
        })}
      </div>
      {bands.length > 0 && (
        <div style={{ marginTop: 8, color: T.bands, fontFamily: T.mono, fontSize: 11, opacity: 0.85 }}>
          {bands.join(" + ")} = {isAssist ? "−" : "+"}{total}lb
        </div>
      )}
    </div>
  );
}

// Single rep cell. States: idle/in-range/last/logged.
function RepCell({ n, inRange, isLast, isLogged, onClick }) {
  let bg = "transparent";
  let color = inRange ? "#D1D5DB" : T.faint;
  let border = "1px solid transparent";
  if (inRange) {
    bg = "rgba(34,197,94,0.05)";
    border = "1px solid rgba(34,197,94,0.18)";
  }
  if (isLast) {
    border = "1.5px solid rgba(34,197,94,0.55)";
    color = "#86EFAC";
  }
  if (isLogged) {
    bg = "#22C55E";
    border = "1px solid #22C55E";
    color = T.inv;
  }
  return (
    <button
      onClick={onClick}
      style={{
        position: "relative", width: 38, height: 44, borderRadius: 9,
        background: bg, border, color,
        fontFamily: T.mono, fontWeight: isLogged || isLast ? 800 : 600, fontSize: 14,
        cursor: "pointer", flexShrink: 0,
        transition: "transform 80ms ease, background 120ms ease",
        animation: isLogged ? "set-pulse 320ms ease-out" : "none",
      }}
      onMouseDown={e => (e.currentTarget.style.transform = "scale(0.92)")}
      onMouseUp={e => (e.currentTarget.style.transform = "scale(1)")}
      onMouseLeave={e => (e.currentTarget.style.transform = "scale(1)")}
    >
      {isLast && !isLogged && (
        <span style={{ position: "absolute", top: 4, left: 5, width: 5, height: 5, borderRadius: "50%", background: "#22C55E" }} />
      )}
      {n}
    </button>
  );
}

function RepStrip({ min = 1, max = 20, range, last, logged, onLog }) {
  const [lo, hi] = range || [];
  const ref = useRef(null);
  const [edges, setEdges] = useState({ left: false, right: true });
  const updateEdges = () => {
    const el = ref.current; if (!el) return;
    const left = el.scrollLeft > 4;
    const right = el.scrollLeft + el.clientWidth < el.scrollWidth - 4;
    setEdges(p => (p.left === left && p.right === right ? p : { left, right }));
  };
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const target = el.querySelector(`[data-n="${logged ?? last ?? lo ?? min}"]`);
    if (target) {
      const left = target.offsetLeft - el.clientWidth / 2 + target.clientWidth / 2;
      el.scrollTo({ left, behavior: "instant" });
    }
    updateEdges();
  }, []);
  const fadePx = 28;
  const maskParts = [
    edges.left ? `transparent 0, black ${fadePx}px` : `black 0`,
    edges.right ? `black calc(100% - ${fadePx}px), transparent 100%` : `black 100%`,
  ];
  const maskImage = `linear-gradient(to right, ${maskParts.join(", ")})`;
  return (
    <div style={{ position: "relative", marginTop: 6 }}>
      <div
        ref={ref}
        onScroll={updateEdges}
        className="scroll-row"
        style={{
          display: "flex", gap: 5, overflowX: "auto",
          padding: "8px 4px 6px",
          WebkitOverflowScrolling: "touch",
          WebkitMaskImage: maskImage, maskImage,
        }}
      >
        {Array.from({ length: max - min + 1 }, (_, i) => min + i).map(n => {
          const inRange = lo != null && n >= lo && n <= hi;
          return (
            <div key={n} data-n={n}>
              <RepCell n={n} inRange={inRange} isLast={last === n && logged !== n} isLogged={logged === n} onClick={() => onLog(n)} />
            </div>
          );
        })}
      </div>
      <div aria-hidden style={{
        position: "absolute", left: 2, top: "50%", transform: "translateY(-50%)",
        width: 22, height: 22, borderRadius: 11,
        background: "rgba(17,24,39,0.92)", border: "1px solid #374151",
        display: "flex", alignItems: "center", justifyContent: "center",
        color: "#D1D5DB", fontSize: 14, fontWeight: 800, fontFamily: T.mono, lineHeight: 1,
        opacity: edges.left ? 1 : 0, transition: "opacity 160ms ease",
        pointerEvents: "none", animation: edges.left ? "repNudgeL 2.4s ease-in-out infinite" : "none",
      }}>‹</div>
      <div aria-hidden style={{
        position: "absolute", right: 2, top: "50%", transform: "translateY(-50%)",
        width: 22, height: 22, borderRadius: 11,
        background: "rgba(17,24,39,0.92)", border: "1px solid #374151",
        display: "flex", alignItems: "center", justifyContent: "center",
        color: "#D1D5DB", fontSize: 14, fontWeight: 800, fontFamily: T.mono, lineHeight: 1,
        opacity: edges.right ? 1 : 0, transition: "opacity 160ms ease",
        pointerEvents: "none", animation: edges.right ? "repNudgeR 2.4s ease-in-out infinite" : "none",
      }}>›</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ActiveSetBlock — the controls for the currently-being-logged set.
// ─────────────────────────────────────────────────────────────────────────────
function ActiveSetBlock({ exercise, set, totalWork, totalWarmup, warmupPos, onPickWeight, onPickBodyweight, onPickGrip, onToggleBand, onClearBands, onLogReps, onSkipWarmup, onApplyLast }) {
  const isBW = exercise.mode === "bodyweight";
  const bands = set.bands || [];
  const lastBands = set.lastBands || [];
  const baseW = isBW ? (set.bodyweight || 0) : set.weight;
  const lastBaseW = isBW ? (set.lastBodyweight || 0) : (set.lastWeight || 0);
  const bandTotal = bands.reduce((a, b) => a + b, 0);
  const lastBandTotal = lastBands.reduce((a, b) => a + b, 0);
  const lastTotal = isBW ? Math.max(0, lastBaseW - lastBandTotal) : (lastBaseW + lastBandTotal);

  const matchesLast =
    (set.lastReps != null) &&
    baseW === lastBaseW &&
    (!exercise.grips || set.grip === set.lastGrip) &&
    bands.length === lastBands.length &&
    bands.every(b => lastBands.includes(b));

  const hasLast = set.lastWeight != null || set.lastBodyweight != null || set.lastReps != null;
  const range = (() => {
    const m = String(exercise.repRange || "").match(/(\d+)\D+(\d+)/);
    return m ? [parseInt(m[1]), parseInt(m[2])] : null;
  })();

  return (
    <div style={{
      borderRadius: 12,
      background: "linear-gradient(180deg, rgba(59,130,246,0.08), rgba(17,24,39,0.55))",
      boxShadow: "0 0 0 1px rgba(96,165,250,0.35), 0 8px 24px -8px rgba(59,130,246,0.4)",
      padding: "14px 14px 16px",
      marginTop: 14, marginBottom: 6,
    }}>
      {/* header line */}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 12, gap: 10 }}>
        {set.kind === "warmup" ? (
          <span style={{ color: T.amber, fontWeight: 700, fontSize: 17, letterSpacing: -0.2 }}>
            Warm-up
            {totalWarmup > 1 && (
              <>
                <span style={{ fontFamily: T.mono }}> {warmupPos}</span>
                <span style={{ color: T.faint, fontWeight: 500 }}> of {totalWarmup}</span>
              </>
            )}
          </span>
        ) : (
          <span style={{ color: T.strong, fontWeight: 700, fontSize: 17, letterSpacing: -0.2 }}>
            Set <span style={{ fontFamily: T.mono }}>{set.idx}</span>
            {totalWork > 0 && <span style={{ color: T.faint, fontWeight: 500 }}> of {totalWork}</span>}
          </span>
        )}
      </div>

      {/* last-session pill */}
      {hasLast && (
        <button
          onClick={onApplyLast}
          disabled={matchesLast}
          style={{
            width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
            gap: 10, padding: "9px 12px",
            background: matchesLast ? "rgba(96,165,250,0.08)" : "rgba(59,130,246,0.06)",
            border: matchesLast ? "1px solid rgba(96,165,250,0.35)" : "1px dashed rgba(96,165,250,0.45)",
            borderRadius: 10,
            cursor: matchesLast ? "default" : "pointer",
            color: T.accentLight, marginBottom: 10,
          }}
        >
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, minWidth: 0 }}>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, fontFamily: T.mono, opacity: 0.75 }}>LAST</span>
            <span style={{ fontFamily: T.mono, fontSize: 14, fontWeight: 700, color: "#DBEAFE" }}>
              {lastBaseW || "—"}
              {lastBands.length > 0 && (
                <span style={{ color: T.bands }}> {isBW ? "−" : "+"} {lastBands.join("+")}</span>
              )}
              <span style={{ color: T.faint, fontWeight: 500 }}> × </span>
              {set.lastReps || "—"}
              {isBW && set.lastGrip && <span style={{ color: T.muted, fontWeight: 500 }}> · {GRIP_LABELS[set.lastGrip]?.label || set.lastGrip}</span>}
            </span>
            {lastBandTotal > 0 && (
              <span style={{ color: T.faint, fontFamily: T.mono, fontSize: 11 }}>({lastTotal}lb)</span>
            )}
          </div>
          <span style={{ fontSize: 12, fontWeight: 600, opacity: matchesLast ? 0.7 : 1 }}>
            {matchesLast ? "✓ matched" : "use last"}
          </span>
        </button>
      )}

      {/* grip — bodyweight or graded exercises */}
      {exercise.grips && (
        <GripSelector
          grips={exercise.grips}
          selected={set.grip}
          last={set.lastGrip}
          onPick={onPickGrip}
        />
      )}

      {/* weight / bodyweight stepper (skipped for bands-only) */}
      {!exercise.isBandsOnly && (
        <WeightStepper
          value={baseW}
          last={lastBaseW || null}
          onPick={isBW ? onPickBodyweight : onPickWeight}
          label={isBW ? "BODYWEIGHT" : null}
        />
      )}

      {/* bands grid (skipped for weightOnly sets) */}
      {(exercise.isBandsOnly || exercise.bandAddon || exercise.assist) && (
        <BandsGrid
          bands={bands}
          lastBands={lastBands}
          onToggle={onToggleBand}
          onClear={onClearBands}
          isAssist={exercise.assist}
        />
      )}

      {/* reps strip */}
      <div style={{ marginTop: 14 }}>
        <RepStrip
          min={1} max={20}
          range={range}
          last={set.lastReps}
          logged={set.reps}
          onLog={onLogReps}
        />
      </div>

      {set.kind === "warmup" && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 12 }}>
          <button onClick={onSkipWarmup} style={{
            background: "transparent", border: 0, color: "#A1A1AA",
            fontFamily: "inherit", fontWeight: 500, fontSize: 13, padding: "4px 0", cursor: "pointer",
          }}>Skip warmup →</button>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// RestTimer — tinted card with progress fill behind, big M:SS countdown,
// +15s / pause-resume / skip cluster on right.
// ─────────────────────────────────────────────────────────────────────────────
function RestTimer({ rest, onAdd, onSkip, onToggle }) {
  const { left, total, paused, kind } = rest;
  const m = Math.floor(left / 60);
  const s = String(left % 60).padStart(2, "0");
  const pct = total > 0 ? (1 - left / total) * 100 : 100;
  const done = left === 0;
  const accent = done ? T.green : kind === "warmup" ? T.amber : T.accentLight;
  const accentBg = done ? "rgba(52,211,153,0.10)" : kind === "warmup" ? "rgba(251,191,36,0.10)" : "rgba(96,165,250,0.10)";
  const ghostBtn = {
    background: "rgba(255,255,255,0.04)",
    border: `1px solid ${accent}40`,
    color: accent,
    fontFamily: T.mono, fontSize: 11, fontWeight: 700,
    padding: "6px 10px", borderRadius: 7, cursor: "pointer", letterSpacing: 0.3,
  };
  return (
    <div style={{
      marginTop: 12, borderRadius: 12,
      background: accentBg, border: `1px solid ${accent}55`,
      padding: "12px 14px 10px", position: "relative", overflow: "hidden",
    }}>
      <div style={{
        position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`,
        background: `linear-gradient(90deg, ${accent}30, ${accent}14)`,
        transition: "width 1s linear",
      }} />
      <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 1, minWidth: 0 }}>
          <span style={{ color: accent, fontSize: 9, fontWeight: 800, letterSpacing: 0.8, fontFamily: T.mono }}>
            {done ? "REST DONE" : paused ? "REST · PAUSED" : "REST"}
          </span>
          <span style={{ color: T.strong, fontFamily: T.mono, fontSize: 28, fontWeight: 800, letterSpacing: -0.5, lineHeight: 1.05 }}>
            {m}:{s}
          </span>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <button onClick={() => onAdd(15)} style={ghostBtn}>+15s</button>
          <button onClick={onToggle} style={{ ...ghostBtn, minWidth: 32 }}>{paused ? "▶" : "❚❚"}</button>
          <button onClick={onSkip} style={{ ...ghostBtn, background: accent, color: T.inv, borderColor: accent }}>
            {done ? "✓ next" : "skip"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ExerciseCard — title, set strip, rest timer, active set block, footer.
// ─────────────────────────────────────────────────────────────────────────────
// `allSets` is the full sets array for the exercise so multi-warmup labels
// can be derived from the warmup's position in the strip (W1 / W2 / …).
function setStripLabel(s, allSets) {
  if (s.kind === "warmup") {
    const warmups = allSets.filter(x => x.kind === "warmup");
    if (warmups.length > 1) {
      const n = warmups.indexOf(s) + 1;
      return `W${n}`;
    }
    return "WARM";
  }
  return `SET ${s.idx}`;
}

function ExerciseCard({ exercise, supersetTag, rest, onRestAdd, onRestSkip, onRestToggle, onPickWeight, onPickBodyweight, onPickGrip, onToggleBand, onClearBands, onLogReps, onSkipWarmup, onSkipExercise, onSwapExercise, onReopenSet, onAddSet, onRemoveSet, onRemoveWarmup, motivation }) {
  const [swapOpen, setSwapOpen] = useState(false);
  const swapOptions = getSwapOptions(exercise.name);
  // Skipped exercise: collapsed chip with a restore tap. No set strip, no
  // active set block, no AI motivation slot — the exercise is opted out.
  if (exercise.skipped) {
    return (
      <div style={{
        margin: "0 16px 12px", padding: "10px 14px",
        background: "rgba(255,255,255,0.015)",
        border: `1px dashed ${T.cardBorder}`,
        borderRadius: 14,
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
      }}>
        <div style={{ minWidth: 0, flex: 1, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{
            color: T.muted, fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 1.0,
            padding: "2px 6px", borderRadius: 4,
            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)",
            flexShrink: 0,
          }}>× SKIPPED</span>
          {supersetTag && (
            <span style={{
              color: T.bands, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1,
              padding: "1px 5px", borderRadius: 4,
              background: "rgba(192,132,252,0.10)", opacity: 0.6, flexShrink: 0,
            }}>{supersetTag}</span>
          )}
          <span style={{
            color: T.muted, fontSize: 15, fontWeight: 600,
            textDecoration: "line-through", textDecorationColor: "rgba(156,163,175,0.4)",
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>{exercise.name}</span>
        </div>
        <button onClick={onSkipExercise} style={{
          background: "transparent", border: "1px solid rgba(255,255,255,0.1)",
          color: T.muted, padding: "5px 10px", borderRadius: 7,
          fontFamily: "inherit", fontSize: 12, fontWeight: 600, cursor: "pointer",
          flexShrink: 0,
        }}>↻ restore</button>
      </div>
    );
  }
  const activeIdx = exercise.sets.findIndex(s => s.active);
  const activeSet = activeIdx >= 0 ? exercise.sets[activeIdx] : null;
  const totalWork = exercise.sets.filter(s => s.kind === "work").length;
  const warmups = exercise.sets.filter(s => s.kind === "warmup");
  const totalWarmup = warmups.length;
  const hasWarmup = totalWarmup > 0;
  const warmupActive = warmups.some(s => s.active);
  const activeWarmupPos = activeSet && activeSet.kind === "warmup"
    ? warmups.indexOf(activeSet) + 1
    : null;
  const lastWork = [...exercise.sets].reverse().find(s => s.kind === "work");
  const canRemove = totalWork > 1 && lastWork && !lastWork.active && !lastWork.completed;
  const allDone = !activeSet && exercise.sets.every(s => s.completed);

  const renderSetCard = (s, i) => {
    const isBW = exercise.mode === "bodyweight";
    const isAssist = exercise.assist;
    const isBandsOnly = exercise.isBandsOnly;
    const baseW = isBW ? (s.bodyweight || 0) : (s.weight || 0);
    const lastBaseW = isBW ? (s.lastBodyweight || 0) : (s.lastWeight || 0);
    const bandSum = (s.bands || []).reduce((a, b) => a + b, 0);
    const lastBandSum = (s.lastBands || []).reduce((a, b) => a + b, 0);
    const totalLb = isAssist ? Math.max(0, baseW - bandSum) : (isBandsOnly ? bandSum : baseW + bandSum);
    const prev = isAssist ? Math.max(0, lastBaseW - lastBandSum) : (isBandsOnly ? lastBandSum : lastBaseW + lastBandSum);
    const wDelta = totalLb - prev;
    const rDelta = s.lastReps != null && s.reps != null ? s.reps - s.lastReps : 0;
    const isFlat = wDelta === 0 && rDelta === 0;
    const isDown = wDelta < 0 || (wDelta === 0 && rDelta < 0);
    const deltaColor = isFlat ? T.faint : isDown ? T.red : T.green;
    const deltaText = !s.completed ? "" : isFlat ? "=" : wDelta !== 0 ? `${wDelta > 0 ? "+" : ""}${wDelta}` : `${rDelta > 0 ? "+" : ""}${rDelta}r`;
    const isWarm = s.kind === "warmup";
    const isCurrent = s.active;
    const tappable = !isCurrent;
    return (
      <button key={i} onClick={tappable ? () => onReopenSet(i) : undefined} disabled={!tappable} style={{
        padding: "8px 4px 7px", borderRadius: 9,
        cursor: tappable ? "pointer" : "default",
        background: isCurrent
          ? (isWarm ? "rgba(217,119,6,0.12)" : "rgba(59,130,246,0.14)")
          : s.completed ? "rgba(255,255,255,0.03)" : "transparent",
        boxShadow: isCurrent
          ? (isWarm ? "0 0 0 1.5px rgba(251,191,36,0.55), 0 4px 14px -4px rgba(217,119,6,0.45)"
                    : "0 0 0 1.5px rgba(96,165,250,0.6), 0 4px 14px -4px rgba(59,130,246,0.5)")
          : "none",
        border: isCurrent ? "0" : `1px ${s.completed ? "solid" : "dashed"} rgba(255,255,255,0.05)`,
        opacity: isCurrent ? 1 : s.completed ? 1 : 0.45,
        display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
        minWidth: 0, transition: "all 200ms ease",
      }}>
        <span style={{ color: isWarm ? T.amber : isCurrent ? T.accentLight : T.faint, fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 0.7 }}>
          {setStripLabel(s, exercise.sets)}
        </span>
        {/* Reps preview: when this set isn't logged yet but the same exercise+set
            slot was done last session, show the prior rep count in italic so the
            target is visible "in advance" — rather than an opaque "—". The italic
            + lighter color distinguishes it from a logged value. The weight side
            already pre-fills from last via buildSet, so this just brings reps
            into parity. */}
        {(() => {
          const isPreview = s.reps == null && s.lastReps != null;
          const repText = s.reps ?? s.lastReps ?? "—";
          const repColor = isPreview
            ? T.muted
            : (s.completed || isCurrent) ? T.strong : T.faint;
          return (
            <div style={{ display: "flex", alignItems: "baseline", gap: 2, fontFamily: T.mono }}>
              <span style={{ color: (s.completed || isCurrent) ? T.strong : T.faint, fontSize: 16, fontWeight: 700, letterSpacing: -0.3 }}>{totalLb}</span>
              <span style={{ color: T.disabled, fontSize: 11 }}>×</span>
              <span style={{ color: repColor, fontSize: 16, fontWeight: 700, letterSpacing: -0.3, fontStyle: isPreview ? "italic" : "normal" }}>{repText}</span>
            </div>
          );
        })()}
        {s.completed ? (
          <span style={{ color: deltaColor, fontFamily: T.mono, fontSize: 10, fontWeight: 700 }}>{deltaText}</span>
        ) : isCurrent ? (
          <span style={{ color: isWarm ? T.amber : T.accentLight, fontFamily: T.mono, fontSize: 10, fontWeight: 700 }}>● now</span>
        ) : (
          <span style={{ color: T.disabled, fontFamily: T.mono, fontSize: 10 }}>up next</span>
        )}
      </button>
    );
  };

  const footerBtn = (label, onClick, disabled) => (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      background: "transparent",
      border: "1px solid rgba(255,255,255,0.06)",
      color: disabled ? T.disabled : T.muted,
      padding: "5px 10px", borderRadius: 7,
      cursor: disabled ? "default" : "pointer",
      fontSize: 12, fontWeight: 500,
      opacity: disabled ? 0.5 : 1,
    }}>{label}</button>
  );

  return (
    <div style={{
      margin: "0 16px 12px", padding: "14px 14px 14px",
      background: T.cardBg,
      border: `1px solid ${T.cardBorder}`,
      borderRadius: 14,
    }}>
      {/* title */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
        <h2 style={{ margin: 0, color: T.strong, fontSize: 20, fontWeight: 800, lineHeight: 1.15, letterSpacing: -0.4 }}>
          {supersetTag && (
            <span style={{
              color: T.bands, fontFamily: T.mono, fontSize: 11, fontWeight: 800, letterSpacing: 1,
              marginRight: 8, padding: "2px 6px", borderRadius: 5,
              background: "rgba(192,132,252,0.12)", verticalAlign: "middle",
            }}>{supersetTag}</span>
          )}
          {exercise.name}
        </h2>
      </div>
      {exercise.note && (
        <p style={{ margin: "6px 0 0", color: T.muted, fontSize: 12, lineHeight: 1.4 }}>{exercise.note}</p>
      )}

      {/* set strip */}
      <div style={{
        display: "grid",
        gridTemplateColumns: `repeat(${exercise.sets.length}, minmax(0, 1fr))`,
        gap: 6, marginTop: 12,
      }}>
        {exercise.sets.map(renderSetCard)}
      </div>

      {/* rest timer (above active set block) */}
      {rest && <RestTimer rest={rest} onAdd={onRestAdd} onSkip={onRestSkip} onToggle={onRestToggle} />}

      {/* active set block */}
      {activeSet && (
        <ActiveSetBlock
          exercise={exercise}
          set={activeSet}
          totalWork={totalWork}
          totalWarmup={totalWarmup}
          warmupPos={activeWarmupPos}
          onPickWeight={(w) => onPickWeight(activeIdx, w)}
          onPickBodyweight={(w) => onPickBodyweight(activeIdx, w)}
          onPickGrip={(g) => onPickGrip(activeIdx, g)}
          onToggleBand={(b) => onToggleBand(activeIdx, b)}
          onClearBands={() => onClearBands(activeIdx)}
          onLogReps={(r) => onLogReps(activeIdx, r)}
          onSkipWarmup={onSkipWarmup}
          onApplyLast={() => {
            if (exercise.mode === "bodyweight") {
              onPickBodyweight(activeIdx, activeSet.lastBodyweight || 175);
              if (activeSet.lastGrip) onPickGrip(activeIdx, activeSet.lastGrip);
            } else if (!exercise.isBandsOnly) {
              onPickWeight(activeIdx, activeSet.lastWeight || 0);
            }
            onClearBands(activeIdx);
            (activeSet.lastBands || []).forEach(b => onToggleBand(activeIdx, b));
          }}
        />
      )}

      {/* AI motivation chip — appears once exercise is fully done */}
      {allDone && motivation && (
        <div style={{
          marginTop: 10, padding: "10px 12px",
          background: "linear-gradient(135deg, rgba(192,132,252,0.10), rgba(96,165,250,0.10))",
          border: "1px solid rgba(192,132,252,0.2)",
          borderRadius: 10,
          display: "flex", alignItems: "flex-start", gap: 9,
        }}>
          <span style={{ fontSize: 14, flexShrink: 0 }}>✨</span>
          <span style={{ fontSize: 13, color: "#E9D5FF", lineHeight: 1.45, fontWeight: 500 }}>
            {motivation === "__loading__" ? <span style={{ opacity: 0.6 }}>thinking…</span> : motivation}
          </span>
        </div>
      )}

      {/* footer */}
      <div style={{ display: "flex", gap: 6, marginTop: 10, paddingTop: 10, borderTop: `1px solid ${T.cardBorder}`, flexWrap: "wrap" }}>
        {footerBtn("+ set", onAddSet)}
        {footerBtn("− set", onRemoveSet, !canRemove)}
        {footerBtn("× skip exercise", onSkipExercise)}
        {swapOptions.length > 0 && (
          <div style={{ position: "relative" }}>
            {footerBtn(swapOpen ? "⇄ swap ▾" : "⇄ swap", () => setSwapOpen(o => !o))}
            {swapOpen && (
              <div style={{
                position: "absolute", bottom: "calc(100% + 6px)", right: 0, zIndex: 50,
                background: "#111827", border: "1px solid rgba(255,255,255,0.12)",
                borderRadius: 9, boxShadow: "0 10px 28px rgba(0,0,0,0.55)",
                overflow: "hidden", minWidth: 210, maxWidth: "78vw",
              }}>
                <div style={{ padding: "7px 12px 5px", color: T.faint, fontFamily: T.mono, fontSize: 9, fontWeight: 800, letterSpacing: 0.8, borderBottom: `1px solid ${T.cardBorder}` }}>
                  SWAP FOR
                </div>
                {swapOptions.map(opt => (
                  <button key={opt.name} onClick={() => { setSwapOpen(false); onSwapExercise(opt.name); }} style={{
                    display: "block", width: "100%", textAlign: "left",
                    padding: "9px 12px", background: "transparent", border: 0,
                    borderBottom: `1px solid ${T.cardBorder}`,
                    color: T.text, fontSize: 13, fontWeight: 600, cursor: "pointer",
                    fontFamily: "inherit",
                  }}>{opt.name}</button>
                ))}
              </div>
            )}
          </div>
        )}
        <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
          {hasWarmup && warmupActive && footerBtn("Skip warmup →", onSkipWarmup)}
          {hasWarmup && !warmupActive && footerBtn("× warmup", onRemoveWarmup)}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// StatsPane — desktop sidebar showing context for the currently-active
// exercise: weekly volume per primary muscle (with the 10-20-sets hypertrophy
// target highlighted), the last few sessions of this lift, and PR snapshots.
// Hidden by CSS on narrow viewports; computations are still cheap.
// ─────────────────────────────────────────────────────────────────────────────
function StatsPane({ exercise, history, statHistory, exercises }) {
  if (!exercise) return null;
  const today = localDate();
  const todayMs = Date.parse(today + 'T00:00:00Z');
  const sevenDaysAgoMs = todayMs - 7 * 86400000;
  const muscleInfo = EXERCISE_MUSCLES[exercise.name] || { primary: [], secondary: [] };

  // Working sets per primary muscle of this exercise, last 7 days inclusive
  // of today and exclusive of the day exactly 7 days ago. Window = [today-6d,
  // today] = 7 distinct calendar days.
  //
  // Each entry now carries the contributing exercise, weight, and reps so the
  // chart can color slices per exercise and modulate intensity by the set's
  // "hardness" (weight × reps relative to the exercise's max in the window).
  const muscleSets7d = {};
  (muscleInfo.primary || []).forEach(m => muscleSets7d[m] = []);
  for (const sess of (history || [])) {
    if (!sess.date || sess.date === today) continue;
    const sessMs = Date.parse(sess.date + 'T00:00:00Z');
    if (sessMs <= sevenDaysAgoMs || sessMs > todayMs) continue;
    for (const st of (sess.sets || [])) {
      if (st.set_type !== 'working') continue;
      const mm = EXERCISE_MUSCLES[st.exercise];
      if (!mm) continue;
      for (const muscle of (mm.primary || [])) {
        if (muscle in muscleSets7d) muscleSets7d[muscle].push({
          date: sess.date, isToday: false,
          exercise: st.exercise,
          weight: +st.weight_lb || 0,
          reps: parseInt(st.reps) || 0,
        });
      }
    }
  }
  // exercises[] is the in-progress session — pin its events to the chart's
  // rightmost column directly, so timezone string mismatches between
  // localDate() and the UTC-formatted day labels can never make today's
  // slices disappear.
  const chartTodayDate = new Date(todayMs).toISOString().slice(0, 10);
  for (const e of (exercises || [])) {
    const em = EXERCISE_MUSCLES[e.name];
    if (!em) continue;
    for (const s of e.sets) {
      if (!s.completed || s.kind !== 'work') continue;
      const bs = (s.bands || []).reduce((a, b) => a + b, 0);
      const weight = e.assist ? Math.max(0, (s.bodyweight || 0) - bs)
                    : e.isBandsOnly ? bs
                    : e.bandAddon ? (s.weight || 0) + bs
                    : (s.weight || 0);
      for (const muscle of (em.primary || [])) {
        if (muscle in muscleSets7d) muscleSets7d[muscle].push({
          date: chartTodayDate, isToday: true,
          exercise: e.name,
          weight,
          reps: parseInt(s.reps) || 0,
        });
      }
    }
  }
  // Sort each muscle's events chronologically so slices read left → right
  // oldest → newest, with today's slices on the right edge.
  Object.values(muscleSets7d).forEach(arr => arr.sort((a, b) => a.date.localeCompare(b.date)));

  // Per-exercise color palette + max-volume for hardness scaling. Computed
  // once per muscle so a single chart's legend / coloring stays consistent.
  // Hue palette deliberately spans warm → cool so distinct exercises read
  // apart at a glance even when only 2-3 are in play.
  const PALETTE = [
    { hue: 152 }, // green (Single-Arm Rows / first exercise)
    { hue: 200 }, // blue
    { hue: 30 },  // orange
    { hue: 280 }, // violet
    { hue: 340 }, // pink
    { hue: 50 },  // amber
  ];

  const stat = statHistory || {};
  // Sibling-pooling: when the current lift is brand new (just swapped in,
  // never logged), per-exercise stats are empty — but the user has likely
  // been training the same muscle group via a swap-group sibling. Surface
  // the sibling's data with a label note so the pane stays useful instead
  // of saying "no data" for a movement the user has done many times.
  const pickSiblingForStats = () => {
    const grp = getSwapGroup(exercise.name);
    if (!grp) return null;
    const own = ((stat.orm || {})[exercise.name] || []).length
              + ((stat.vol || {})[exercise.name] || []).length
              + ((stat.wt  || {})[exercise.name] || []).length
              + ((stat.reps|| {})[exercise.name] || []).length;
    if (own > 0) return null;  // we have our own data, no need to borrow
    let best = null, bestCount = 0;
    for (const member of grp) {
      if (member.name === exercise.name) continue;
      const cnt = ((stat.orm || {})[member.name] || []).length;
      if (cnt > bestCount) { bestCount = cnt; best = member.name; }
    }
    return bestCount > 0 ? best : null;
  };
  const sibling = pickSiblingForStats();
  const lookupName = sibling || exercise.name;
  const ormHistRaw = (stat.orm || {})[lookupName] || [];
  const wtHist  = (stat.wt  || {})[lookupName] || [];
  const repsHist = (stat.reps || {})[lookupName] || [];
  const volHistRaw = (stat.vol  || {})[lookupName] || [];
  // Compute today's 1RM-est + total volume from the in-progress exercises[]
  // state so the sparkline reflects the user's current session immediately —
  // without it the rightmost dot can't appear until /api/1rm-history refetches
  // (which only happens on next page load).
  let todayOrm = 0, todayVol = 0;
  (exercise.sets || []).forEach(s => {
    if (!s.completed || s.kind !== 'work') return;
    const bs = (s.bands || []).reduce((a, b) => a + b, 0);
    const w = exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
            : exercise.isBandsOnly ? bs
            : exercise.bandAddon ? (s.weight || 0) + bs
            : (s.weight || 0);
    const r = parseInt(s.reps) || 0;
    if (r > 0 && w > 0) {
      const o = r > 1 ? w * (1 + r / 30) : w;
      if (o > todayOrm) todayOrm = o;
