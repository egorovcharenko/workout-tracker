<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Workout Session</title>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  workout-session.html — the LIVE WORKOUT SESSION screen (set logging).
  Served at /workout?w=<id>.

  This is ONE of the app's two pages. The other is workout.html (the SHELL:
  home, history, stats, calendar, measurements). They are NOT two versions of
  the app — they are two distinct pages. The shell's startWorkout() redirects
  here when a session begins; this page's "← Back" returns to the shell.
  ═══════════════════════════════════════════════════════════════════════════

  React + Babel via CDN so the whole thing stays a single file with no build
  step (easy to deploy on Vercel through workout_server.py).

  Shares the backend with the shell. Saves go through /api/save with a payload
  shape including the interleaved set_number convention for supersets.
-->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js"></script>
<script src="/workout-shared.js"></script>
<script src="/workout-session-hooks.js"></script>
<script type="text/babel" src="/workout-session-components.js" data-presets="react"></script>
<style>
  /* Reset + dark theme — these tokens come from the design handoff README. */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root {
    margin: 0; padding: 0;
    height: 100%;
    background: #0B0F14;
    color: #E5E7EB;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    overscroll-behavior-y: none;
  }
  body { color-scheme: dark; }
  button { font-family: inherit; }
  /* Hide native scrollbars on horizontal scrollers */
  .scroll-row::-webkit-scrollbar { display: none; }
  .scroll-row { scrollbar-width: none; }
  /* Edge-fade nudge animations (rep strip) */
  @keyframes repNudgeR { 0%, 80%, 100% { transform: translateY(-50%); } 88% { transform: translate(3px, -50%); } 94% { transform: translate(-1px, -50%); } }
  @keyframes repNudgeL { 0%, 80%, 100% { transform: translateY(-50%); } 88% { transform: translate(-3px, -50%); } 94% { transform: translate(1px, -50%); } }
  /* Rest-done halo (matches the shell's flashRestDone) */
  @keyframes rest-done-flash {
    0% { opacity: 0; }
    8% { opacity: 1; }
    25% { opacity: 0.55; }
    40% { opacity: 1; }
    60% { opacity: 0.55; }
    75% { opacity: 1; }
    92% { opacity: 0.45; }
    100% { opacity: 0; }
  }
  /* Logged-rep micro-pulse */
  @keyframes set-pulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  /* Two-column layout when the viewport is wide enough for a stats sidebar.
     Below the breakpoint the layout falls back to a single mobile column —
     the sidebar is hidden via display:none so its computations are skipped
     too (StatsPane is still rendered but its container collapses). */
  .session-shell {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }
  .session-main { width: 100%; max-width: 448px; padding-bottom: 60px; }
  .stats-pane-wrap, .motivations-pane-wrap { display: none; }
  /* Inline motivation chips show on mobile/narrow; hidden when the dedicated
     motivations column is visible at wide viewports. */
  .inline-motivation { display: flex; }
  @media (min-width: 960px) {
    .session-shell {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      padding: 0 24px;
    }
    .session-main { flex-shrink: 0; }
    .stats-pane-wrap {
      display: block;
      width: 320px;
      flex-shrink: 0;
      position: sticky;
      top: 16px;
      margin-top: 64px; /* align with the first exercise card, past the header row */
    }
  }
  /* Add the third (motivations) column when there's room. Hides the inline
     motivation chips so AI takes aren't duplicated. */
  @media (min-width: 1240px) {
    .session-shell { padding: 0 16px; }
    .motivations-pane-wrap {
      display: block;
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 16px;
      margin-top: 64px;
      align-self: flex-start;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
    }
    .inline-motivation { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
var { useState, useEffect, useRef, useMemo, useCallback } = React;

const SWAP_GROUPS = [
  [
    { name: "Band Romanian Deadlift", sets: 3, reps: "8-12", notes: "Stand on band, hinge at hips, handles at sides", video: "https://www.youtube.com/shorts/Op7zRCBjGvs", equipment: "band", rest: 120, noWarmup: true },
    { name: "Dumbbell Romanian Deadlift", sets: 3, reps: "8-12", notes: "Hinge at hips, slight knee bend", video: "https://www.youtube.com/shorts/cGMaBqaExBo", rest: 120, noWarmup: true },
    { name: "Single-Leg DB RDL", sets: 3, reps: "8", notes: "One DB in each hand, rear leg lifts as you hinge — slow tempo, 8 per leg. Warmup 1 set @ ~20lb, work @ ~30lb.", rest: 120 },
  ],
  [
    { name: "Band Tricep Pushdowns", sets: 3, reps: "12-15", notes: "Elbows glued to ribs, squeeze at bottom", equipment: "band", video: "https://www.youtube.com/shorts/eGjSphOefTI", rest: 60 },
    { name: "Bench Dips", sets: 3, reps: "10-15", notes: "Hands on bench behind you, lower until elbows ~90°. Band ASSISTS — loop it under your hips to take weight off; leave bands empty for full bodyweight.", equipment: "band", assist: true, video: "https://www.youtube.com/shorts/0326dy_-CzM", rest: 60 },
  ],
  [
    { name: "Goblet Squat", sets: 3, warmups: 2, reps: "10-12", notes: "Hold DB at chest, sit deep. Optional: stand on bands for extra resistance.", video: "https://www.youtube.com/shorts/MeIiIdhvXT4", bandAddon: true, rest: 120 },
    { name: "Bulgarian Split Squat", sets: 3, warmups: 2, reps: "8-10", notes: "Rear foot on bench, DB in each hand — 8-10 per leg, controlled. Optional: stand on bands for extra resistance.", video: "https://www.youtube.com/shorts/2C-uNgKwPLE", bandAddon: true, rest: 120 },
  ],
];
function getSwapGroup(exerciseName) {
  return SWAP_GROUPS.find(g => g.some(e => e.name === exerciseName)) || null;
}
function getSwapOptions(exerciseName) {
  const g = getSwapGroup(exerciseName);
  return g ? g.filter(e => e.name !== exerciseName) : [];
}

const fetchT = (url, ms = 6000) => Promise.race([
  fetch(url),
  new Promise((_, rej) => setTimeout(() => rej(new Error(`timeout ${url}`)), ms)),
]).then(async (r) => {
  if (!r.ok) throw new Error(`${url} → HTTP ${r.status}`);
  const txt = await r.text();
  try { return JSON.parse(txt); }
  catch (e) { throw new Error(`${url} → non-JSON response: ${txt.slice(0, 80)}`); }
});

const fetchTRetry = (url, timeout) => fetchT(url, timeout)
  .catch(e => { console.warn(`[V2] ${url} retry:`, e); return fetchT(url, timeout); });

const api = {
  todaySession: (workout) => fetchTRetry(`/api/today-session?workout=${encodeURIComponent(workout)}`, 6000),
  lastSession:  (workout) => fetchTRetry(`/api/last-session?workout=${encodeURIComponent(workout)}`, 6000),
  hints: () => fetchTRetry("/api/exercise-hints", 8000),
  history: (limit = 20) => fetchTRetry(`/api/history?limit=${limit}`, 10000),
  history1RM: () => fetchTRetry("/api/1rm-history", 10000),
  save: (body) => fetch("/api/save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then(r => r.json()),
  motivate: (body) => fetch("/api/motivate", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then(r => r.json()),
  motivations: (sid) => fetchT(`/api/motivations?session_id=${sid}`),
};

// BAND_VALUES is loaded from workout-shared.js

// Each design Exercise is one row in the UI. A superset exercise from the
// template becomes N flattened design Exercises sharing a `superset` letter.
function flattenTemplate(workout, lastSessionMap, hintsMap) {
  hintsMap = hintsMap || {};
  // Two-tier lookup: prefer the workout's own most-recent session (so the
  // LAST pill literally means "last time you did this workout"), fall back
  // to global hints (so a workout you haven't done in a while still shows
  // useful values from whenever you last did that exercise in any workout).
  const lookupLast = (key) => lastSessionMap[key] || hintsMap[key] || null;
  // Grip cascades across sets of the same exercise — historically the user
  // only set grip on set 1 so sets 2/3 have grip=null in last data. Without
  // this fallback those sets would prefill to the template's first grip
  // option (typically "neutral") instead of inheriting set 1's choice.
  // Picks the first non-null grip found across last+hints data for the
  // exercise's name. Working sets win over warmup (warmups often use a
  // different grip or none at all).
  const exerciseGripCache = {};
  const lookupExerciseGrip = (exName) => {
    if (exerciseGripCache[exName] !== undefined) return exerciseGripCache[exName];
    let found = null;
    const scan = (src, kindFilter) => {
      Object.keys(src || {}).forEach(k => {
        if (found) return;
        const [n, kind] = k.split("|");
        if (n === exName && (!kindFilter || kind === kindFilter) && src[k].grip) found = src[k].grip;
      });
    };
    scan(lastSessionMap, "working");
    scan(hintsMap, "working");
    scan(lastSessionMap, "warmup");
    scan(hintsMap, "warmup");
    exerciseGripCache[exName] = found;
    return found;
  };
  const out = [];
  let supersetLetter = 'A';
  workout.exercises.forEach((ex, exIdx) => {
    if (ex.supersetExercises) {
      const subs = ex.supersetExercises;
      const letter = supersetLetter;
      supersetLetter = String.fromCharCode(supersetLetter.charCodeAt(0) + 1);
      const rounds = ex.sets || 3;
      subs.forEach((sub, subIdx) => {
        const sets = [];
        // Same per-exercise working-set fallback as the standalone branch:
        // SET 3 borrows from SET 1/2 if the specific set_number is empty.
        const subWorkingBySetNum = {};
        [hintsMap, lastSessionMap].forEach(src => {
          Object.keys(src || {}).forEach(k => {
            const [exName, kind, setNumStr] = k.split("|");
            if (exName === sub.name && kind === "working") {
              subWorkingBySetNum[parseInt(setNumStr)] = src[k];
            }
          });
        });
        const subFallback = (want) => {
          if (subWorkingBySetNum[want] != null) return subWorkingBySetNum[want];
          const nums = Object.keys(subWorkingBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
          return nums.length ? subWorkingBySetNum[nums[0]] : null;
        };
        const subExerciseGrip = lookupExerciseGrip(sub.name);
        // Mirror the standalone branch: explicit mode flags drive buildSet's
        // weight_lb interpretation + initial-value population. Without these
        // a bandsOnly sub (Band Tricep Pushdowns) falls through to the plain
        // loaded branch, which assigns set.bands = [] even when last data
        // has bands — so the bands grid renders empty on mount.
        const subIsAssist = !!sub.assist;
        const subIsBandOnly = sub.equipment === "band" && !sub.bandAddon && !subIsAssist;
        for (let r = 0; r < rounds; r++) {
          const setNumber = interleavedSetNumber(r, subIdx, subs.length);
          const last = subFallback(setNumber) || lookupLast(`${sub.name}|working|${setNumber}`);
          sets.push(buildSet({
            kind: "work", idx: r + 1,
            template: sub,
            last,
            setNumber,
            saveExerciseName: sub.name,
            isAssist: subIsAssist,
            isBandOnly: subIsBandOnly,
            fallbackGrip: subExerciseGrip,
          }));
        }
        out.push({
          id: `${exIdx}-${subIdx}`,
          templateExIdx: exIdx,
          subIdx,
          name: sub.name,
          // Assist subs (e.g. Bench Dips swapped into a superset) need the
          // bodyweight mode + must NOT be flagged bandsOnly — otherwise the
          // active block hides the bodyweight stepper and treats Σbands as
          // the load. Mirror the standalone branch exactly.
          mode: subIsAssist ? "bodyweight" : undefined,
          superset: letter,
          supersetPos: subIdx + 1,
          repRange: sub.reps,
          note: sub.notes || ex.notes || "",
          rest: ex.rest || 60,
          grips: sub.grips ? sub.grips.map(g => ({ id: g, ...GRIP_LABELS[g] })) : null,
          isBandsOnly: subIsBandOnly,
          bandAddon: !!sub.bandAddon,
          assist: subIsAssist,
          session: ex.session || null,
          sets,
        });
      });
    } else {
      const sets = [];
      const isAssist = !!ex.assist;
      const isBandOnly = ex.equipment === "band" && !ex.bandAddon && !isAssist;
      // Warmup sets. Default = 1; pass `warmups: 2` (or more) on the template
      // to ramp up before the work sets. Each warmup gets its own set_number
      // (0, 1, …) so /api/last-session round-trips per-warmup last values.
      //
      // Fallback: when a warmup setNumber has no last-session record (common
      // when you add a new warmup slot to an exercise that historically had
      // fewer), borrow data from any other warmup of the same exercise. This
      // keeps the LAST pill / stepper prefill useful instead of showing 0lb
      // with no context. Picking by smallest |Δsetnumber| favors adjacent
      // warmups (W1 inherits from W2 before W3, etc.).
      if (!ex.noWarmup) {
        const warmupCount = Math.max(1, ex.warmups || 1);
        // Build a per-exercise warmup index from BOTH the workout's last
        // session and the cross-workout hints, so adding a 2nd warmup slot
        // to an exercise that historically had 1 still surfaces data.
        const warmupLastBySetNum = {};
        [hintsMap, lastSessionMap].forEach(src => {
          Object.keys(src || {}).forEach(k => {
            const [exName, kind, setNumStr] = k.split("|");
            if (exName === ex.name && kind === "warmup") {
              warmupLastBySetNum[parseInt(setNumStr)] = src[k];
            }
          });
        });
        const fallbackForWarmup = (want) => {
          if (warmupLastBySetNum[want] != null) return warmupLastBySetNum[want];
          const nums = Object.keys(warmupLastBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
          return nums.length ? warmupLastBySetNum[nums[0]] : null;
        };
        const exGripFallback = lookupExerciseGrip(ex.name);
        for (let wi = 0; wi < warmupCount; wi++) {
          const setNumber = wi;
          const last = fallbackForWarmup(setNumber);
          sets.push(buildSet({
            kind: "warmup",
            // idx drives the active-block header. For multi-warmup we show
            // "Warm-up 1" / "Warm-up 2"; single keeps the cleaner "Warm-up".
            idx: warmupCount > 1 ? `W${wi + 1}` : "W",
            template: ex,
            last,
            setNumber,
            saveExerciseName: ex.name,
            isAssist, isBandOnly,
            fallbackGrip: exGripFallback,
          }));
        }
      }
      // Build a per-exercise working-set index across both data sources too,
      // so SET 3 prefill can still fall back to SET 1 if the user has only
      // ever done one working set so far.
      const workingLastBySetNum = {};
      [hintsMap, lastSessionMap].forEach(src => {
        Object.keys(src || {}).forEach(k => {
          const [exName, kind, setNumStr] = k.split("|");
          if (exName === ex.name && kind === "working") {
            workingLastBySetNum[parseInt(setNumStr)] = src[k];
          }
        });
      });
      const fallbackForWorking = (want) => {
        if (workingLastBySetNum[want] != null) return workingLastBySetNum[want];
        const nums = Object.keys(workingLastBySetNum).map(Number).sort((a, b) => Math.abs(a - want) - Math.abs(b - want));
        return nums.length ? workingLastBySetNum[nums[0]] : null;
      };
      const workGripFallback = lookupExerciseGrip(ex.name);
      for (let i = 0; i < (ex.sets || 3); i++) {
        const setNumber = i + 1;
        const last = fallbackForWorking(setNumber);
        sets.push(buildSet({
          kind: "work", idx: i + 1,
          template: ex,
          last,
          setNumber,
          saveExerciseName: ex.name,
          fallbackGrip: workGripFallback,
          isAssist, isBandOnly,
        }));
      }
      out.push({
        id: String(exIdx),
        templateExIdx: exIdx,
        subIdx: null,
        name: ex.name,
        mode: isAssist ? "bodyweight" : undefined,
        superset: ex.superset || null,
        supersetPos: null,
        repRange: ex.reps,
        note: ex.notes || "",
        rest: ex.rest || 60,
        grips: ex.grips ? ex.grips.map(g => ({ id: g, ...GRIP_LABELS[g] })) : null,
        isBandsOnly: isBandOnly,
        bandAddon: !!ex.bandAddon,
        assist: isAssist,
        session: ex.session || null,
        sets,
      });
    }
  });
  return out;
}

// Single set initializer. `last` is the dict from /api/last-session for this
// exercise|set_type|set_number, or undefined.
//
// Mode-specific weight_lb interpretation (the save format stores the
// combined value; this page must invert it back to its parts):
//   • plain "loaded"  → weight_lb = DB weight, lastWeight = weight_lb
//   • bandAddon       → weight_lb = DB + Σbands (combined). lastWeight is the
//                       DB-only portion so the stepper shows DB and the bands
//                       grid adds on top (otherwise the stepper would read
//                       e.g. 75 when DB was actually 60 + 15-band).
//   • assist          → weight_lb = bodyweight − Σbands (net). lastBodyweight
//                       recovers the BW number by adding Σbands back.
//   • bandsOnly       → weight_lb = Σbands. Stepper hidden, no lastWeight.
function buildSet({ kind, idx, template, last, setNumber, saveExerciseName, isAssist, isBandOnly, fallbackGrip }) {
  const set = {
    kind, idx,
    setNumber,
    saveExerciseName,
    completed: false,
    active: false,
    reps: null,
  };
  if (last) {
    set.lastReps = parseInt(last.reps) || null;
    set.lastBands = last.bands_json ? safeJSON(last.bands_json) : [];
    // Per-set grip cascades to the exercise-wide grip when the specific set's
    // last record has none (common: user only set grip on set 1, sets 2-3
    // were saved with grip=null). Without this, sets 2-3 would prefill to
    // the template's default grip and the LAST marker dot wouldn't show.
    set.lastGrip = last.grip || fallbackGrip || null;
    const lastBandSum = (set.lastBands || []).reduce((a, b) => a + b, 0);
    const savedLb = last.weight_lb || 0;
    if (template.assist) {
      set.lastBodyweight = savedLb + lastBandSum;
    } else if (template.bandAddon) {
      set.lastWeight = Math.max(0, savedLb - lastBandSum);
    } else if (isBandOnly) {
      // No DB ever shown; bands carry the load. Leave lastWeight unset.
    } else {
      set.lastWeight = savedLb;
    }
  } else {
    set.lastBands = [];
    // Even with no per-set last record, surface the exercise-wide grip if
    // one exists in any other set's history. Keeps the LAST marker
    // showing on the grip pill for an exercise the user has done before.
    if (fallbackGrip) set.lastGrip = fallbackGrip;
  }
  // Initial value: prefill from last so the user usually only adjusts reps.
  if (template.assist) {
    set.bodyweight = set.lastBodyweight || 175;
    set.bands = (set.lastBands || []).slice();
    set.grip = set.lastGrip || (template.grips ? template.grips[0] : null);
  } else if (isBandOnly) {
    set.weight = 0;
    set.bands = (set.lastBands || []).slice();
    set.bandsOnly = true;
  } else {
    set.weight = set.lastWeight || 0;
    set.bands = template.bandAddon ? (set.lastBands || []).slice() : [];
    if (template.grips) set.grip = set.lastGrip || template.grips[0];
  }
  return set;
}

const safeJSON = (s) => { try { return JSON.parse(s); } catch (_) { return []; } };

// Apply today-session sets onto the freshly-built exercises[] (mark completed,
// restore actual reps/weight/bands the user already logged this session).
function hydrateToday(exercises, todaySets) {
  // Index design exercises by name+setNumber for O(N) hydration.
  const map = new Map();
  exercises.forEach((ex, eIdx) => {
    ex.sets.forEach((s, sIdx) => {
      const key = `${s.saveExerciseName}|${s.kind === "warmup" ? "warmup" : "working"}|${s.setNumber}`;
      map.set(key, { eIdx, sIdx });
    });
  });
  const next = exercises.map(ex => ({
    ...ex,
    sets: ex.sets.map(s => ({ ...s, completed: false, active: false }))
  }));
  if (todaySets && todaySets.length) {
    todaySets.forEach(row => {
      const key = `${row.exercise}|${row.set_type}|${row.set_number}`;
      const ref = map.get(key);
      if (!ref) return;
      const ex = next[ref.eIdx];
      const set = ex.sets[ref.sIdx];
      set.reps = parseInt(row.reps) || null;
      set.completed = true;
      const bands = row.bands_json ? safeJSON(row.bands_json) : [];
      set.bands = bands;
      const bandSum = bands.reduce((a, b) => a + b, 0);
      const savedLb = row.weight_lb || 0;
      // Same mode-specific inversion as buildSet — see comment there.
      if (ex.assist) {
        set.bodyweight = savedLb + bandSum;
      } else if (ex.bandAddon) {
        set.weight = Math.max(0, savedLb - bandSum);
      } else if (ex.isBandsOnly) {
        set.weight = 0;
      } else {
        set.weight = savedLb;
      }
      if (row.grip) set.grip = row.grip;
    });
  }
  return activateNextSet(next);
}

// Pick the next uncompleted set across all exercises and mark it active.
// Mutates and returns the input array. Honors `exercise.skipped` (the whole
// exercise is opted out, so its sets are never the active focus). Within
// each non-skipped exercise we activate the next uncompleted set AFTER the
// highest-index completed set — never backward.
// Skipped/unused intermediate slots stay tappable in the strip but don't
// receive automatic focus. If every set is past the highest completion mark
// with nothing left (or the only candidates live in skipped exercises), no
// set is active and the workout reads as done.
function activateNextSet(exercises) {
  // Clear any pre-existing active flags so we have a single source of truth.
  for (const ex of exercises) {
    for (const s of ex.sets) if (s.active) s.active = false;
  }
  let activated = false;
  for (const ex of exercises) {
    if (activated) break;
    if (ex.skipped) continue;
    let highestCompleted = -1;
    for (let i = 0; i < ex.sets.length; i++) {
      if (ex.sets[i].completed) highestCompleted = i;
    }
    for (let i = highestCompleted + 1; i < ex.sets.length; i++) {
      if (!ex.sets[i].completed && !ex.sets[i].userSkipped) {
        ex.sets[i].active = true;
        activated = true;
        break;
      }
    }
  }
  return exercises;
}

// ─────────────────────────────────────────────────────────────────────────────
// Skipped-exercise persistence — survives page reload, scoped to a
// (workout, date) tuple so a fresh day starts with a clean slate without
// SKIPPED_LS_KEY, loadSkippedExercises, saveSkippedExercises are loaded from workout-shared.js


// ─────────────────────────────────────────────────────────────────────────────
// Swapped-exercise persistence — a map { templateExIdx: chosenName } scoped to
// a (workout, date) tuple, same convention as the skip store. Survives reload.
// ─────────────────────────────────────────────────────────────────────────────
const SWAP_LS_KEY = (workoutName, date) => `v2-swaps:${workoutName}:${date}`;
function loadSwaps(workoutName, date) {
  try {
    const raw = localStorage.getItem(SWAP_LS_KEY(workoutName, date));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

// Produce a workout template with swaps applied — each swapped slot's exercise
// is replaced by the chosen group member. Returned shape matches WORKOUTS so it
// flows straight into flattenTemplate.
//
// Swap key formats:
//   "<idx>"           — top-level exercise at workout.exercises[idx]
//   "<idx>-<subIdx>"  — superset member at workout.exercises[idx].supersetExercises[subIdx]
//
// This lets the user swap one half of a superset (e.g. Band Tricep Pushdowns
// → Bench Dips) without rewriting the wrapper or losing the partner exercise.
function applySwaps(workout, swapMap) {
  if (!swapMap || !Object.keys(swapMap).length) return workout;
  return {
    ...workout,
    exercises: workout.exercises.map((ex, idx) => {
      // Top-level replacement.
      const topWant = swapMap[`${idx}`];
      if (topWant && topWant !== ex.name) {
        const grp = getSwapGroup(ex.name);
        const repl = grp && grp.find(e => e.name === topWant);
        if (repl) return { ...repl };
      }
      // Per-sub replacement within a superset wrapper.
      if (ex.supersetExercises) {
        let changed = false;
        const newSubs = ex.supersetExercises.map((sub, subIdx) => {
          const subWant = swapMap[`${idx}-${subIdx}`];
          if (!subWant || subWant === sub.name) return sub;
          const grp = getSwapGroup(sub.name);
          const repl = grp && grp.find(e => e.name === subWant);
          if (!repl) return sub;
          changed = true;
          // Strip wrapper-owned fields so the replacement reads cleanly as a sub.
          const { sets: _s, rest: _r, warmups: _w, ...subFields } = repl;
          return subFields;
        });
        if (changed) return { ...ex, supersetExercises: newSubs };
      }
      return ex;

}

// ─────────────────────────────────────────────────────────────────────────────
// Save: serialize state into the shared /api/save shape and POST. Single-
// in-flight + queue pattern guards against an autoSave race.
// ─────────────────────────────────────────────────────────────────────────────
function serializeForSave(exercises, workoutName, sessionId, startedAt, elapsed, activeDate) {
  const sets = [];
  exercises.forEach(ex => {
    ex.sets.forEach(s => {
      if (!s.completed) return;
      const isAssist = ex.assist;
      const bands = s.bands || [];
      const bandSum = bands.reduce((a, b) => a + b, 0);
      // weight_lb is the COMBINED load lifted (the shared save format,
      // so /api/last-session round-trips across both pages, and history /
      // 1RM stats accumulate the actual weight moved):
      //   • assist        → BW − Σbands  (net after assistance)
      //   • bandsOnly     → Σbands
      //   • bandAddon     → DB + Σbands  (e.g. 60lb DB + 15lb band = 75)
      //   • plain loaded  → DB
      let weight_lb;
      if (isAssist) {
        weight_lb = Math.max(0, (s.bodyweight || 0) - bandSum);
      } else if (ex.isBandsOnly) {
        weight_lb = bandSum;
      } else if (ex.bandAddon) {
        weight_lb = (s.weight || 0) + bandSum;
      } else {
        weight_lb = s.weight || 0;
      }
      sets.push({
        exercise: s.saveExerciseName,
        set_type: s.kind === "warmup" ? "warmup" : "working",
        set_number: s.setNumber,
        reps: String(s.reps || ""),
        weight_lb,
        bands_json: bands.length ? JSON.stringify(bands) : null,
        grip: s.grip || null,
      });
    });
  });
  return {
    workout: workoutName,
    date: activeDate || localDate(),
    duration_sec: elapsed,
    session_id: sessionId || null,
    started_at: startedAt ? new Date(startedAt).toISOString() : null,
    sets,
  };
}

let _saveInFlight = false;
let _savePending = null;
async function autoSavePayload(payload, onResolved) {
  if (_saveInFlight) {
    _savePending = { payload, onResolved };
    return;
  }
  _saveInFlight = true;
  try {
    const res = await api.save(payload);
    if (res.ok) onResolved(res.id);
  } catch (e) {
    console.error("[V2-SAVE] error:", e);
  } finally {
    _saveInFlight = false;
    if (_savePending) {
      const next = _savePending; _savePending = null;
      autoSavePayload(next.payload, next.onResolved);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// App — top-level state machine. One source of truth for the entire screen.
// ─────────────────────────────────────────────────────────────────────────────
function App() {

  // browser back button works.

  const [pmStarted, setPmStarted] = useState(false);   // two-a-day: hide PM block behind a Continue button until user taps it

        date: sess.date,
        sets: sessSets.map(st => ({ sub: st.exercise, type: st.set_type, reps: st.reps, weight_lb: st.weight_lb })),

    // (the same set-level data `previous` is built from), and only AUGMENTED
    // by statHistory if that loaded. Previously we leaned on statHistory
    // alone — when its fetch timed out on a Vercel cold start, every lift
    // got `sessions_in_history: 0` while `previous` clearly listed recent
    // sessions, and Claude would write "history says zero sessions but I
    // see you rowing 50s on May 18 and 20" — confused, contradictory.

      // timeseries even when statHistory is empty.

        sess.sets.forEach(st => {

          const r = parseInt(st.reps) || 0;

            const o = ormOf(w, r);
            if (o > mo) mo = o;
            if (mo > histMaxOrm) histMaxOrm = mo;
            sv += w * r;
          }
        });
        histByDate[sess.date] = { date: sess.date, orm: mo, wt: mw, reps: mr, vol: sv };
      });

      // Step 2 — augment with statHistory if it loaded. Same-date wins go
      // to statHistory (more authoritative for orm calc); new dates from
      // statHistory expand the window past history(20).
      const ormHist  = ((statHistory.orm  || {})[subName] || []);
      const wtHist   = ((statHistory.wt   || {})[subName] || []);
      const repsHist = ((statHistory.reps || {})[subName] || []);
      const volHist  = ((statHistory.vol  || {})[subName] || []);
      const statMaxOrm  = ormHist.length  ? Math.max(...ormHist.map(d => +d.orm  || 0)) : 0;
      const statMaxWt   = wtHist.length   ? Math.max(...wtHist.map(d => +d.wt    || 0)) : 0;
      const statMaxReps = repsHist.length ? Math.max(...repsHist.map(d => +d.reps|| 0)) : 0;
      const byDate = { ...histByDate };
      ormHist.forEach (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).orm  = +d.orm  || 0; });
      wtHist.forEach  (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).wt   = +d.wt   || 0; });
      repsHist.forEach(d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).reps = +d.reps || 0; });
      volHist.forEach (d => { (byDate[d.date] = byDate[d.date] || { date: d.date }).vol  = +d.vol  || 0; });

      const prevMaxOrm  = Math.max(histMaxOrm,  statMaxOrm);
      const prevMaxWt   = Math.max(histMaxWt,   statMaxWt);
      const prevMaxReps = Math.max(histMaxReps, statMaxReps);
      const allHist = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));

      // Step 3 — drop the entry only if we genuinely have zero data from
      // BOTH sources. Otherwise sessions_in_history reflects union truth.
      if (allHist.length === 0) return null;

      // Current session aggregates from the exercise we just finished.
      const workingSets = exercise.sets.filter(s => s.kind === "work" && s.completed);
      const curWt   = workingSets.reduce((m, s) => Math.max(m, (() => {
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        return exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
             : exercise.isBandsOnly ? bs
             : exercise.bandAddon ? (s.weight || 0) + bs
             : (s.weight || 0);
      })()), 0);
      const curReps = workingSets.reduce((m, s) => Math.max(m, parseInt(s.reps) || 0), 0);
      const curOrm  = workingSets.reduce((m, s) => {
        const reps = parseInt(s.reps) || 0;
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        const w = exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
                : exercise.isBandsOnly ? bs
                : exercise.bandAddon ? (s.weight || 0) + bs
                : (s.weight || 0);
        return reps > 0 && w > 0 ? Math.max(m, ormOf(w, reps)) : m;
      }, 0);
      const curVol = workingSets.reduce((sum, s) => {
        const reps = parseInt(s.reps) || 0;
        const bs = (s.bands || []).reduce((a, b) => a + b, 0);
        const w = exercise.assist ? Math.max(0, (s.bodyweight || 0) - bs)
                : exercise.isBandsOnly ? bs
                : exercise.bandAddon ? (s.weight || 0) + bs
                : (s.weight || 0);
        return sum + (reps > 0 && w > 0 ? w * reps : 0);
      }, 0);

      const trimmed = allHist.slice(-12);

      // Trends / consistency.
      const lastDate = allHist[allHist.length - 1].date;
      const daysSinceLast = Math.round((todayMs - Date.parse(lastDate + 'T00:00:00Z')) / 86400000);
      const recent = allHist.filter(h => todayMs - Date.parse(h.date + 'T00:00:00Z') <= 28 * 86400000);
      const prior  = allHist.filter(h => {
        const ago = todayMs - Date.parse(h.date + 'T00:00:00Z');
        return ago > 28 * 86400000 && ago <= 56 * 86400000;
      });
      const avg = arr => arr.length ? arr.reduce((s, x) => s + (+x.vol || 0), 0) / arr.length : 0;
      const recentAvg = avg(recent), priorAvg = avg(prior);
      const volTrendPct = priorAvg > 0 ? Math.round((recentAvg - priorAvg) / priorAvg * 100) : null;

      const sameWtReps = curWt > 0 ? allHist.filter(h => h.wt === curWt).map(h => h.reps).filter(r => r > 0) : [];
      const repsAtCurWtImproved = sameWtReps.length >= 2 && curReps > Math.max(...sameWtReps);

      return {
        sub: subName,
        current_orm: curOrm,           previous_best_orm: prevMaxOrm,    is_orm_pr:    !!(curOrm && curOrm > prevMaxOrm),
        current_max_weight: curWt,     previous_best_weight: prevMaxWt,  is_weight_pr: !!(curWt && curWt > prevMaxWt),
        current_max_reps: curReps,     previous_best_reps: prevMaxReps,  is_reps_pr:   !!(curReps && curReps > prevMaxReps),
        current_volume: curVol,
        sessions_in_history: allHist.length,
        days_since_last_session: daysSinceLast,
        returning_after_layoff: daysSinceLast >= 14,
        vol_trend_pct_4wk_vs_prior: volTrendPct,
        reps_at_current_weight_improved: repsAtCurWtImproved,
        tied_previous_best_orm: !!(curOrm && prevMaxOrm && curOrm === prevMaxOrm),
        history_timeseries: trimmed,
        // Tell the server whether this entry's long-arc fields (volTrendPct,
        // history_timeseries beyond ~20 sessions) are limited to the
        // recent-history window vs. backed by the full aggregated stats.
        stats_source: statsLoaded ? "full" : "recent_history_only",
      };
    }).filter(Boolean);

    // statsFailed is now an informational flag — the prs entries themselves
    // are no longer compromised when stats fail, because they fall back to
    // history. Kept on the payload so the server can pass it through to
    // the model as additional context.
    const statsFailed = !statsLoaded;

    return {
      session_id: sid,
      exercise: exercise.name,
      muscles: [...new Set(muscles)],
      stats_loaded: !statsFailed,
      current,
      previous,
      prs,
    };
  };

  const requestMotivation = async (exercise, sid) => {
    setMotivations(m => ({ ...m, [exercise.id]: "__loading__" }));
    try {
      const payload = buildMotivatePayload(exercise, sid);
      const res = await api.motivate(payload);
      if (res && res.message) {
        setMotivations(m => ({ ...m, [exercise.id]: res.message }));
      } else {
        setMotivations(m => { const c = { ...m }; delete c[exercise.id]; return c; });
      }
    } catch (e) {
      console.warn("[V2-MOTIVATE]", e);
      setMotivations(m => { const c = { ...m }; delete c[exercise.id]; return c; });
    }
  };

  // Reopen: clear completed on the tapped set, deactivate whatever was active,
  // mark this one active. Reps/weight/bands are kept so the user only adjusts.
  const onReopenSet = (eIdx, sIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      return {
        ...e,
        sets: e.sets.map((s, j) => {
          if (j === sIdx) return { ...s, active: true, completed: false, userSkipped: false };
          if (s.active) return { ...s, active: false };
          return s;
        }),
      };
    });
    // Also deactivate active sets in OTHER exercises (supersets can leave an
    // active in the partner; reopening should pull focus back).
    const cleaned = next.map((e, i) => i === eIdx ? e : ({
      ...e,
      sets: e.sets.map(s => s.active ? { ...s, active: false } : s),
    }));
    updateAndSave(cleaned);
  };

  const onSkipWarmup = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const sets = e.sets.map(s => s.kind === "warmup" ? { ...s, active: false, completed: false, userSkipped: true } : s);
      const firstWork = sets.findIndex(s => s.kind === "work" && !s.completed);
      if (firstWork !== -1) sets[firstWork] = { ...sets[firstWork], active: true };
      return { ...e, sets };
    });
    updateAndSave(next);
  };

  // Toggle "skip exercise" for the whole exercise. The card collapses to a
  // compact SKIPPED chip with a restore action; skipped exercises don't
  // receive automatic focus and their sets count as done in the header
  // x/total. Persisted in localStorage (keyed by workout+date) so a refresh
  // mid-workout keeps the skip. Sets are NOT saved to the DB (we never mark
  // them completed), so the skip is purely a UI/flow signal.
  const onSkipExercise = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const skipped = !e.skipped;
      // Clear any in-progress reps/bands selection on this exercise's sets
      // so a later un-skip starts from prefilled (last-session) values
      // instead of a half-edited state.
      const sets = e.sets.map(s => ({ ...s, active: false }));
      return { ...e, skipped, sets };
    });
    activateNextSet(next);
    const skippedNames = new Set(next.filter(e => e.skipped).map(e => e.name));
    saveSkippedExercises(workout.name, sessionDate, skippedNames);
    // Save sets structure to localStorage
    updateAndSave(next);
  };

  // Swap an exercise for an alternative in its SWAP_GROUP. Re-flattens the
  // whole workout against the new template (using the cached last/hints maps
  // so there's no network round-trip), then re-hydrates from the sets already
  // logged this session so progress on every OTHER exercise is preserved. The
  // swapped slot itself starts fresh — its sets carry the new exercise's own
  // history (LAST pills, reps preview). Persisted in localStorage so a reload
  // mid-workout keeps the swap.
  const onSwapExercise = (eIdx, newName) => {
    const ex = exercises[eIdx];
    const tIdx = ex.templateExIdx;
    // Superset members are nested inside workout.exercises[tIdx].supersetExercises[subIdx]
    // — they need a compound swap key so applySwaps can replace just one half
    // of the superset (e.g. Pushdowns → Bench Dips) without touching the
    // partner exercise. Top-level exercises keep the simple "<tIdx>" key.
    const isSub = ex.subIdx != null;
    const swapKey = isSub ? `${tIdx}-${ex.subIdx}` : `${tIdx}`;
    const wrapper = workout.exercises[tIdx];
    const originalName = isSub
      ? (wrapper?.supersetExercises?.[ex.subIdx]?.name || ex.name)
      : (wrapper?.name || ex.name);
    const nextSwaps = { ...swaps };
    if (newName === originalName) delete nextSwaps[swapKey];
    else nextSwaps[swapKey] = newName;
    saveSwaps(workout.name, sessionDate, nextSwaps);
    setSwaps(nextSwaps);
    // Rebuild against the swapped template.
    const { last, hints } = dataRef.current;
    let exs = flattenTemplate(applySwaps(workout, nextSwaps), last, hints);
    // Copy sets from previous exercises state for all non-swapped slots
    exs = exs.map((item, i) => {
      if (i === eIdx) return item;
      const prevEx = exercises[i];
      if (prevEx && prevEx.name === item.name) {
        return { ...item, sets: prevEx.sets.map(s => ({ ...s })) };
      }
      return item;
    });
    // Re-apply skip flags, then recompute focus.
    const skippedNames = loadSkippedExercises(workout.name, sessionDate);
    if (skippedNames.size) exs = exs.map(e => skippedNames.has(e.name) ? { ...e, skipped: true } : e);
    activateNextSet(exs);
    updateAndSave(exs);
  };

  const onAddSet = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const lastWork = [...e.sets].reverse().find(s => s.kind === "work");
      const newIdx = (typeof lastWork?.idx === "number" ? lastWork.idx : 0) + 1;
      const newSetNumber = (lastWork?.setNumber || 0) + 1;
      const newSet = {
        kind: "work", idx: newIdx,
        setNumber: newSetNumber,
        saveExerciseName: lastWork?.saveExerciseName || e.name,
        completed: false, active: false, reps: null,
        weight: lastWork?.weight || 0,
        bodyweight: lastWork?.bodyweight,
        bands: lastWork?.bands ? lastWork.bands.slice() : [],
        grip: lastWork?.grip,
        lastWeight: null, lastBands: [], lastReps: null,
      };
      return { ...e, sets: [...e.sets, newSet] };
    });
    updateAndSave(next);
  };

  const onRemoveSet = (eIdx) => {
    const next = exercises.map((e, i) => {
      if (i !== eIdx) return e;
      const workCount = e.sets.filter(s => s.kind === "work").length;
      if (workCount <= 1) return e;
      // Remove the trailing work set if it's neither active nor completed.
      const lastIdx = [...e.sets].map((s, k) => ({ s, k })).reverse().find(x => x.s.kind === "work" && !x.s.active && !x.s.completed)?.k;
      if (lastIdx == null) return e;
      return { ...e, sets: e.sets.filter((_, j) => j !== lastIdx) };
    });
    updateAndSave(next);
  };

  const onRemoveWarmup = (eIdx) => {
    const next = exercises.map((e, i) => i !== eIdx ? e : ({ ...e, sets: e.sets.filter(s => s.kind !== "warmup") }));
    updateAndSave(next);
  };



  // Two-a-day: reveal the PM block and persist so a reload keeps it open.
  const onContinuePm = () => {
    setPmStarted(true);
    savePmStarted(workout.name, sessionDate, true);
  };

  // Set counts for header. A skipped exercise counts its sets as "done" so the
  // x/total reflects "I've made a decision about this exercise" and the meter
  // can hit 100% without the skipped sets ever being logged.
  const totalSets = exercises.reduce((n, e) => n + e.sets.length, 0);
  const doneSets = exercises.reduce((n, e) =>
    e.skipped ? n + e.sets.length : n + e.sets.filter(s => s.completed).length, 0);

  if (!loaded) {
    // Render the header + workout name immediately so the user sees the
    // app responded even while the API round-trips. Avoids the "blank
    // screen with header only" impression on a slow cold start.
    return (
      <div style={{ height: "100%", overflowY: "auto" }}>
        <div style={{ maxWidth: 448, margin: "0 auto", minHeight: "100%", background: T.page }}>
          <Header workout={workout} workouts={WORKOUTS} onPickWorkout={onPickWorkout} done={0} total={0} elapsedSec={0} />
          <div style={{ margin: "40px 16px", padding: "20px", textAlign: "center", color: T.muted, fontFamily: T.mono, fontSize: 13, border: `1px dashed ${T.cardBorder}`, borderRadius: 12 }}>
            loading workout…
          </div>
        </div>
      </div>
    );
  }

  // The "current exercise" the stats sidebar describes — what you're
  // working on right now. Resolution order:
  //   1. Exercise with an active set (the strongest signal).
  //   2. First non-skipped exercise that still has an uncompleted set —
  //      handles the case where the active flag didn't propagate forward
  //      (e.g., you completed a set externally, reopened-then-redid one,
  //      or the auto-advance lost the active marker for any reason).
  //   3. Last exercise — workout is fully done, show the lift you just
  //      finished so the PR snapshot is still useful.
  const currentExercise = (() => {
    const active = exercises.find(e => !e.skipped && e.sets.some(s => s.active));
    if (active) return active;
    const nextIncomplete = exercises.find(e => !e.skipped && e.sets.some(s => !s.completed));
    if (nextIncomplete) return nextIncomplete;
    return exercises.length ? exercises[exercises.length - 1] : null;
  })();

  return (
    // 3-column on wide desktop (≥1240px): motivations left, exercises center,
    // stats right. 2-column at ≥960px: just exercises + stats. Mobile keeps
    // single column. .session-shell + media queries handle the responsive
    // visibility. Outer div takes the scroll; both side panes are sticky.
    <div style={{ height: "100%", overflowY: "auto", background: T.page }}>
      <div className="session-shell">
      <aside className="motivations-pane-wrap">
        <MotivationsList exercises={exercises} motivations={motivations} />
      </aside>
      <div className="session-main">
      <Header
        workout={workout}
        workouts={WORKOUTS}
        onPickWorkout={onPickWorkout}
        done={doneSets}
        total={totalSets}
        elapsedSec={elapsed}
      />
      {/* Workout-level warm-up callout removed — per-exercise warmups
          (set strip W1 / W2) carry that intent more directly. */}
      {exercises.map((ex, i) => {
        const prev = i > 0 ? exercises[i - 1] : null;
        const isFirstInSuperset = ex.superset && (!prev || prev.superset !== ex.superset);
        const supersetTag = ex.superset ? `${ex.superset}${ex.supersetPos || ''}` : null;
        // Session-block dividers. Render an AM banner above the very first
        // exercise in a split workout, and a PM banner at the AM→PM transition.
        const hasSplit = exercises.some(e => e.session);
        const isFirstAM = hasSplit && ex.session === "AM" && (!prev || prev.session !== "AM");
        const isFirstPM = hasSplit && ex.session === "PM" && (!prev || prev.session !== "PM");

        // PM-gated: when the workout has the split and the user hasn't tapped
        // Continue yet, replace the entire PM block with a single "Ready for
        // the evening session?" card. The first PM exercise renders the card;
        // later PM exercises render nothing.
        if (hasSplit && ex.session === "PM" && !pmStarted) {
          if (!isFirstPM) return null;
          const pmExs = exercises.filter(e => e.session === "PM");
          const previewNames = pmExs
            .filter(e => !e.skipped)
            .map(e => e.superset ? null : e.name)
            .filter(Boolean);
          // Roll up superset members into a single label.
          const pmSupersetTags = Array.from(new Set(pmExs.filter(e => e.superset && !e.skipped).map(e => `Superset ${e.superset}`)));
          const previewLabels = [...previewNames, ...pmSupersetTags].join(" · ") || "(all PM exercises currently skipped)";
          return (
            <div key="pm-gate" style={{
              margin: "16px 16px 4px",
              padding: "22px 18px 18px",
              borderRadius: 16,
              background: "linear-gradient(180deg, rgba(96,165,250,0.12), rgba(96,165,250,0.03))",
              border: "1px solid rgba(96,165,250,0.28)",
              boxShadow: "0 12px 30px -16px rgba(59,130,246,0.35)",
              textAlign: "center",
            }}>
              <div style={{ fontSize: 26, marginBottom: 4 }} aria-hidden>🌙</div>
              <div style={{
                color: T.accentLight, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.4,
                marginBottom: 8,
              }}>EVENING SESSION</div>
              <div style={{ color: T.strong, fontSize: 16, fontWeight: 700, lineHeight: 1.35, marginBottom: 4 }}>
                Ready for the second half?
              </div>
              {previewLabels && (
                <div style={{ color: T.muted, fontSize: 11.5, lineHeight: 1.45, marginBottom: 16, padding: "0 4px" }}>
                  {previewLabels}
                </div>
              )}
              <button onClick={onContinuePm} style={{
                background: "linear-gradient(180deg, #60A5FA, #3B82F6)",
                border: 0, color: "#0B0F14",
                padding: "14px 32px", borderRadius: 12,
                fontFamily: "inherit", fontSize: 15, fontWeight: 800, letterSpacing: 0.3,
                cursor: "pointer",
                boxShadow: "0 8px 22px -6px rgba(59,130,246,0.55)",
                minWidth: 180,
              }}>Continue →</button>
            </div>
          );
        }

        const sessionDivider = (label, emoji, color, bg, border) => (
          <div style={{ margin: "10px 16px 8px", display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ flex: 1, height: 1, background: border }} />
            <span style={{
              color, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.4,
              padding: "3px 9px", borderRadius: 6,
              background: bg, border: `1px solid ${border}`,
              display: "inline-flex", alignItems: "center", gap: 5,
            }}>
              <span aria-hidden style={{ fontSize: 11 }}>{emoji}</span>
              {label}
            </span>
            <div style={{ flex: 1, height: 1, background: border }} />
          </div>
        );
        return (
          <React.Fragment key={ex.id}>
            {isFirstAM && sessionDivider("MORNING SESSION", "☀️", T.amber, "rgba(251,191,36,0.08)", "rgba(251,191,36,0.28)")}
            {isFirstPM && sessionDivider("EVENING SESSION", "🌙", T.accentLight, "rgba(96,165,250,0.08)", "rgba(96,165,250,0.28)")}
            {isFirstInSuperset && (
              <div style={{ margin: "4px 16px 6px", display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, height: 1, background: "rgba(192,132,252,0.18)" }} />
                <span style={{ color: T.bands, fontFamily: T.mono, fontSize: 10, fontWeight: 800, letterSpacing: 1.2 }}>
                  SUPERSET {ex.superset} · NO REST
                </span>
                <div style={{ flex: 1, height: 1, background: "rgba(192,132,252,0.18)" }} />
              </div>
            )}
            <ExerciseCard
              exercise={ex}
              supersetTag={supersetTag}
              rest={rest && rest.eIdx === i ? rest : null}
              onRestAdd={restAdd}
              onRestSkip={restSkip}
              onRestToggle={restToggle}
              onPickWeight={(sIdx, w) => onPickWeight(i, sIdx, w)}
              onPickBodyweight={(sIdx, w) => onPickBodyweight(i, sIdx, w)}
              onPickGrip={(sIdx, g) => onPickGrip(i, sIdx, g)}
              onToggleBand={(sIdx, b) => onToggleBand(i, sIdx, b)}
              onClearBands={(sIdx) => onClearBands(i, sIdx)}
              onLogReps={(sIdx, r) => onLogReps(i, sIdx, r)}
              onSkipWarmup={() => onSkipWarmup(i)}
              onSkipExercise={() => onSkipExercise(i)}
              onSwapExercise={(newName) => onSwapExercise(i, newName)}
              onReopenSet={(sIdx) => onReopenSet(i, sIdx)}
              onAddSet={() => onAddSet(i)}
              onRemoveSet={() => onRemoveSet(i)}
              onRemoveWarmup={() => onRemoveWarmup(i)}
              motivation={motivations[ex.id]}
            />
          </React.Fragment>
        );
      })}
      </div>
      <aside className="stats-pane-wrap">
        <StatsPane
          exercise={currentExercise}
          history={history}
          statHistory={statHistory}
          exercises={exercises}
        />
      </aside>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
